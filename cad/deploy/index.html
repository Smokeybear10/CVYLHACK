<!doctype html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.min.css">
<script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.min.js"></script>
<style>
#v{position:absolute;inset:0}

/* --- additive: glass control panel (same buttons, same handlers, same ids) --- */
.cad-panel{
  display:flex;flex-direction:column;gap:6px;
  padding:10px;border-radius:10px;
  background:rgba(10,14,16,.62);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  border:1px solid #34e3d4;
  box-shadow:0 6px 24px rgba(0,0,0,.45),inset 0 0 0 1px rgba(52,227,212,.12);
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  opacity:0;transform:translateY(-6px);
  animation:cad-panel-in .5s cubic-bezier(.16,1,.3,1) .15s forwards;
}
.cad-panel button{
  appearance:none;cursor:pointer;
  font:600 12px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  letter-spacing:.02em;text-align:left;
  color:#cdfdf7;
  padding:8px 12px;border-radius:7px;
  background:rgba(52,227,212,.06);
  border:1px solid rgba(52,227,212,.35);
  transition:background .18s ease,border-color .18s ease,transform .12s ease,box-shadow .18s ease;
}
.cad-panel button:hover{
  background:rgba(52,227,212,.16);
  border-color:#34e3d4;
  box-shadow:0 0 12px rgba(52,227,212,.35);
}
.cad-panel button:active{transform:translateY(1px)}
.cad-panel button:focus-visible{outline:2px solid #34e3d4;outline-offset:2px}

@keyframes cad-panel-in{to{opacity:1;transform:translateY(0)}}

@media (prefers-reduced-motion:reduce){
  .cad-panel{animation:none;opacity:1;transform:none}
  .cad-panel button{transition:none}
}
</style>
</head><body>
<div class="cad-panel" style="position:absolute;z-index:9;top:8px;left:8px">
  <button onclick="moveCar()">Move selected car</button>
  <button onclick="deleteCar()">Delete selected car</button>
  <button onclick="togglePoints()">Toggle point cloud</button>
</div>
<div id="v"></div>

</body></html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sonder — Site Screening</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --green: #0f7a55;
    --green-soft: #e6f4ee;
    --green-line: #bfe3d2;
    --amber: #b5750a;
    --amber-soft: #fbf1dd;
    --amber-line: #f0d9a8;
    --red: #c0392b;
    --red-soft: #fbeae7;
    --red-line: #f2c4bc;
    --ink: #18181b;
    --ink-2: #3f3f46;
    --ink-3: #71717a;
    --ink-4: #a1a1aa;
    --line: #e4e4e7;
    --line-2: #ededf0;
    --bg: #fafafa;
    --panel: #ffffff;
    --rail: #fbfbfc;
    --shadow: 0 1px 2px rgba(24,24,27,.04), 0 1px 3px rgba(24,24,27,.06);
    --shadow-lg: 0 4px 16px rgba(24,24,27,.08), 0 1px 3px rgba(24,24,27,.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  ::selection { background: var(--green-soft); }

  /* ---------- App shell ---------- */
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Top bar */
  .topbar {
    height: 56px; flex: 0 0 56px;
    display: flex; align-items: center; gap: 16px;
    padding: 0 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 9px; padding-right: 8px; }
  .brand .logo {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--green);
    display: grid; place-items: center;
    box-shadow: 0 1px 0 rgba(255,255,255,.4) inset, 0 1px 3px rgba(15,122,85,.4);
  }
  .brand .name { font-weight: 700; font-size: 15px; letter-spacing: -.2px; }
  .brand .badge {
    font-size: 10px; font-weight: 600; color: var(--green);
    background: var(--green-soft); border: 1px solid var(--green-line);
    padding: 1px 6px; border-radius: 5px; letter-spacing: .3px;
  }
  .topbar .div { width: 1px; height: 24px; background: var(--line); }

  .search { position: relative; flex: 0 1 420px; }
  .search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--ink-4); }
  .search input {
    width: 100%; height: 36px;
    padding: 0 92px 0 34px;
    border: 1px solid var(--line); border-radius: 9px;
    background: #fff; font-size: 13.5px; color: var(--ink);
    transition: border-color .15s, box-shadow .15s;
  }
  .search input::placeholder { color: var(--ink-4); }
  .search input:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }
  .search .go {
    position: absolute; right: 5px; top: 5px; height: 26px;
    padding: 0 11px; border-radius: 6px;
    background: var(--green); color: #fff; font-size: 12px; font-weight: 600;
    display: flex; align-items: center; gap: 5px;
    transition: filter .15s, transform .05s;
  }
  .search .go:hover { filter: brightness(1.07); }
  .search .go:active { transform: scale(.97); }
  .search .kbd { font-size: 10px; opacity: .7; }

  .spacer { flex: 1; }

  .btn {
    height: 34px; padding: 0 12px; border-radius: 8px;
    border: 1px solid var(--line); background: #fff;
    font-size: 13px; font-weight: 500; color: var(--ink-2);
    display: inline-flex; align-items: center; gap: 7px;
    transition: background .12s, border-color .12s, transform .05s;
  }
  .btn:hover { background: #fafafa; border-color: var(--ink-4); }
  .btn:active { transform: scale(.98); }
  .btn svg { color: var(--ink-3); }
  .btn.primary { background: var(--green); border-color: var(--green); color: #fff; }
  .btn.primary svg { color: #fff; }
  .btn.primary:hover { filter: brightness(1.06); border-color: var(--green); }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #2dd4a7, #0f7a55);
    color: #fff; font-weight: 600; font-size: 12px;
    display: grid; place-items: center;
  }

  /* Body */
  .body { flex: 1; display: flex; min-height: 0; }

  /* ---------- Left rail ---------- */
  .rail {
    flex: 0 0 268px; width: 268px;
    background: var(--rail);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    transition: width .22s ease, flex-basis .22s ease;
    overflow: hidden;
  }
  .rail.collapsed { flex-basis: 52px; width: 52px; }
  .rail-head {
    height: 46px; flex: 0 0 46px;
    display: flex; align-items: center; gap: 8px;
    padding: 0 12px; border-bottom: 1px solid var(--line-2);
  }
  .rail-head .ttl { font-size: 12px; font-weight: 600; color: var(--ink-3); letter-spacing: .3px; text-transform: uppercase; flex: 1; white-space: nowrap; }
  .rail-head .count { font-size: 11px; font-weight: 600; color: var(--ink-4); background: var(--line-2); padding: 1px 6px; border-radius: 20px; }
  .rail.collapsed .rail-head .ttl, .rail.collapsed .rail-head .count { display: none; }
  .collapse-btn {
    width: 26px; height: 26px; border-radius: 6px; color: var(--ink-3);
    display: grid; place-items: center; flex: 0 0 26px;
    transition: background .12s;
  }
  .collapse-btn:hover { background: var(--line-2); color: var(--ink); }

  .rail-filter { padding: 10px 12px 4px; }
  .rail.collapsed .rail-filter { display: none; }
  .rail-filter .seg { display: flex; background: var(--line-2); border-radius: 8px; padding: 3px; gap: 2px; }
  .rail-filter .seg button {
    flex: 1; font-size: 11.5px; font-weight: 600; color: var(--ink-3);
    padding: 5px 0; border-radius: 6px; transition: all .12s;
  }
  .rail-filter .seg button.on { background: #fff; color: var(--ink); box-shadow: var(--shadow); }

  .rail-list { flex: 1; overflow-y: auto; padding: 8px; }
  .rail.collapsed .rail-list { padding: 8px 0; }

  .site-row {
    position: relative;
    display: flex; align-items: center; gap: 11px;
    padding: 11px 11px 11px 12px; margin-bottom: 6px;
    border: 1px solid transparent; border-radius: 10px;
    background: transparent; width: 100%; text-align: left;
    transition: background .12s, border-color .12s;
  }
  .site-row:hover { background: #fff; border-color: var(--line); box-shadow: var(--shadow); }
  .site-row.active { background: #fff; border-color: var(--green-line); box-shadow: 0 0 0 1px var(--green-line), var(--shadow); }
  .site-row .accent {
    position: absolute; left: 0; top: 9px; bottom: 9px; width: 3px; border-radius: 0 3px 3px 0;
    opacity: 0; transition: opacity .12s;
  }
  .site-row.active .accent { opacity: 1; }

  .rank-pin {
    flex: 0 0 30px; width: 30px; height: 30px; border-radius: 8px;
    display: grid; place-items: center;
    font-weight: 700; font-size: 12px; color: #fff;
    box-shadow: 0 1px 2px rgba(0,0,0,.12);
  }
  .site-row .meta { flex: 1; min-width: 0; }
  .rail.collapsed .site-row { justify-content: center; padding: 9px 0; }
  .rail.collapsed .site-row .meta, .rail.collapsed .site-row .accent { display: none; }
  .site-row .addr { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .site-row .sub { font-size: 11.5px; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .chip {
    flex: 0 0 auto; font-size: 10px; font-weight: 700; letter-spacing: .4px;
    padding: 2px 7px; border-radius: 5px; text-transform: uppercase;
  }
  .chip.go { background: var(--green-soft); color: var(--green); border: 1px solid var(--green-line); }
  .chip.cond { background: var(--amber-soft); color: var(--amber); border: 1px solid var(--amber-line); }
  .chip.nogo { background: var(--red-soft); color: var(--red); border: 1px solid var(--red-line); }

  .rail-foot { flex: 0 0 auto; padding: 10px 12px; border-top: 1px solid var(--line-2); font-size: 11px; color: var(--ink-4); display: flex; align-items: center; gap: 6px; }
  .rail.collapsed .rail-foot { display: none; }
  .dot-live { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }

  /* ---------- Main work area ---------- */
  .main { flex: 1; min-width: 0; overflow-y: auto; position: relative; }
  .main-inner { max-width: 1080px; margin: 0 auto; padding: 22px 28px 60px; }

  /* scanning overlay */
  .scan {
    position: absolute; inset: 0; z-index: 30;
    background: rgba(250,250,250,.86); backdrop-filter: blur(3px);
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
  }
  .scan.show { display: flex; }
  .scan-card {
    background: #fff; border: 1px solid var(--line); border-radius: 16px;
    box-shadow: var(--shadow-lg); padding: 28px 34px; width: 360px;
  }
  .scan-card .h { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .scan-card .h .spin {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2.5px solid var(--green-soft); border-top-color: var(--green);
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .scan-card .h .t { font-weight: 700; font-size: 15px; }
  .scan-card .h .s { font-size: 12px; color: var(--ink-3); }
  .scan-step {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--ink-4); padding: 5px 0;
    transition: color .2s;
  }
  .scan-step .tick {
    width: 18px; height: 18px; border-radius: 50%; flex: 0 0 18px;
    border: 1.5px solid var(--line); display: grid; place-items: center;
    transition: all .2s;
  }
  .scan-step.done { color: var(--ink); }
  .scan-step.done .tick { background: var(--green); border-color: var(--green); }
  .scan-step.done .tick svg { color: #fff; }
  .scan-step.run { color: var(--ink); }
  .scan-step.run .tick { border-color: var(--green); }
  .scan-step .tick svg { opacity: 0; }
  .scan-step.done .tick svg { opacity: 1; }
  .scan-bar { height: 4px; background: var(--line-2); border-radius: 4px; overflow: hidden; margin-top: 16px; }
  .scan-bar i { display: block; height: 100%; width: 0; background: var(--green); border-radius: 4px; transition: width .4s ease; }

  /* dossier header */
  .crumbs { font-size: 12px; color: var(--ink-4); display: flex; align-items: center; gap: 7px; margin-bottom: 14px; }
  .crumbs b { color: var(--ink-3); font-weight: 500; }
  .crumbs .sep { color: var(--line); }

  .verdict-card {
    border-radius: 16px; padding: 22px 24px;
    display: flex; align-items: center; gap: 22px;
    border: 1px solid; margin-bottom: 18px;
    transition: background .25s, border-color .25s;
  }
  .verdict-card.go { background: linear-gradient(180deg, #fff, var(--green-soft)); border-color: var(--green-line); }
  .verdict-card.cond { background: linear-gradient(180deg, #fff, var(--amber-soft)); border-color: var(--amber-line); }
  .verdict-card.nogo { background: linear-gradient(180deg, #fff, var(--red-soft)); border-color: var(--red-line); }

  .verdict-badge {
    flex: 0 0 auto; min-width: 132px; text-align: center;
    border-radius: 14px; padding: 14px 18px; color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  .verdict-card.go .verdict-badge { background: var(--green); }
  .verdict-card.cond .verdict-badge { background: var(--amber); }
  .verdict-card.nogo .verdict-badge { background: var(--red); }
  .verdict-badge .lbl { font-size: 11px; font-weight: 600; letter-spacing: 1.4px; opacity: .85; }
  .verdict-badge .v { font-size: 32px; font-weight: 800; letter-spacing: -.5px; line-height: 1.05; margin-top: 2px; }

  .verdict-mid { flex: 1; min-width: 0; }
  .verdict-mid .addr { font-size: 23px; font-weight: 800; letter-spacing: -.5px; }
  .verdict-mid .reason { font-size: 14.5px; color: var(--ink-2); margin-top: 4px; }
  .verdict-mid .tags { display: flex; gap: 7px; margin-top: 11px; flex-wrap: wrap; }
  .pill { font-size: 11.5px; color: var(--ink-3); background: #fff; border: 1px solid var(--line); padding: 3px 9px; border-radius: 20px; font-weight: 500; }
  .pill b { color: var(--ink); font-weight: 600; }

  .score-ring { flex: 0 0 auto; text-align: center; }
  .ring { position: relative; width: 88px; height: 88px; }
  .ring svg { transform: rotate(-90deg); }
  .ring .num { position: absolute; inset: 0; display: grid; place-items: center; }
  .ring .num b { font-size: 26px; font-weight: 800; letter-spacing: -.5px; line-height: 1; }
  .ring .num span { font-size: 10px; color: var(--ink-3); font-weight: 500; }
  .score-ring .cap { font-size: 11px; color: var(--ink-3); margin-top: 6px; font-weight: 500; }

  /* section label */
  .sec-label { display: flex; align-items: center; gap: 9px; margin: 4px 0 11px; }
  .sec-label .star { color: var(--green); }
  .sec-label .t { font-size: 12px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--ink-2); }
  .sec-label .ln { flex: 1; height: 1px; background: var(--line); }
  .sec-label .note { font-size: 11px; color: var(--ink-4); font-weight: 400; text-transform: none; letter-spacing: 0; }

  /* starred cards */
  .stars { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 22px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    box-shadow: var(--shadow); overflow: hidden;
  }
  .card.starred { border-color: var(--green-line); box-shadow: 0 0 0 1px var(--green-line), var(--shadow-lg); }
  .card-head {
    display: flex; align-items: center; gap: 10px; padding: 15px 18px 12px;
    border-bottom: 1px solid var(--line-2);
  }
  .card-head .ico { width: 32px; height: 32px; border-radius: 9px; background: var(--green-soft); color: var(--green); display: grid; place-items: center; flex: 0 0 32px; }
  .card-head .h-txt { flex: 1; }
  .card-head .h-txt .t { font-size: 15px; font-weight: 700; letter-spacing: -.2px; display: flex; align-items: center; gap: 7px; }
  .card-head .h-txt .t .star { color: var(--green); }
  .card-head .h-txt .s { font-size: 12px; color: var(--ink-3); margin-top: 1px; }
  .src {
    font-size: 10px; font-weight: 600; letter-spacing: .3px; padding: 2px 7px; border-radius: 5px;
    white-space: nowrap; flex: 0 0 auto;
  }
  .src.cyvl { background: var(--green-soft); color: var(--green); border: 1px solid var(--green-line); }
  .src.cv { background: #eef2ff; color: #4f46e5; border: 1px solid #d9dffb; }
  .src.public { background: #f4f4f5; color: var(--ink-3); border: 1px solid var(--line); }
  .src.flag { background: var(--amber-soft); color: var(--amber); border: 1px solid var(--amber-line); }

  .card-body { padding: 16px 18px 18px; }

  /* big metric */
  .metric-row { display: flex; gap: 0; margin-bottom: 14px; }
  .metric {
    flex: 1; padding-right: 16px;
  }
  .metric + .metric { padding-left: 16px; border-left: 1px solid var(--line-2); }
  .metric .k { font-size: 11px; color: var(--ink-3); font-weight: 500; letter-spacing: .2px; }
  .metric .val { font-size: 24px; font-weight: 800; letter-spacing: -.6px; line-height: 1.1; margin-top: 3px; }
  .metric .val small { font-size: 13px; font-weight: 600; color: var(--ink-3); }

  .checklist { display: flex; flex-direction: column; gap: 7px; }
  .check { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--ink-2); }
  .check .ck { width: 18px; height: 18px; border-radius: 5px; flex: 0 0 18px; display: grid; place-items: center; }
  .check.pass .ck { background: var(--green-soft); color: var(--green); }
  .check.check2 .ck { background: var(--amber-soft); color: var(--amber); }
  .check.fail .ck { background: var(--red-soft); color: var(--red); }
  .check .lbl { flex: 1; }
  .check .st { font-size: 11px; font-weight: 700; letter-spacing: .4px; }
  .check.pass .st { color: var(--green); }
  .check.check2 .st { color: var(--amber); }
  .check.fail .st { color: var(--red); }

  /* cost band */
  .band { margin-top: 4px; }
  .band-track { display: flex; gap: 5px; }
  .band-track .seg { flex: 1; height: 8px; border-radius: 4px; background: var(--line-2); transition: background .25s; }
  .band-track .seg.on1 { background: var(--green); }
  .band-track .seg.on2 { background: #5fae4f; }
  .band-track .seg.on3 { background: var(--amber); }
  .band-track .seg.on4 { background: var(--red); }
  .band-legend { display: flex; justify-content: space-between; font-size: 10px; color: var(--ink-4); margin-top: 6px; }

  /* trench diagram */
  .trench { margin-top: 14px; border: 1px dashed var(--line); border-radius: 10px; padding: 10px 12px; background: #fcfcfd; }
  .trench .tlbl { font-size: 11px; color: var(--ink-3); display: flex; justify-content: space-between; margin-bottom: 7px; }
  .trench svg { display: block; width: 100%; }

  /* evidence row */
  .evidence { display: grid; grid-template-columns: 1.15fr 1fr; gap: 16px; margin-bottom: 22px; }
  .ev-card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
  .ev-head { display: flex; align-items: center; gap: 8px; padding: 11px 14px; border-bottom: 1px solid var(--line-2); }
  .ev-head .t { font-size: 13px; font-weight: 600; flex: 1; }
  .ev-vis { position: relative; height: 188px; overflow: hidden; }
  .ev-foot { padding: 9px 14px; font-size: 11.5px; color: var(--ink-3); display: flex; align-items: center; gap: 6px; }

  /* 3d tile point cloud */
  .pc { width: 100%; height: 100%; display: block; background: radial-gradient(120% 120% at 30% 0%, #1c2230, #0c0f16); }
  .ev-vis .scanline {
    position: absolute; left: 0; right: 0; height: 30px;
    background: linear-gradient(180deg, transparent, rgba(45,212,167,.18), transparent);
    animation: sweep 3.4s ease-in-out infinite; pointer-events: none;
  }
  @keyframes sweep { 0%,100% { top: -30px; } 50% { top: 188px; } }
  .ev-vis .measure {
    position: absolute; font-size: 10px; color: #6ee7b7; font-family: 'JetBrains Mono', monospace;
    background: rgba(8,12,18,.7); padding: 1px 5px; border-radius: 4px; border: 1px solid rgba(110,231,183,.3);
  }

  /* 360 photo */
  .photo { width: 100%; height: 100%; position: relative; cursor: ew-resize; }
  .photo .scene { position: absolute; inset: 0; transition: background-position .05s linear; }
  .photo .hud { position: absolute; left: 10px; bottom: 8px; font-size: 10px; color: #fff; background: rgba(0,0,0,.4); padding: 2px 7px; border-radius: 5px; font-family: 'JetBrains Mono', monospace; }
  .photo .compass { position: absolute; right: 10px; top: 10px; width: 30px; height: 30px; }

  /* compact strip */
  .strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 22px; }
  .mini { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; box-shadow: var(--shadow); }
  .mini .mh { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .mini .mh .t { font-size: 12px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; color: var(--ink-2); flex: 1; }
  .mini .line { display: flex; justify-content: space-between; font-size: 12.5px; padding: 4px 0; }
  .mini .line + .line { border-top: 1px solid var(--line-2); }
  .mini .line .k { color: var(--ink-3); }
  .mini .line .v { font-weight: 600; color: var(--ink); }

  /* verify block */
  .verify {
    background: var(--amber-soft); border: 1px solid var(--amber-line); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 22px;
  }
  .verify .vh { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
  .verify .vh .t { font-size: 13px; font-weight: 700; color: var(--amber); flex: 1; }
  .verify .vrow { display: flex; gap: 12px; flex-wrap: wrap; }
  .verify .vitem { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: #7a5208; background: #fff; border: 1px solid var(--amber-line); padding: 6px 11px; border-radius: 8px; }
  .verify .vitem .d { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); flex: 0 0 7px; }

  /* ask box */
  .ask { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
  .ask-head { padding: 12px 16px; border-bottom: 1px solid var(--line-2); display: flex; align-items: center; gap: 8px; }
  .ask-head .t { font-size: 13px; font-weight: 700; flex: 1; }
  .ask-head .s { font-size: 11px; color: var(--ink-4); }
  .ask-log { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; max-height: 260px; overflow-y: auto; }
  .ask-empty { font-size: 12.5px; color: var(--ink-4); text-align: center; padding: 6px 0; }

// ---------- SVG HELPERS ----------
function pointCloudSVG(density, color) {
  let dots = '';
  const w = 480, h = 188;
  for (let i = 0; i < density; i++) {
    const x = Math.random() * w;
    const depth = Math.random();
    const y = h * 0.35 + depth * h * 0.6 + (Math.random() - 0.5) * 10;
    const r = 0.5 + depth * 1.4;
    const o = 0.15 + depth * 0.65;
    dots += `<circle cx="${x.toFixed(0)}" cy="${y.toFixed(0)}" r="${r.toFixed(1)}" fill="${color}" opacity="${o.toFixed(2)}"/>`;
  }
  // ground plane gridlines (perspective)
  let grid = '';
  for (let i = 1; i <= 7; i++) {
    const y = h * 0.42 + (i / 7) * h * 0.55;
    grid += `<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="#2dd4a7" stroke-width="0.5" opacity="${0.05 + i * 0.02}"/>`;
  }
  for (let i = 0; i <= 10; i++) {
    const xTop = w * 0.3 + (i / 10) * w * 0.4;
    const xBot = (i / 10) * w;
    grid += `<line x1="${xTop}" y1="${h * 0.42}" x2="${xBot}" y2="${h}" stroke="#2dd4a7" stroke-width="0.5" opacity="0.08"/>`;
  }
  // building silhouettes (vertical structures)
  let blds = '';
  for (let i = 0; i < 5; i++) {
    const bx = 20 + i * 95 + Math.random() * 20;
    const bw = 40 + Math.random() * 30;
    const bh = 30 + Math.random() * 60;
    blds += `<rect x="${bx}" y="${h * 0.42 - bh}" width="${bw}" height="${bh}" fill="none" stroke="#3a82ff" stroke-width="0.6" opacity="0.4"/>`;
  }
  return `<svg class="pc" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid slice">${grid}${blds}${dots}</svg>`;
}

function streetscapeSVG() {
  return `<div class="scene" style="background:
    linear-gradient(180deg, #cdd9e6 0%, #b3c4d6 38%, #8a99a8 39%, #6e7a86 100%);"></div>`;
}

            <circle cx="44" cy="44" r="38" fill="none" stroke="${ringColor(s.vClass)}" stroke-width="7" stroke-linecap="round" stroke-dasharray="${ringDash(s.score)}"/>
          </svg>
          <div class="num"><b>${s.score}</b><span>/ 10</span></div>

        <div class="cap">Site score</div>

    </div>

    <!-- STARRED DIFFERENTIATORS -->
    <div class="sec-label">
      <svg class="star" width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.6 6.3L21 9l-5 4.4L17.5 21 12 17.3 6.5 21 8 13.4 3 9l6.4-.7z"/></svg>

      <span class="ln"></span>
      <span class="note">Measured from the LiDAR scan, no map competitor produces these</span>

    </div>

    <!-- COMPACT STRIP: zoning / demand / verify-hint -->

    <div class="ask">

        <span class="t">Ask about this site</span>

  // wire ask + photo + log
  renderAskLog(s);
  wireAsk(s);
  wirePhoto();
  // update status bar
  document.getElementById('stCoords').textContent = s.coords;
  document.getElementById('stRank').textContent = `Rank ${s.rank} of 50`;

// ---------- ASK ----------
function renderAskLog(s) {
  const log = document.getElementById('askLog');
  const entries = askLog[s.id];
  if (!entries.length) {
    const chips = s.askPreset.map(q => `<button data-q="${q}">${q}</button>`).join('');
    log.innerHTML = `<div class="ask-empty">Questions are answered from this site's measured data.<div class="chips">${chips}</div></div>`;
    log.querySelectorAll('.chips button').forEach(b => b.addEventListener('click', () => { submitAsk(s, b.dataset.q); }));
    return;
  }
  log.innerHTML = entries.map(e => `
    <div class="qa-q">${e.q}</div>
    <div class="qa-a">
      <div class="ai"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.6 6.3L21 9l-5 4.4L17.5 21 12 17.3 6.5 21 8 13.4 3 9l6.4-.7z"/></svg>Sonder</div>
      ${e.a}
      <div class="ev">${e.ev}</div>
    </div>`).join('');
  log.scrollTop = log.scrollHeight;
}

function lookupAnswer(siteId, q) {
  const norm = q.toLowerCase().replace(/[^a-z ]/g, '').trim();
  const bank = ANSWERS[siteId] || {};
  for (const key in bank) {
    const kWords = key.split(' ');
    const hit = kWords.filter(w => norm.includes(w)).length / kWords.length;
    if (norm.includes(key) || hit >= 0.6) return bank[key];
  }
  // keyword fallbacks
  if (/reject|no.?go|fail|why not/.test(norm) && bank['why rejected']) return bank['why rejected'];
  if (/cost|price|expensive|trench|money/.test(norm)) {
    for (const k in bank) if (k.includes('cost') || k.includes('trench')) return bank[k];
  }
  return DEFAULT_ANSWER;
}

function submitAsk(s, q) {
  if (!q.trim()) return;
  const ans = lookupAnswer(s.id, q);
  askLog[s.id].push({ q: q.trim(), a: ans.a, ev: ans.ev });
  renderAskLog(s);
}

function wireAsk(s) {
  const form = document.getElementById('askForm');
  const input = document.getElementById('askInput');
  form.addEventListener('submit', e => {
    e.preventDefault();
    if (!input.value.trim()) return;
    submitAsk(s, input.value);
    input.value = '';
  });
}

// ---------- 360 photo pan ----------
function wirePhoto() {
  const photo = document.getElementById('photo');
  if (!photo) return;
  const scene = photo.querySelector('.scene');
  const hud = document.getElementById('photoHud');
  let dragging = false, startX = 0, pos = 50, base = 50;
  const setPos = p => {
    pos = Math.max(0, Math.min(100, p));
    scene.style.backgroundPosition = `${pos}% 50%`;
    scene.style.backgroundSize = '220% 100%';
    const deg = Math.round((pos - 50) * 1.8);
    hud.textContent = `drag to pan · ${deg}°`;
  };
  setPos(50);
  photo.addEventListener('mousedown', e => { dragging = true; startX = e.clientX; base = pos; photo.style.cursor = 'grabbing'; });
  window.addEventListener('mousemove', e => { if (!dragging) return; setPos(base - (e.clientX - startX) / 4); });
  window.addEventListener('mouseup', () => { dragging = false; if (photo) photo.style.cursor = 'ew-resize'; });
}

// ---------- SELECT SITE ----------
function selectSite(id) {
  activeId = id;
  const s = SITES.find(x => x.id === id);
  renderRail(currentFilter);
  renderReport(s);
  document.getElementById('main').scrollTop = 0;
}

// ---------- SCAN ANIMATION ----------
function runScan(addr, then) {
  const scan = document.getElementById('scan');
  document.getElementById('scanAddr').textContent = addr;
  const steps = scan.querySelectorAll('.scan-step');
  const bar = document.getElementById('scanBar');
  steps.forEach(st => st.classList.remove('done','run'));
  bar.style.width = '0';
  scan.classList.add('show');
  const timings = [120, 560, 1000, 1450];
  steps[0].classList.add('run');
  setTimeout(() => { bar.style.width = '33%'; }, timings[0]);
  setTimeout(() => { steps[0].classList.remove('run'); steps[0].classList.add('done'); steps[1].classList.add('run'); bar.style.width = '66%'; }, timings[1]);
  setTimeout(() => { steps[1].classList.remove('run'); steps[1].classList.add('done'); steps[2].classList.add('run'); bar.style.width = '90%'; }, timings[2]);
  setTimeout(() => { steps[2].classList.remove('run'); steps[2].classList.add('done'); bar.style.width = '100%'; }, timings[3]);
  setTimeout(() => { scan.classList.remove('show'); then && then(); }, timings[3] + 260);
}

// ---------- SEARCH ----------
const KNOWN = {
  '240 elm': 'a', 'elm': 'a', 'davis': 'a',
  '19 holland': 'b', 'holland': 'b',
  '95 highland': 'c', 'highland': 'c'
};
function handleSearch(q) {
  const norm = q.toLowerCase().trim();
  let id = activeId;
  for (const k in KNOWN) if (norm.includes(k)) { id = KNOWN[k]; break; }
  const s = SITES.find(x => x.id === id);
  runScan(s.addr, () => { selectSite(id); toast('Site screened', `${s.addr} loaded, verdict ${s.verdict}.`); });
}

// ---------- TOAST ----------
function toast(title, sub, icon) {
  const wrap = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span class="ti">${icon || '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="m5 12 5 5L20 6" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>'}</span><div class="tt"><b>${title}</b><span>${sub}</span></div>`;
  wrap.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3200);
}

// ---------- FILTER STATE ----------
let currentFilter = 'all';

// ---------- WIRE UP ----------
document.getElementById('searchForm').addEventListener('submit', e => {

  const v = document.getElementById('searchInput').value;

});

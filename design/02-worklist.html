<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonder - Site Triage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5f6f8;
    --panel:#ffffff;
    --ink:#0f172a;
    --ink-2:#475569;
    --ink-3:#94a3b8;
    --line:#e2e8f0;
    --line-2:#eef1f5;
    --blue:#2563eb;
    --blue-soft:#eff4ff;
    --green:#16a34a;
    --green-soft:#e9f7ee;
    --amber:#d97706;
    --amber-soft:#fdf3e3;
    --red:#dc2626;
    --red-soft:#fdecec;
    --shadow:0 1px 2px rgba(15,23,42,.06), 0 4px 14px rgba(15,23,42,.05);
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    font-size:14px;
    line-height:1.4;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  .mono{font-family:'JetBrains Mono',monospace}

  /* ===== App shell ===== */
  .app{display:flex;flex-direction:column;height:100vh}

  /* Top bar */
  .topbar{
    height:54px;display:flex;align-items:center;gap:18px;
    padding:0 18px;background:var(--panel);border-bottom:1px solid var(--line);
    flex-shrink:0;z-index:30;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px;letter-spacing:-.02em}
  .brand .glyph{
    width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#2563eb,#1d4ed8);
    display:grid;place-items:center;flex-shrink:0;
  }
  .brand .glyph span{display:block;width:10px;height:10px;border:2px solid #fff;border-radius:50%}
  .brand small{font-weight:500;color:var(--ink-3);font-size:11px;margin-left:2px;letter-spacing:0}

  .searchwrap{flex:1;max-width:520px;position:relative}
  .searchwrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-3)}
  #addr{
    width:100%;height:36px;padding:0 96px 0 34px;border:1px solid var(--line);
    border-radius:8px;font-size:13px;font-family:inherit;background:#fbfcfe;color:var(--ink);
    transition:border-color .15s, box-shadow .15s;
  }
  #addr:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft);background:#fff}
  #addr::placeholder{color:var(--ink-3)}
  .scanbtn{
    position:absolute;right:5px;top:5px;height:26px;padding:0 12px;border:none;border-radius:6px;
    background:var(--blue);color:#fff;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;
    transition:background .15s,transform .05s;
  }
  .scanbtn:hover{background:#1d4ed8}
  .scanbtn:active{transform:scale(.97)}

  .topright{display:flex;align-items:center;gap:14px;margin-left:auto}
  .proj{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2);font-weight:500}
  .proj .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#64748b,#334155);
    color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700}

  /* Body split */
  .body{display:flex;flex:1;min-height:0}

  /* ===== Worklist ===== */
  .worklist{
    width:340px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;
  }
  .wl-head{padding:14px 16px 12px;border-bottom:1px solid var(--line-2)}
  .wl-title{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
  .wl-title h2{font-size:13px;font-weight:700;letter-spacing:-.01em}
  .wl-title .count{font-size:11px;color:var(--ink-3);font-weight:500}

  .statpins{display:flex;gap:8px;margin-bottom:12px}
  .pin{
    flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fbfcfe;
  }
  .pin .n{font-size:18px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .pin .l{font-size:10px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
  .pin.fin .n{color:var(--green)}

  .controls{display:flex;gap:6px}
  .seg{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;background:#fbfcfe}
  .seg button{
    border:none;background:transparent;padding:5px 9px;font-size:11px;font-weight:600;color:var(--ink-2);
    cursor:pointer;font-family:inherit;transition:background .12s,color .12s;
  }
  .seg button:hover{background:#eef2f7}
  .seg button.on{background:var(--blue);color:#fff}
  .sortwrap{margin-left:auto;position:relative}
  .sortwrap select{
    appearance:none;border:1px solid var(--line);border-radius:7px;background:#fbfcfe;
    padding:5px 26px 5px 9px;font-size:11px;font-weight:600;color:var(--ink-2);font-family:inherit;cursor:pointer;
  }
  .sortwrap::after{content:"";position:absolute;right:9px;top:50%;transform:translateY(-25%);
    border-left:3.5px solid transparent;border-right:3.5px solid transparent;border-top:4px solid var(--ink-3);pointer-events:none}

  .rows{flex:1;overflow-y:auto;padding:6px}
  .rows::-webkit-scrollbar{width:9px}
  .rows::-webkit-scrollbar-thumb{background:#d7dce3;border-radius:9px;border:2px solid var(--panel)}

  .row{
    display:grid;grid-template-columns:30px 1fr auto;gap:10px;align-items:center;
    padding:10px 10px;border-radius:9px;cursor:pointer;border:1px solid transparent;
    transition:background .12s,border-color .12s;position:relative;
  }
  .row:hover{background:#f6f8fb}
  .row.active{background:var(--blue-soft);border-color:#cfe0ff}
  .row.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--blue)}
  .row .rank{font-size:11px;font-weight:700;color:var(--ink-3);text-align:center}
  .row .rank b{display:block;font-size:14px;color:var(--ink);font-weight:800}
  .row .mid .name{font-weight:600;font-size:13px;letter-spacing:-.01em}
  .row .mid .sub{font-size:11px;color:var(--ink-3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px}
  .row .right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .score{font-weight:800;font-size:15px;letter-spacing:-.02em;font-family:'JetBrains Mono',monospace}

  .chip{
    display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;
    padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;
  }
  .chip .cd{width:6px;height:6px;border-radius:50%}
  .chip.go{background:var(--green-soft);color:#0f7a37}
  .chip.go .cd{background:var(--green)}
  .chip.cond{background:var(--amber-soft);color:#a35a05}
  .chip.cond .cd{background:var(--amber)}
  .chip.no{background:var(--red-soft);color:#b91c1c}
  .chip.no .cd{background:var(--red)}
  .score.go{color:var(--green)} .score.cond{color:var(--amber)} .score.no{color:var(--red)}

  /* ===== Dossier ===== */
  .dossier{flex:1;overflow-y:auto;padding:20px 24px 40px;position:relative}
  .dossier::-webkit-scrollbar{width:11px}
  .dossier::-webkit-scrollbar-thumb{background:#d7dce3;border-radius:9px;border:3px solid var(--bg)}

  .crumbs{font-size:12px;color:var(--ink-3);margin-bottom:12px;display:flex;align-items:center;gap:7px}
  .crumbs b{color:var(--ink-2);font-weight:600}

  /* Verdict banner */
  .verdict{
    border-radius:14px;padding:20px 22px;display:flex;align-items:center;gap:22px;margin-bottom:18px;
    border:1px solid var(--line);position:relative;overflow:hidden;
  }
  .verdict.go{background:linear-gradient(105deg,#ecfaf0,#fff);border-color:#bfe8cc}
  .verdict.cond{background:linear-gradient(105deg,#fdf5e6,#fff);border-color:#f1dcb0}
  .verdict.no{background:linear-gradient(105deg,#fdeded,#fff);border-color:#f3c9c9}
  .vbadge{
    width:108px;height:108px;border-radius:16px;display:grid;place-items:center;flex-shrink:0;color:#fff;
    box-shadow:0 8px 22px rgba(15,23,42,.14);
  }
  .verdict.go .vbadge{background:linear-gradient(150deg,#22c55e,#15803d)}
  .verdict.cond .vbadge{background:linear-gradient(150deg,#f59e0b,#b45309)}
  .verdict.no .vbadge{background:linear-gradient(150deg,#ef4444,#b91c1c)}
  .vbadge .word{font-size:21px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .vbadge .sc{font-size:13px;opacity:.92;margin-top:6px;font-family:'JetBrains Mono',monospace;font-weight:600}
  .vmain{flex:1}
  .vmain .addr{font-size:23px;font-weight:800;letter-spacing:-.025em}
  .vmain .place{font-size:13px;color:var(--ink-2);font-weight:500;margin-top:1px}
  .vmain .reason{font-size:14px;color:var(--ink);margin-top:11px;font-weight:500;max-width:560px}
  .vmeta{display:flex;gap:18px;margin-top:13px}
  .vmeta .vm{font-size:11px}
  .vmeta .vm .k{color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:10px}
  .vmeta .vm .v{font-weight:700;font-size:14px;margin-top:2px}

  /* Section grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .card.star{border:1.5px solid #c7d8ff;box-shadow:0 1px 2px rgba(37,99,235,.08),0 6px 18px rgba(37,99,235,.08)}
  .card.span2{grid-column:1 / -1}
  .ch{display:flex;align-items:center;gap:9px;padding:12px 15px;border-bottom:1px solid var(--line-2)}
  .ch h3{font-size:13px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:7px}
  .ch .star-ic{color:#f59e0b}
  .src{
    margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.02em;
    text-transform:uppercase;
  }
  .src.cyvl{background:#eef4ff;color:#1d4ed8}
  .src.cv{background:#f0ecff;color:#6d28d9}
  .src.public{background:#eef1f5;color:#475569}
  .src.flag{background:#fdf3e3;color:#a35a05}
  .cb{padding:14px 15px}

  /* metric rows */
  .metric{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--line-2)}
  .metric:last-child{border-bottom:none}
  .metric .k{color:var(--ink-2);font-size:13px;font-weight:500}
  .metric .v{font-weight:700;font-size:13px;font-family:'JetBrains Mono',monospace}
  .tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;margin-left:7px}
  .tag.pass{background:var(--green-soft);color:#0f7a37}
  .tag.check{background:var(--amber-soft);color:#a35a05}
  .tag.fail{background:var(--red-soft);color:#b91c1c}

  /* cost band */
  .band{margin-top:12px}
  .band .blab{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-3);font-weight:600;margin-bottom:6px}
  .bandbar{display:flex;gap:4px}
  .bandbar .seg2{flex:1;height:9px;border-radius:4px;background:#e9edf2}
  .bandbar .seg2.fill{background:linear-gradient(90deg,#2563eb,#1d4ed8)}
  .bandcost{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-top:9px}
  .bandcost small{font-size:12px;color:var(--ink-3);font-weight:500;margin-left:6px}

  /* Visual tiles */
  .viz{display:grid;grid-template-columns:1.3fr 1fr;gap:14px}
  .tile{border-radius:10px;overflow:hidden;border:1px solid var(--line);position:relative;background:#0b1220;aspect-ratio:16/9}
  .tile.tall{aspect-ratio:auto}
  .tile .label{position:absolute;left:9px;top:9px;font-size:10px;font-weight:700;color:#fff;background:rgba(15,23,42,.6);
    padding:3px 8px;border-radius:6px;backdrop-filter:blur(4px);z-index:2;letter-spacing:.02em}
  .tile svg, .tile .ph{position:absolute;inset:0;width:100%;height:100%;display:block}
  .measure{position:absolute;z-index:2;font-family:'JetBrains Mono',monospace;font-size:10px;color:#dbeafe;
    background:rgba(37,99,235,.32);border:1px solid rgba(147,197,253,.5);padding:1px 5px;border-radius:4px}

  /* photo */
  .ph{background:
    radial-gradient(120% 80% at 30% 10%, #6b7d96 0%, transparent 55%),
    linear-gradient(180deg,#9fb0c4 0%, #61728a 45%, #3d4a5e 75%, #2a3340 100%);
    filter:saturate(.9);
  }
  .ph::after{content:"";position:absolute;inset:0;
    background:
      linear-gradient(90deg, rgba(0,0,0,.18) 0 2px, transparent 2px 80px),
      linear-gradient(0deg, rgba(255,255,255,.05) 0 1px, transparent 1px 40px);
    background-size:80px 100%, 100% 40px;
    -webkit-mask:linear-gradient(180deg,transparent,#000 60%);mask:linear-gradient(180deg,transparent,#000 60%);
    opacity:.5}
  .ph .blur{position:absolute;left:18%;bottom:14%;width:30%;height:46%;background:linear-gradient(160deg,#cfd9e6,#8593a6);
    border-radius:4px;filter:blur(1px);box-shadow:0 4px 14px rgba(0,0,0,.3)}
  .ph .blur.b2{left:55%;bottom:10%;width:26%;height:60%;background:linear-gradient(160deg,#b9c4d4,#6f7d92)}

  /* Verify / flags */
  .verify{display:flex;flex-wrap:wrap;gap:9px}
  .vflag{display:flex;align-items:center;gap:8px;background:#fdf8ee;border:1px solid #f1dcb0;border-radius:8px;
    padding:8px 12px;font-size:12px;font-weight:600;color:#7c4a06}
  .vflag .fi{width:16px;height:16px;border-radius:50%;background:var(--amber);color:#fff;display:grid;place-items:center;
    font-size:11px;font-weight:800;flex-shrink:0}

  /* Ask box */
  .ask{margin-top:16px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .ask .ch{border-bottom:1px solid var(--line-2)}
  .askbody{padding:13px 15px;max-height:240px;overflow-y:auto}
  .qa{margin-bottom:12px}
  .qa:last-child{margin-bottom:0}
  .bubble-q{display:inline-block;background:var(--blue);color:#fff;padding:7px 12px;border-radius:12px 12px 12px 3px;
    font-size:13px;font-weight:500;max-width:80%}
  .bubble-a{display:block;background:#f1f5f9;color:var(--ink);padding:9px 13px;border-radius:3px 12px 12px 12px;
    font-size:13px;margin-top:7px;max-width:88%;border:1px solid var(--line-2)}
  .bubble-a b{color:var(--blue)}
  .qrow{text-align:right}
  .askinput{display:flex;gap:9px;padding:11px 13px;border-top:1px solid var(--line-2)}
  #askq{flex:1;height:36px;border:1px solid var(--line);border-radius:8px;padding:0 12px;font-family:inherit;font-size:13px;background:#fbfcfe}
  #askq:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft);background:#fff}
  .asksend{height:36px;width:38px;border:none;border-radius:8px;background:var(--blue);color:#fff;cursor:pointer;display:grid;place-items:center;transition:background .15s}
  .asksend:hover{background:#1d4ed8}
  .suggest{display:flex;gap:7px;padding:0 13px 12px;flex-wrap:wrap}
  .schip{font-size:11px;font-weight:600;color:var(--ink-2);background:#f1f5f9;border:1px solid var(--line);
    padding:4px 10px;border-radius:20px;cursor:pointer;transition:background .12s}
  .schip:hover{background:#e6ebf2}

  /* Toolbar above dossier */
  .dtoolbar{display:flex;align-items:center;gap:9px;margin-bottom:16px}
  .dtoolbar .spacer{flex:1}
  .btn{
    display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 13px;border-radius:8px;
    font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--line);
    background:#fff;color:var(--ink);transition:background .14s,border-color .14s,transform .05s;
  }
  .btn:hover{background:#f6f8fb;border-color:#d4dce6}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .btn.primary:hover{background:#1d4ed8}
  .btn svg{flex-shrink:0}

  /* Status bar */
  .statusbar{
    height:28px;flex-shrink:0;background:#0f172a;color:#cbd5e1;display:flex;align-items:center;gap:20px;
    padding:0 16px;font-size:11px;font-family:'JetBrains Mono',monospace;
  }
  .statusbar .sd{width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:6px;display:inline-block}
  .statusbar .grow{flex:1}
  .statusbar .il{color:#64748b}

  /* Scan overlay */
  .scanover{
    position:absolute;inset:0;background:rgba(245,246,248,.92);backdrop-filter:blur(3px);
    z-index:20;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;
  }
  .scanover.show{display:flex}
  .scanviz{width:280px;height:150px;border-radius:12px;background:#0b1220;position:relative;overflow:hidden;box-shadow:0 14px 40px rgba(15,23,42,.25)}
  .scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#60a5fa,transparent);
    box-shadow:0 0 12px #3b82f6;animation:sweep 1.1s ease-in-out infinite}
  @keyframes sweep{0%{top:6%}50%{top:92%}100%{top:6%}}
  .scansteps{text-align:center}
  .scansteps .st{font-size:15px;font-weight:700;color:var(--ink);min-height:21px}
  .scansteps .sp{font-size:12px;color:var(--ink-3);margin-top:5px;font-family:'JetBrains Mono',monospace}
  .dots{display:inline-block;width:18px;text-align:left}

  /* Toast */
  .toasts{position:fixed;bottom:46px;right:22px;display:flex;flex-direction:column;gap:10px;z-index:60}
  .toast{
    background:var(--ink);color:#fff;padding:11px 15px;border-radius:10px;font-size:13px;font-weight:500;
    box-shadow:0 10px 30px rgba(15,23,42,.3);display:flex;align-items:center;gap:10px;
    animation:tin .25s ease;min-width:240px;
  }
  .toast .tic{width:20px;height:20px;border-radius:6px;background:var(--green);display:grid;place-items:center;flex-shrink:0}
  @keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .illus{font-size:10.5px;color:var(--ink-3);margin-top:14px;text-align:center;font-style:italic}
</style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <span class="glyph"><span></span></span>
      Sonder <small>site triage</small>
    </div>
    <div class="searchwrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
      <input id="addr" placeholder="Screen a Somerville address..." autocomplete="off">
      <button class="scanbtn" id="scanbtn">Screen</button>
    </div>
    <div class="topright">
      <div class="proj"><span class="dot"></span>Somerville scan <span class="mono" style="color:var(--ink-3)">2024-Q2</span></div>
      <div class="avatar">OP</div>
    </div>
  </header>

  <div class="body">

    <!-- Worklist -->
    <aside class="worklist">
      <div class="wl-head">
        <div class="wl-title">
          <h2>Candidate worklist</h2>
          <span class="count">50 sites</span>
        </div>
        <div class="statpins">
          <div class="pin"><div class="n">50</div><div class="l">Screened</div></div>
          <div class="pin fin"><div class="n">6</div><div class="l">Finalists</div></div>
          <div class="pin"><div class="n">1</div><div class="l">Site visits</div></div>
        </div>
        <div class="controls">
          <div class="seg" id="filterseg">
            <button class="on" data-f="all">All</button>
            <button data-f="go">Go</button>
            <button data-f="cond">Cond</button>
            <button data-f="no">No-go</button>
          </div>
          <div class="sortwrap">
            <select id="sort">
              <option value="score">Score</option>
              <option value="rank">Rank</option>
              <option value="cost">Cost</option>
            </select>
          </div>
        </div>
      </div>
      <div class="rows" id="rows"></div>
    </aside>

    <!-- Dossier -->
    <main class="dossier" id="dossier">
      <div class="scanover" id="scanover">
        <div class="scanviz"><div class="scanline"></div></div>
        <div class="scansteps">
          <div class="st" id="scantext">measuring fit</div>
          <div class="sp" id="scanaddr"></div>
        </div>
      </div>
      <div id="report"></div>
    </main>

  </div>

  <!-- Status bar -->
  <footer class="statusbar">
    <span><span class="sd"></span>Scan loaded</span>
    <span class="il">source: Cyvl street-level 3D LiDAR</span>
    <span class="grow"></span>
    <span id="statsel">240 Elm St selected</span>

function renderRows(){
  let list = SITES.slice();

    return 0;
  });

function bandSegs(level){
  // level 1-4 of 4
  return [1,2,3,4].map(i=>`<div class="seg2 ${i<=level?'fill':''}"></div>`).join('');
}

function lidarSVG(stalls){
  // point-cloud dot field with stall outlines, deterministic
  let dots='';
  let seed=42;
  const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
  for(let i=0;i<420;i++){
    const x=rnd()*100, y=rnd()*100;
    const r=rnd();
    const c = r<0.5?'#3b82f6':r<0.8?'#60a5fa':'#a78bfa';
    const op=(0.25+rnd()*0.6).toFixed(2);
    dots+=`<circle cx="${x.toFixed(1)}%" cy="${y.toFixed(1)}%" r="${(rnd()*1+0.4).toFixed(1)}" fill="${c}" opacity="${op}"/>`;
  }
  let boxes='';
  for(let i=0;i<stalls;i++){
    const x=10+i*(78/Math.max(stalls,1));
    boxes+=`<rect x="${x}%" y="34%" width="${(70/Math.max(stalls,1))}%" height="40%" fill="none" stroke="#7dd3fc" stroke-width="1" stroke-dasharray="4 3" rx="2" opacity=".9"/>`;
  }
  return `<svg viewBox="0 0 100 56" preserveAspectRatio="none">
    <rect width="100" height="56" fill="#0b1220"/>
    ${dots}
    ${boxes}
  </svg>`;
}

function answerFor(s, q){
  const t = q.toLowerCase();
  const a = s.answers || {};
  if(/reject|why|conditional|go\b|verdict/.test(t)) return a.why;
  if(/cost|price|\$|expensive|cheap|budget/.test(t)) return a.cost;
  if(/ada|accessib|path|wheelchair/.test(t)) return a.ada;
  if(/stall|spaces|how many|capacity/.test(t)) return a.stalls;
  return `For <b>${s.addr}</b>: ${s.reason} Ask about the verdict, cost, ADA, or stalls for a grounded answer.`;
}

function askQuestion(s, q){
  if(!q.trim()) return;
  const body = $('#askbody');
  const ans = answerFor(s, q);
  const qa = document.createElement('div');
  qa.className='qa';
  qa.innerHTML = `<div class="qrow"><span class="bubble-q">${escapeHtml(q)}</span></div>`;
  body.appendChild(qa);
  const aEl = document.createElement('div');
  aEl.className='qa';
  aEl.innerHTML = `<span class="bubble-a">...</span>`;
  body.appendChild(aEl);
  body.scrollTop = body.scrollHeight;
  setTimeout(()=>{
    aEl.querySelector('.bubble-a').innerHTML = ans;
    body.scrollTop = body.scrollHeight;
  }, 420);
}

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function wireDossier(s){
  $('#asksend').addEventListener('click',()=>{
    const q=$('#askq').value; askQuestion(s,q); $('#askq').value='';
  });
  $('#askq').addEventListener('keydown',e=>{
    if(e.key==='Enter'){ askQuestion(s,$('#askq').value); $('#askq').value=''; }
  });
  $('#suggest').querySelectorAll('.schip').forEach(c=>{
    c.addEventListener('click',()=>askQuestion(s,c.dataset.q));
  });
  document.querySelectorAll('[data-export]').forEach(b=>{
    b.addEventListener('click',()=>{
      const t=b.dataset.export;
      toast(t==='cad'?`CAD layout exported: ${s.addr.replace(/\s/g,'_')}.dxf`:`PDF report generated: ${s.addr.replace(/\s/g,'_')}_dossier.pdf`);
    });
  });
  const fv=$('#flagvisit');
  if(fv) fv.addEventListener('click',()=>toast(`${s.addr} flagged for site visit`));
}

function selectSite(id){
  activeId = id;
  const s = SITES.find(x=>x.id===id);
  renderRows();
  render(s);
  $('#statsel').textContent = `${s.addr} selected`;
  document.querySelector('.statusbar').querySelector('.il:last-child').textContent = s.tile? `tile: ${s.tile}` : 'tile: --';
  $('#dossier').scrollTop = 0;
}

/* ===== Toasts ===== */
function toast(msg){
  const wrap=$('#toasts');
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=`<span class="tic"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>${escapeHtml(msg)}`;
  wrap.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .3s,transform .3s';t.style.opacity='0';t.style.transform='translateY(8px)';setTimeout(()=>t.remove(),320);},2600);
}

/* ===== Scan animation ===== */
let scanning=false;
function runScan(addr){
  if(scanning) return;
  scanning=true;
  const over=$('#scanover');
  const txt=$('#scantext');
  const sub=$('#scanaddr');
  sub.textContent=addr;
  over.classList.add('show');
  const steps=['measuring fit','locating power','checking zoning','ranking site'];
  let i=0;
  txt.textContent=steps[0];
  const iv=setInterval(()=>{ i++; if(i<steps.length) txt.textContent=steps[i]; },420);
  let dots=0;
  const dv=setInterval(()=>{ dots=(dots+1)%4; txt.textContent=steps[Math.min(i,steps.length-1)]+'.'.repeat(dots); },220);
  const dur=1200+Math.random()*600;
  setTimeout(()=>{
    clearInterval(iv);clearInterval(dv);
    over.classList.remove('show');
    scanning=false;
    // resolve to a site: match known addresses, else default to elm
    const match=SITES.find(s=>s.addr.toLowerCase()===addr.toLowerCase().trim());
    selectSite(match?match.id:'elm');
    if(!match && addr.trim()) toast(`No exact match for "${addr}". Showing 240 Elm St.`);
  }, dur);
}

/* ===== Filters / sort ===== */
$('#filterseg').querySelectorAll('button').forEach(b=>{
  b.addEventListener('click',()=>{
    $('#filterseg').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    filter=b.dataset.f;
    renderRows();
  });
});
$('#sort').addEventListener('change',e=>{ sortBy=e.target.value; renderRows(); });

$('#scanbtn').addEventListener('click',()=>{ const v=$('#addr').value||'240 Elm St'; runScan(v); });
$('#addr').addEventListener('keydown',e=>{ if(e.key==='Enter'){ const v=$('#addr').value||'240 Elm St'; runScan(v); }});

/* ===== Boot ===== */
renderRows();
render(SITES.find(s=>s.id==='elm'));
</script>

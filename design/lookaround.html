<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sonder - Cyvl Street Look-Around</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#070b11;--cyan:#34e3d4;--dim:#6b7d8f;--text:#d3deea;--line:rgba(74,222,210,.22)}
*{margin:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;overflow:hidden}
#bar{position:fixed;top:0;left:0;right:0;height:52px;z-index:10;display:flex;align-items:center;gap:14px;padding:0 16px;
 background:linear-gradient(180deg,rgba(7,11,17,.96),rgba(7,11,17,.6));border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
#bar h1{font-size:14px;font-weight:700;letter-spacing:.18em}#bar .sub{font-size:9px;color:var(--dim);letter-spacing:.2em;margin-top:2px}
#bar .tag{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--cyan);border:1px solid var(--line);border-radius:5px;padding:4px 8px}
#bar .right{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--dim);display:flex;gap:14px}
#bar .right b{color:var(--cyan)}
#panorama{position:absolute;inset:52px 0 64px 0}
#ctl{position:fixed;left:0;right:0;bottom:0;height:64px;z-index:10;display:flex;align-items:center;justify-content:center;gap:16px;
 background:linear-gradient(0deg,rgba(7,11,17,.96),rgba(7,11,17,.5));border-top:1px solid var(--line)}
.btn{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.08em;color:#06221d;background:var(--cyan);border:0;
 padding:10px 18px;border-radius:7px;cursor:pointer}.btn:disabled{opacity:.35;cursor:default}
.hint{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--dim);letter-spacing:.1em}
#pos{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--text)}
.note{position:fixed;bottom:70px;right:14px;z-index:9;font-size:9px;color:var(--dim);font-family:"JetBrains Mono",monospace}
</style></head><body>
<div id="bar"><div><h1>SONDER</h1><div class="sub">CYVL STREET LOOK-AROUND</div></div>
 <span class="tag">UP-369 . Union Square</span>
 <div class="right"><span>frame <b id="rid">-</b></span><span>to pole <b id="rd">-</b> m</span><span>bearing <b id="rb">-</b></span></div></div>
<div id="panorama"></div>
<div id="ctl"><button class="btn" id="prev">&#9664; PREV</button>
 <span id="pos" class="hint">-</span><span class="hint">drag to look around . arrow keys to walk</span>
 <button class="btn" id="next">NEXT &#9654;</button></div>
<div class="note">Real Cyvl 360 street capture. Frames are the actual scan, illustrative for the demo.</div>
<script>
const FRAMES=[{"id": "GS020078_360_1763491635551734_360_3000", "url": "https://dcygqrjfsypox.cloudfront.net/0e9ad4538ce0a1b7876a5bcfd6275a942b2f92472dfa4b85e93f424eb4a62eda/images360/GS020078_360_1763491635551734_360_3000.jpg", "dist": 47.8, "bearing": 66.1}, {"id": "GS020078_360_1763491636551668_360_3000", "url": "https://dcygqrjfsypox.cloudfront.net/0e9ad4538ce0a1b7876a5bcfd6275a942b2f92472dfa4b85e93f424eb4a62eda/images360/GS020078_360_1763491636551668_360_3000.jpg", "dist": 41.7, "bearing": 65.7}, {"id": "GS020078_360_1763491638051570_360_3000", "url": "https://dcygqrjfsypox.cloudfront.net/0e9ad4538ce0a1b7876a5bcfd6275a942b2f92472dfa4b85e93f424eb4a62eda/images360/GS020078_360_1763491638051570_360_3000.jpg", "dist": 34.1, "bearing": 66.1}, {"id": "GS020078_360_1763491639551472_360_3000", "url": "https://dcygqrjfsypox.cloudfront.net/0e9ad4538ce0a1b7876a5bcfd6275a942b2f92472dfa4b85e93f424eb4a62eda/images360/GS020078_360_1763491639551472_360_3000.jpg", "dist": 26.3, "bearing": 65.8}, {"id": "GS020078_360_1763491641051374_360_3000", "url": "https://dcygqrjfsypox.cloudfront.net/0e9ad4538ce0a1b7876a5bcfd6275a942b2f92472dfa4b85e93f424eb4a62eda/images360/GS020078_360_1763491641051374_360_3000.jpg", "dist": 19.5, "bearing": 65.8}, {"id": "GS020078_360_1763491642551276_360_3000", "url": "https://dcygqrjfsypox.cloudfront.net/0e9ad4538ce0a1b7876a5bcfd6275a942b2f92472dfa4b85e93f424eb4a62eda/images360/GS020078_360_1763491642551276_360_3000.jpg", "dist": 12.0, "bearing": 66.2}, {"id": "GS020078_360_1763491644051178_360_3000", "url": "https://dcygqrjfsypox.cloudfront.net/0e9ad4538ce0a1b7876a5bcfd6275a942b2f92472dfa4b85e93f424eb4a62eda/images360/GS020078_360_1763491644051178_360_3000.jpg", "dist": 8.3, "bearing": 66.4}, {"id": "GS020078_360_1763491645551080_360_3000", "url": "https://dcygqrjfsypox.cloudfront.net/0e9ad4538ce0a1b7876a5bcfd6275a942b2f92472dfa4b85e93f424eb4a62eda/images360/GS020078_360_1763491645551080_360_3000.jpg", "dist": 11.7, "bearing": 63.8}, {"id": "GS020078_360_1763491646551014_360_3000", "url": "https://dcygqrjfsypox.cloudfront.net/0e9ad4538ce0a1b7876a5bcfd6275a942b2f92472dfa4b85e93f424eb4a62eda/images360/GS020078_360_1763491646551014_360_3000.jpg", "dist": 16.7, "bearing": 62.6}, {"id": "GS020078_360_1763491647550948_360_3000", "url": "https://dcygqrjfsypox.cloudfront.net/0e9ad4538ce0a1b7876a5bcfd6275a942b2f92472dfa4b85e93f424eb4a62eda/images360/GS020078_360_1763491647550948_360_3000.jpg", "dist": 22.4, "bearing": 61.8}, {"id": "GS020078_360_1763491649050850_360_3000", "url": "https://dcygqrjfsypox.cloudfront.net/0e9ad4538ce0a1b7876a5bcfd6275a942b2f92472dfa4b85e93f424eb4a62eda/images360/GS020078_360_1763491649050850_360_3000.jpg", "dist": 30.4, "bearing": 60.6}, {"id": "GS020078_360_1763491650550752_360_3000", "url": "https://dcygqrjfsypox.cloudfront.net/0e9ad4538ce0a1b7876a5bcfd6275a942b2f92472dfa4b85e93f424eb4a62eda/images360/GS020078_360_1763491650550752_360_3000.jpg", "dist": 39.3, "bearing": 60.0}, {"id": "GS020078_360_1763491652050654_360_3000", "url": "https://dcygqrjfsypox.cloudfront.net/0e9ad4538ce0a1b7876a5bcfd6275a942b2f92472dfa4b85e93f424eb4a62eda/images360/GS020078_360_1763491652050654_360_3000.jpg", "dist": 47.0, "bearing": 60.0}];let i=6;
const scenes={};FRAMES.forEach(f=>scenes[f.id]={type:"equirectangular",panorama:f.url,hfov:110,autoLoad:true});
const v=pannellum.viewer("panorama",{default:{firstScene:FRAMES[i].id,sceneFadeDuration:500,showZoomCtrl:true,showFullscreenCtrl:true,
 crossOrigin:"anonymous",compass:false},scenes});
function paint(){const f=FRAMES[i];
 document.getElementById("rid").textContent=f.id.split("_").slice(-2)[0].slice(-6);
 document.getElementById("rd").textContent=f.dist;document.getElementById("rb").textContent=f.bearing;
 document.getElementById("pos").textContent=(i+1)+" / "+FRAMES.length;
 document.getElementById("prev").disabled=i<=0;document.getElementById("next").disabled=i>=FRAMES.length-1;}
function go(n){const j=Math.max(0,Math.min(FRAMES.length-1,n));if(j===i)return;i=j;v.loadScene(FRAMES[i].id);paint();}
document.getElementById("prev").onclick=()=>go(i-1);
document.getElementById("next").onclick=()=>go(i+1);
addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowUp")go(i+1);if(e.key==="ArrowLeft"||e.key==="ArrowDown")go(i-1);});
paint();
</script></body></html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SONDER COMMAND</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="vendor/leaflet.css"/>
<script src="vendor/leaflet.js"></script>
<style>:root{
  --bg:#0c1018;--bg2:#0e131e;
  --panel:rgba(20,26,40,.72);--panel-solid:#141a28;
  --line:rgba(148,163,200,.10);--line2:rgba(148,163,200,.18);
  --glass-edge:rgba(255,255,255,.05);
  --indigo:#7c89ff;--cyan:#34e3d4;--accent:#5cc8ff;
  --amber:#ffb84d;--red:#ff6b85;--green:#46e08a;
  --text:#e7ecf6;--text2:#aeb8cc;--dim:#6f7a93;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
  --r:14px;--r-sm:10px;--r-xs:7px;
  --grad:linear-gradient(120deg,var(--indigo),var(--cyan));
  --shadow:0 24px 60px -18px rgba(0,0,0,.7),0 2px 10px rgba(0,0,0,.35);
  --shadow-soft:0 14px 38px -16px rgba(0,0,0,.6);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(900px 600px at 82% -8%,rgba(124,137,255,.16),transparent 60%),
    radial-gradient(800px 560px at 4% 108%,rgba(52,227,212,.12),transparent 60%),
    var(--bg)}
.uppr{text-transform:uppercase;letter-spacing:.12em}.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

#map{position:absolute;inset:60px 0 0 58px;background:var(--bg2);isolation:isolate;z-index:0}
.leaflet-container{background:var(--bg2);font-family:var(--sans)}

.leaflet-control-zoom{border:1px solid var(--line2)!important;border-radius:var(--r-sm)!important;overflow:hidden;backdrop-filter:blur(14px) saturate(1.3);box-shadow:var(--shadow-soft);margin:18px!important}
.leaflet-control-zoom a{background:rgba(20,26,40,.78)!important;color:var(--accent)!important;border-bottom:1px solid var(--line)!important;width:36px!important;height:36px!important;line-height:36px!important;font-size:18px!important;font-weight:500;transition:background .15s,color .15s}
.leaflet-control-zoom a:hover{background:rgba(124,137,255,.18)!important;color:#dbe6ff!important}
.leaflet-control-zoom a.leaflet-disabled{opacity:.35!important}

.pin{width:26px;height:26px;border-radius:50%;background:rgba(20,26,40,.9);border:2px solid var(--pc);color:var(--pc);font-family:var(--mono);font-size:11px;font-weight:700;display:grid;place-items:center;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.5);transition:transform .14s cubic-bezier(.34,1.56,.64,1)}
.pin:hover{transform:scale(1.14)}
.pin.sel{background:var(--pc);color:#0b0f17;transform:scale(1.25);box-shadow:0 0 0 4px rgba(255,255,255,.4),0 6px 18px rgba(0,0,0,.55)}

.vig{position:fixed;inset:0;pointer-events:none;z-index:6;box-shadow:inset 0 0 260px 90px rgba(8,11,18,.55)}

.barbase{position:fixed;z-index:16;display:flex;align-items:center;gap:8px;padding:7px;background:var(--panel);border:1px solid var(--line2);border-radius:var(--r);backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px) saturate(1.4);box-shadow:var(--shadow)}
.barbase::after{content:"";position:absolute;inset:0;border-radius:inherit;border-top:1px solid var(--glass-edge);pointer-events:none}

#ctrl{top:74px;left:50%;transform:translateX(calc(-50% + 29px))}
#ctrl .lab{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.14em;padding:0 2px 0 6px}
#ctrl .seg{display:flex;gap:4px}
#ctrl .seg b{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--text2);padding:8px 12px;border-radius:var(--r-xs);cursor:pointer;transition:color .15s,background .15s}
#ctrl .seg b:hover{color:var(--text);background:rgba(124,137,255,.12)}
#ctrl .seg b.on{color:#0b0f17;background:var(--grad);box-shadow:0 4px 14px rgba(92,200,255,.35)}
#ctrl .dv{width:1px;height:22px;background:var(--line2);margin:0 4px}
#ctrl .funnel{display:flex;align-items:center;gap:7px;padding:0 4px}
#ctrl .funnel b{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
#ctrl .funnel b.gr{color:var(--green)}#ctrl .funnel b.cy{color:var(--accent)}
#ctrl .funnel span{font-size:9px;color:var(--dim);letter-spacing:.1em}
#ctrl .funnel i{color:var(--dim);font-style:normal;font-size:13px}
#ctrl .act{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--text2);background:rgba(148,163,200,.05);border:1px solid var(--line2);border-radius:var(--r-xs);padding:8px 13px;cursor:pointer;transition:all .15s}
#ctrl .act:hover{background:rgba(124,137,255,.12);color:var(--text);border-color:var(--line2)}
#ctrl .act.on{color:#1a1206;background:var(--amber);border-color:var(--amber);box-shadow:0 4px 14px rgba(255,184,77,.3)}

#viewbar{bottom:24px;left:50%;transform:translateX(calc(-50% + 29px))}
#viewbar b{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--text2);padding:9px 14px;border-radius:var(--r-xs);cursor:pointer;transition:color .15s,background .15s}
#viewbar b:hover{color:var(--text);background:rgba(124,137,255,.12)}
#viewbar b.on{color:#0b0f17;background:var(--grad);box-shadow:0 4px 14px rgba(92,200,255,.35)}

header{position:fixed;top:0;left:0;right:0;height:60px;z-index:20;display:flex;align-items:center;background:rgba(12,16,24,.78);backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px) saturate(1.4);border-bottom:1px solid var(--line2)}
.brand{display:flex;align-items:center;gap:13px;padding:0 20px;min-width:250px}
.brand h1{font-size:16px;font-weight:700;letter-spacing:.2em;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand .sub{font-size:9.5px;color:var(--dim);letter-spacing:.22em;margin-top:3px;font-weight:500}
.search{flex:1;display:flex;justify-content:center}
.search .box{display:flex;align-items:center;gap:11px;width:min(460px,44vw);background:rgba(20,26,40,.6);border:1px solid var(--line2);border-radius:var(--r-sm);padding:11px 15px;transition:border-color .15s,box-shadow .15s}
.search .box:focus-within{border-color:rgba(124,137,255,.5);box-shadow:0 0 0 4px rgba(124,137,255,.1)}
.search .box input{flex:1;background:none;border:0;outline:0;color:var(--text);font-family:var(--mono);font-size:12.5px}
.search .box input::placeholder{color:var(--dim)}
.search .box .ic{color:var(--accent);font-size:14px}
.search .box .go{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;font-weight:700;color:#082016;background:var(--green);border:0;padding:7px 12px;border-radius:var(--r-xs);cursor:pointer;transition:filter .15s,box-shadow .15s}
.search .box .go:hover{filter:brightness(1.08);box-shadow:0 4px 14px rgba(70,224,138,.35)}
.status{min-width:250px;display:flex;justify-content:flex-end;align-items:center;gap:16px;padding:0 20px}
.live{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:.16em;font-weight:500}
.live .d{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(70,224,138,.16),0 0 12px var(--green);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

.rail{position:fixed;top:60px;bottom:0;left:0;width:58px;z-index:18;display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:18px;background:rgba(12,16,24,.72);backdrop-filter:blur(22px) saturate(1.3);-webkit-backdrop-filter:blur(22px) saturate(1.3);border-right:1px solid var(--line)}
.rail b{width:40px;height:40px;border-radius:var(--r-sm);display:grid;place-items:center;color:var(--dim);font-size:16px;cursor:pointer;transition:all .15s}
.rail b:hover{color:var(--text2);background:rgba(148,163,200,.06)}
.rail b.on{color:var(--accent);background:rgba(124,137,255,.14);border:1px solid var(--line2);box-shadow:inset 0 0 0 1px var(--glass-edge)}

.panel{position:fixed;z-index:15;background:var(--panel);border:1px solid var(--line2);border-radius:var(--r);backdrop-filter:blur(26px) saturate(1.5);-webkit-backdrop-filter:blur(26px) saturate(1.5);box-shadow:var(--shadow)}
.panel::after{content:"";position:absolute;inset:0;border-radius:inherit;border-top:1px solid var(--glass-edge);pointer-events:none}

.cn{display:none}

.ph{display:flex;justify-content:space-between;align-items:center;padding:15px 18px;border-bottom:1px solid var(--line)}
.ph .t{font-size:10.5px;font-weight:600;letter-spacing:.14em;color:var(--text2)}
.ph .n{font-family:var(--mono);font-size:10.5px;color:var(--accent);font-weight:500}

#cmd{top:128px;left:78px;width:268px}
#clist{max-height:46vh;overflow-y:auto;padding:6px}
.row{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:var(--r-sm);border-bottom:0;cursor:pointer;transition:background .14s;position:relative}
.row+.row{margin-top:2px}
.row:hover{background:rgba(148,163,200,.06)}
.row.sel{background:rgba(124,137,255,.14)}
.row.sel::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--grad)}
.row .rk{font-family:var(--mono);font-size:11px;color:var(--dim);width:20px;font-weight:500}
.row .a{font-size:12px;font-weight:500;color:var(--text)}
.row .b{font-size:9px;color:var(--dim);letter-spacing:.06em;margin-top:3px}
.row .sc{font-family:var(--mono);font-size:15px;font-weight:700;margin-left:auto;font-variant-numeric:tabular-nums}
.empty{padding:26px 18px;font-family:var(--mono);font-size:10.5px;color:var(--dim);text-align:center;line-height:1.7}

#rep{top:78px;right:24px;width:382px;max-height:calc(100vh - 102px);overflow-y:auto}
#lg{bottom:24px;right:24px;padding:16px 18px;width:214px}
#lg .lt{font-size:9.5px;color:var(--dim);letter-spacing:.14em;margin-bottom:12px;display:flex;justify-content:space-between;font-weight:500}
#lg .key{display:flex;gap:14px;margin-bottom:12px}
#lg .key span{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:.04em}
#lg .key i{width:10px;height:10px;border-radius:50%;display:inline-block;box-shadow:0 0 8px currentColor}
#lg .note{font-size:9.5px;color:var(--dim);line-height:1.6}
#lg .show{display:flex;align-items:center;gap:5px;margin-top:13px}
#lg .show span{font-size:9px;color:var(--dim);letter-spacing:.1em;margin-right:4px}
#lg .show b{font-family:var(--mono);font-size:9.5px;color:var(--text2);padding:6px 9px;border:1px solid var(--line2);border-radius:var(--r-xs);cursor:pointer;transition:all .15s}
#lg .show b:hover{color:var(--text);border-color:var(--line2);background:rgba(148,163,200,.06)}
#lg .show b.on{color:#0b0f17;background:var(--grad);border-color:transparent;box-shadow:0 3px 10px rgba(92,200,255,.3)}

#allBtn{margin-top:13px;width:100%;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--text2);background:rgba(148,163,200,.05);border:1px solid var(--line2);border-radius:var(--r-xs);padding:9px;cursor:pointer;transition:all .15s}
#allBtn:hover{color:var(--text);border-color:var(--line2);background:rgba(148,163,200,.08)}
#allBtn.on{color:var(--accent);border-color:rgba(124,137,255,.4);background:rgba(124,137,255,.1)}

.rphoto{position:relative;height:172px;border-radius:var(--r) var(--r) 0 0;overflow:hidden;background:#10161f}
.rphoto img{width:100%;height:100%;object-fit:cover;filter:saturate(.95) contrast(1.04)}
.rphoto .gd{position:absolute;inset:0;background:linear-gradient(180deg,transparent 32%,rgba(12,16,24,.96))}
.rphoto .tg{position:absolute;top:12px;left:12px;font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;color:var(--accent);background:rgba(12,16,24,.6);border:1px solid var(--line2);backdrop-filter:blur(8px);padding:4px 9px;border-radius:var(--r-xs)}
.rtop{position:absolute;bottom:13px;left:18px;right:18px;display:flex;justify-content:space-between;align-items:flex-end}
.rtop .id{font-family:var(--mono);font-size:12px;color:var(--text);font-weight:500}
.rtop .nb{color:var(--dim);font-size:9.5px;letter-spacing:.08em;margin-top:3px}
.verdict{text-align:right}
.verdict .vb{font-size:22px;font-weight:800;letter-spacing:.02em;line-height:1}
.verdict .vr{font-size:8.5px;color:var(--dim);letter-spacing:.04em;margin-top:6px;max-width:170px;line-height:1.4}

.rbody{padding:18px}
.blk{margin-bottom:18px}
.blk:last-child{margin-bottom:0}
.blk .bh{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--accent);margin-bottom:10px;font-weight:500}
.blk .bh .src{color:var(--dim);font-size:8.5px;font-weight:400}
.kv{display:flex;justify-content:space-between;font-size:11.5px;padding:5px 0;color:var(--text2)}
.kv .k{color:var(--dim)}
.kv .v{font-family:var(--mono);color:var(--text);font-variant-numeric:tabular-nums}
.pass{color:var(--green)!important}.fail{color:var(--red)!important}.cond{color:var(--amber)!important}
.flagbox{font-size:9.5px;color:var(--amber);background:rgba(255,184,77,.08);border:1px solid rgba(255,184,77,.28);border-radius:var(--r-sm);padding:11px 13px;line-height:1.55}

.econ{display:flex;gap:11px;margin:4px 0 18px}
.ec{flex:1;background:rgba(148,163,200,.05);border:1px solid var(--line2);border-radius:var(--r-sm);padding:13px 9px;text-align:center}
.ec .k{font-size:8px;color:var(--dim);letter-spacing:.1em}
.ec .v{font-family:var(--mono);font-size:18px;font-weight:700;margin-top:7px;font-variant-numeric:tabular-nums;color:var(--text)}

.loader{position:absolute;inset:60px 0 0 58px;z-index:14;display:grid;place-items:center;background:var(--bg);transition:.5s}
.loader.gone{opacity:0;pointer-events:none}
.loader .l{font-family:var(--mono);font-size:12px;letter-spacing:.28em;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:pulse 1.6s ease-in-out infinite}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,137,255,.22);border-radius:6px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:rgba(124,137,255,.4);background-clip:padding-box}</style></head><body>
<div id="map"></div>
<div class="vig"></div>
<div class="loader" id="loader"><div class="l">◴ LINKING CYVL DIGITAL TWIN…</div></div>
<header>
 <div class="brand"><svg width="26" height="26" viewBox="0 0 26 26"><rect x="1" y="1" width="24" height="24" rx="5" stroke="#34e3d4" stroke-width="1.3" opacity=".5"/><path d="M14.5 4 L8 14 H12.5 L11 22 L18 11 H13.5 Z" fill="#34e3d4"/></svg>
  <div><h1>SONDER</h1><div class="sub mono">SITING COMMAND</div></div></div>
 <div class="search"><div class="box"><span class="ic mono">⌖</span><input id="addr" value="Union Square, Somerville MA" spellcheck="false"/><button class="go" id="screenBtn">SCREEN</button></div></div>
 <div class="status"><div class="live"><span class="d"></span>CYVL LIVE</div></div>
</header>
<nav class="rail"><b class="on">◎</b><b>▤</b><b>◈</b><b>⊞</b></nav>
<div id="ctrl" class="barbase mono">
 <div class="funnel"><b id="fnScreen">—</b><span class="uppr">screened</span><i>→</i><b id="fnViable" class="gr">—</b><span class="uppr">viable</span><i>→</i><b id="fnTop" class="cy">—</b><span class="uppr">shown</span></div>
 <div class="dv"></div>
 <button class="act" id="drawBtn">✎ DRAW AREA</button>
 <button class="act" id="resetBtn">RESET</button>
</div>
<div id="viewbar" class="barbase mono"><b data-v="hybrid">HYBRID</b><b data-v="streets">STREETS</b><b data-v="terrain">TERRAIN</b></div>
<section class="panel" id="cmd"><i class="cn tl"></i><i class="cn tr"></i><i class="cn bl"></i><i class="cn br"></i>
 <div class="ph"><span class="t uppr">Ranked Curb Sites</span><span class="n" id="cc">—</span></div><div id="clist"></div></section>
<aside class="panel" id="rep"><i class="cn tl"></i><i class="cn tr"></i><i class="cn bl"></i><i class="cn br"></i>
 <div class="rphoto"><img id="rImg"/><div class="gd"></div><div class="tg uppr">Cyvl · Street Capture</div>
  <div class="rtop"><div><div class="id" id="rId">—</div><div class="nb uppr" id="rNb">—</div></div>
   <div class="verdict"><div class="vb" id="rVerd">—</div><div class="vr" id="rReason"></div></div></div></div>
 <div class="rbody" id="rbody"></div></aside>
<div class="panel" id="lg"><i class="cn tl"></i><i class="cn tr"></i><i class="cn bl"></i><i class="cn br"></i>
 <div class="lt uppr mono"><span>Site Score</span><span id="lgcount"></span></div>
 <div class="key"><span><i style="background:#46e08a"></i>GO</span><span><i style="background:#ffb020"></i>COND</span><span><i style="background:#ff5470"></i>NO-GO</span></div>
 <div class="note">Lines = every scored curb segment. Dots = individual sites, click any to inspect. Green = best.</div>
 <div class="show"><span class="uppr">Show</span><b data-n="25">25</b><b data-n="50" class="on">50</b><b data-n="100">100</b><b data-n="0">ALL</b></div>
</div>
<script src="data.js"></script>
<script>
const M=window.MOCK,S=M.sites,B=M.meta.bounds;let sel=null,map=null,ready=false,curLayers=[],settledOnce=false,renderer=null;
let pinById={},footprint=null,coverage=null,regionBox=null,faint=null,selRing=null,region=null;
let model='l2',armed=false,drawStart=null;
let showN=50;
const FK=['mounting','power','parking','ada','demand'];
const MODELS={
 dcfc:{w:{mounting:.15,power:.30,parking:.15,ada:.10,demand:.30}},   // fast charge: power + demand
 l2:{w:{mounting:.20,power:.10,parking:.35,ada:.15,demand:.20}},     // level 2: parking
 fleet:{w:{mounting:.20,power:.25,parking:.30,ada:.05,demand:.20}}   // fleet depot: space + power
};
const col=s=>{const c1=[255,84,112],c2=[255,176,32],c3=[70,224,138];let a,b,f;if(s<70){f=Math.max(0,(s-40)/30);a=c1;b=c2}else{f=Math.min(1,(s-70)/30);a=c2;b=c3}return`rgb(${[0,1,2].map(i=>Math.round(a[i]+(b[i]-a[i])*f)).join(',')})`};
const vColor=s=>s.score>=75?'#46e08a':s.score>=60?'#ffb020':'#ff5470';
const verdictOf=s=>s.score>=75?['GO','var(--green)']:s.score>=60?['CONDITIONAL','var(--amber)']:['NO-GO','var(--red)'];
function reason(s){if(s.gate)return s.gate+' · screened out';const m=s.m;
 if(s.score>=75)return`${m.stalls} stall${m.stalls!=1?'s':''} fit · ${m.dist_power} m to power · PCI ${m.pci}`;
 if(s.score>=60)return`Fits ${m.stalls} · ${m.dist_power} m to power lifts trench cost`;
 return`${m.dist_power} m power run · ${m.width_ft} ft frontage`}

function applyModel(){const w=MODELS[model].w,sum=FK.reduce((a,k)=>a+w[k],0)||1;
 S.forEach(s=>{const base=Math.round(100*FK.reduce((a,k)=>a+(w[k]/sum)*s.f[k],0)*10)/10;
  s.score=s.gate?0:base;s.pay=Math.round(20+(1-s.score/100)*34)});
 S.sort((a,b)=>b.score-a.score);S.forEach((s,i)=>s.rank=i+1)}
function inRegion(s){return !region||region.contains([s.lat,s.lng])}
function activeSites(){return S.filter(inRegion)}
function topList(){return activeSites().slice(0,showN)}

const DATAB=L.latLngBounds([[B[1],B[0]],[B[3],B[2]]]);
const PAD=0.013, MAXB=L.latLngBounds([[B[1]-PAD*0.7,B[0]-PAD],[B[3]+PAD*0.7,B[2]+PAD]]);
const BASEMAPS={
 hybrid:{base:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',over:['https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}','https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}']},
 streets:{sub:'abcd',base:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png'},
 terrain:{base:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}'}
};
function setBasemap(key){const b=BASEMAPS[key];if(!b||!map)return;
 curLayers.forEach(l=>map.removeLayer(l));curLayers=[];
 const base=L.tileLayer(b.base,b.sub?{maxZoom:20,subdomains:b.sub,keepBuffer:3}:{maxZoom:20,keepBuffer:3});
 base.addTo(map);base.bringToBack();curLayers.push(base);
 (b.over||[]).forEach(u=>{const o=L.tileLayer(u,{maxZoom:20,keepBuffer:3});o.addTo(map);curLayers.push(o)});
 if(!settledOnce)base.on('load',settle);
 document.querySelectorAll('#viewbar b').forEach(x=>x.classList.toggle('on',x.dataset.v===key))}

function init(){
 try{if(typeof L==='undefined')throw 0;
  map=L.map('map',{zoomControl:false,attributionControl:false,zoomSnap:.5,zoomDelta:.5,wheelPxPerZoomLevel:140,
   minZoom:14,maxZoom:19,maxBounds:MAXB,maxBoundsViscosity:1.0,preferCanvas:true}).fitBounds(DATAB,{padding:[50,50]});
  L.control.zoom({position:'bottomleft'}).addTo(map);
  renderer=L.canvas({padding:0.5,tolerance:6});
  setBasemap('hybrid');
  document.querySelectorAll('#viewbar b').forEach(b=>b.onclick=()=>setBasemap(b.dataset.v));
  map.on('mousedown',onDown);map.on('mousemove',onMove);map.on('mouseup',onUp);
 }catch(e){map=null}
 setTimeout(settle,1400);setTimeout(settle,3000);
}
function settle(){if(ready)return;ready=true;settledOnce=true;document.getElementById('loader').classList.add('gone');
 applyModel();drawCoverage();rerender();const t=topList();if(t.length)select(t[0].id)}

function drawCoverage(){if(coverage)map.removeLayer(coverage);
 coverage=L.rectangle(DATAB,{color:'#3ff0e0',weight:1.4,dashArray:'8 6',fill:false,interactive:false,opacity:region?.25:.8}).addTo(map)}
function buildPins(){for(const id in pinById)map.removeLayer(pinById[id]);pinById={};
 topList().forEach(s=>{const m=L.circleMarker([s.lat,s.lng],{renderer,radius:s.score>=70?6:4.5,fillColor:vColor(s),color:'#0a0e14',weight:1.2,fillOpacity:.96});
  m.on('click',()=>select(s.id));m.addTo(map);pinById[s.id]=m})}
function buildFaint(){if(faint){map.removeLayer(faint);faint=null}
 faint=L.layerGroup();
 activeSites().forEach(s=>{if(!s.g||s.g.length<2)return;
  const c=s.gate?'#56697a':col(s.score), op=s.gate?.25:(s.score>=70?.9:.5);
  const pl=L.polyline(s.g.map(p=>[p[1],p[0]]),{renderer,color:c,weight:4,opacity:op,interactive:true});
  pl.on('click',()=>select(s.id));pl.addTo(faint)});
 faint.addTo(map)}
function showFootprint(s){if(footprint)map.removeLayer(footprint);
 const wM=Math.max(5,s.m.stalls*2.7)*1.6,dM=5.5*1.6;
 const dLat=dM/111320,dLng=wM/(111320*Math.cos(s.lat*Math.PI/180));
 footprint=L.rectangle([[s.lat-dLat/2,s.lng-dLng/2],[s.lat+dLat/2,s.lng+dLng/2]],{color:'#fff',weight:1.4,fillColor:vColor(s),fillOpacity:.4,interactive:false}).addTo(map)}
function highlightPins(){document.querySelectorAll('.pin').forEach(p=>p.classList.toggle('sel',p.dataset.id===sel))}

function rerender(){const list=topList(),active=activeSites();
 const viable=active.filter(s=>s.score>=70).length;
 document.getElementById('cc').textContent=active.length+' SITES';
 document.getElementById('lgcount').textContent=viable+' GO / '+active.length;
 const fS=document.getElementById('fnScreen');if(fS){fS.textContent=active.length;document.getElementById('fnViable').textContent=viable;document.getElementById('fnTop').textContent=list.length}
 const cl=document.getElementById('clist');cl.innerHTML='';
 if(!list.length){cl.innerHTML='<div class="empty">No scanned sites in this region.<br>Draw a box over the coverage area.</div>'}
 list.slice(0,60).forEach(s=>{const r=document.createElement('div');r.className='row'+(s.id===sel?' sel':'');
  r.innerHTML=`<div class="rk">${String(s.rank).padStart(2,'0')}</div><div style="min-width:0;flex:1"><div class="a" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.addr}</div><div class="b uppr">${s.nb} · ${s.id}</div></div><div class="sc" style="color:${col(s.score)}">${s.gate?'—':s.score}</div>`;
  r.onclick=()=>{if(map)map.flyTo([s.lat,s.lng],17,{duration:.6});select(s.id)};cl.appendChild(r)});
 buildPins();buildFaint();
 if(sel&&!inRegion(S.find(x=>x.id===sel))){if(list.length)select(list[0].id)}}

function reportSkeleton(s){const m=s.m;
 const adaTxt=m.ada_mapped?(m.ada_pass?`PASS · ramp ${m.dist_ada} m`:`ramp ${m.dist_ada} m`):'NOT MAPPED · VERIFY';
 const adaCls=m.ada_mapped?(m.ada_pass?'pass':'cond'):'cond';
 document.getElementById('rbody').innerHTML=`
  <div class="econ"><div class="ec"><div class="k uppr">Score</div><div class="v" style="color:${col(s.score)}">${s.gate?'—':s.score}</div></div>
   <div class="ec"><div class="k uppr">Est. connect</div><div class="v">$${(s.cost/1000).toFixed(0)}K</div></div>
   <div class="ec"><div class="k uppr">Payback</div><div class="v">${s.pay}<small style="color:var(--dim);font-size:9px"> mo</small></div></div></div>
  <div class="blk"><div class="bh"><span>① PHYSICAL FIT</span><span class="src">cyvl</span></div>
   <div class="kv"><span class="k">Usable frontage</span><span class="v">${m.frontage_ft} ft</span></div>
   <div class="kv"><span class="k">Road width</span><span class="v">${m.width_ft} ft</span></div>
   <div class="kv"><span class="k">Stalls that fit (5.5 m)</span><span class="v">${m.stalls}</span></div></div>
  <div class="blk"><div class="bh"><span>② CONNECTION COST</span><span class="src">cyvl</span></div>
   <div class="kv"><span class="k">Distance to power</span><span class="v">${m.dist_power} m</span></div>
   <div class="kv"><span class="k">Trench length</span><span class="v">${Math.round(m.dist_power*1.2+4)} m</span></div>
   <div class="kv"><span class="k">Surface · PCI</span><span class="v">${m.surface} · ${m.pci}</span></div></div>
  <div class="blk"><div class="bh"><span>③ ACCESS & OBSTRUCTIONS</span><span class="src">cyvl</span></div>
   <div class="kv"><span class="k">ADA ramp</span><span class="v ${adaCls}">${adaTxt}</span></div>
   <div class="kv"><span class="k">Obstructions ≤8 m</span><span class="v ${m.n_obst>2?'cond':'pass'}">${m.n_obst}</span></div>
   <div class="kv"><span class="k">Fire lane</span><span class="v ${m.fire?'fail':'pass'}">${m.fire?'YES':'none'}</span></div></div>
  <div class="blk"><div class="bh"><span>④ DEMAND</span><span class="src">proxy</span></div>
   <div class="kv"><span class="k">Street activity</span><span class="v">${m.activity} markings ≤45 m</span></div>
   <div class="kv"><span class="k">Traffic / AADT</span><span class="v" style="color:var(--dim)">MassDOT · not loaded</span></div></div>
  <div class="blk"><div class="bh"><span>⑤ VERIFY ON SITE</span><span class="src">flag</span></div>
   <div class="flagbox">Zoning · grid capacity · host willingness · final permit${m.ada_mapped?'':' · ADA ramp'} — not in this export, flagged.</div></div>`}
function resolveVerdict(s){const[vl,vc]=verdictOf(s);const v=document.getElementById('rVerd');v.textContent=vl;v.style.color=vc;document.getElementById('rReason').textContent=reason(s)}
function select(id){sel=id;const s=S.find(x=>x.id===id);if(!s)return;
 document.getElementById('rId').textContent=s.addr;document.getElementById('rNb').textContent=s.nb+' · '+s.id;
 document.getElementById('rImg').src=s.img;reportSkeleton(s);resolveVerdict(s);
 document.querySelectorAll('#clist .row').forEach((r,i)=>r.classList.toggle('sel',topList()[i]&&topList()[i].id===id));
 showFootprint(s);
 if(selRing)map.removeLayer(selRing);
 selRing=L.circleMarker([s.lat,s.lng],{renderer,radius:9,fill:false,color:'#ffffff',weight:2,interactive:false}).addTo(map)}

// region draw
function setModel(m){model=m;document.querySelectorAll('#ctrl .seg b').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
 applyModel();rerender();const t=topList();if(t.length)select(t[0].id)}
function setRegion(b){region=b;if(regionBox){map.removeLayer(regionBox);regionBox=null}
 if(region)regionBox=L.rectangle(region,{color:'#ffb020',weight:1.6,dashArray:'6 4',fillColor:'#ffb020',fillOpacity:.06,interactive:false}).addTo(map);
 drawCoverage();rerender();const t=topList();if(t.length&&(!sel||!inRegion(S.find(x=>x.id===sel))))select(t[0].id)}
function onDown(e){if(!armed)return;drawStart=e.latlng;if(regionBox){map.removeLayer(regionBox);regionBox=null}
 regionBox=L.rectangle([drawStart,drawStart],{color:'#ffb020',weight:1.6,dashArray:'6 4',fillColor:'#ffb020',fillOpacity:.06,interactive:false}).addTo(map)}
function onMove(e){if(!armed||!drawStart)return;regionBox.setBounds(L.latLngBounds(drawStart,e.latlng))}
function onUp(e){if(!armed||!drawStart)return;const b=L.latLngBounds(drawStart,e.latlng);armed=false;drawStart=null;
 map.dragging.enable();map.getContainer().style.cursor='';document.getElementById('drawBtn').classList.remove('on');
 if(b.getNorth()-b.getSouth()<0.0004){if(regionBox){map.removeLayer(regionBox);regionBox=null}return}
 setRegion(b)}
document.getElementById('drawBtn').onclick=function(){armed=!armed;this.classList.toggle('on',armed);
 if(armed){map.dragging.disable();map.getContainer().style.cursor='crosshair'}else{map.dragging.enable();map.getContainer().style.cursor=''}};
document.getElementById('resetBtn').onclick=()=>{armed=false;document.getElementById('drawBtn').classList.remove('on');
 if(map){map.dragging.enable();map.getContainer().style.cursor='';map.flyToBounds(DATAB,{padding:[50,50],duration:.6})}setRegion(null)};
document.querySelectorAll('#lg .show b').forEach(b=>b.onclick=()=>{showN=(+b.dataset.n)||100000;
 document.querySelectorAll('#lg .show b').forEach(x=>x.classList.toggle('on',x===b));rerender();if(sel)select(sel)});
document.getElementById('screenBtn').onclick=()=>{if(sel&&map){const s=S.find(x=>x.id===sel);map.flyTo([s.lat,s.lng],17,{duration:.6})}};
init();
</script>
<script src="bigscreen.js"></script>
</body></html>

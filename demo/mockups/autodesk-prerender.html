<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Autodesk · Generating pre-render</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--accent:#39D6FF;--dim:#9CA5AC;--text:#E8EDEF;--mono:'IBM Plex Mono',monospace;--sans:'Hanken Grotesk',sans-serif}
*{margin:0;box-sizing:border-box}
html,body{height:100%;background:#0A0D10;color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(1200px 700px at 50% 32%,rgba(57,214,255,.07),transparent 60%)}
.wrap{position:relative;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:24px;text-align:center}
.adsk{display:flex;align-items:center;gap:11px;opacity:.92}
.adsk .mark{width:30px;height:30px;background:#0696D7;border-radius:5px;display:grid;place-items:center}
.adsk .mark svg{display:block}
.adsk .wm{font-weight:700;letter-spacing:.02em;font-size:17px}
.adsk .wm small{display:block;font-size:9px;font-weight:500;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;margin-top:1px}
.ring{width:64px;height:64px;border:3px solid rgba(57,214,255,.18);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:19px;font-weight:600;letter-spacing:.01em}
.site{font-family:var(--mono);font-size:12px;color:var(--accent);margin-top:-14px}
.bar{width:min(420px,82vw);height:6px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden}
.bar i{display:block;height:100%;width:6%;border-radius:6px;background:linear-gradient(90deg,#0696D7,var(--accent));transition:width 1.1s cubic-bezier(.2,.7,.2,1)}
.status{font-family:var(--mono);font-size:11.5px;color:var(--dim);letter-spacing:.02em;min-height:16px}
.note{font-size:11px;color:var(--dim);opacity:.7;max-width:380px;line-height:1.5}
.dots::after{content:'';animation:dots 1.4s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
</style></head><body>
<div class="bg"></div>
<div class="wrap">
  <div class="adsk">
    <span class="mark"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 12 L9 2 L11 2 L6.2 9 L14 9 L14 12 Z" fill="#fff"/></svg></span>
    <span class="wm">Autodesk<small>Platform Services</small></span>
  </div>
  <div class="ring"></div>
  <h1>Generating Autodesk pre-render<span class="dots"></span></h1>
  <div class="site" id="site">—</div>
  <div class="bar"><i id="fill"></i></div>
  <div class="status" id="status">Queued…</div>
  <div class="note">Reconstructing the curb from the Cyvl LiDAR scan and translating to SVF2 for the interactive viewer. This site has not been pre-baked yet, so it can take a while.</div>
</div>
<script>
const p=new URLSearchParams(location.search);
const addr=p.get('addr')||'', id=p.get('site')||'';
document.getElementById('site').textContent=[addr,id].filter(Boolean).join('  ·  ')||'Selected site';
// crawl toward a near-complete state, then stall there forever — it never finishes
const steps=[
 [12,'Uploading point cloud tile to OSS…'],
 [26,'Classifying ground (PDAL SMRF)…'],
 [41,'Splitting road / sidewalk from drive paths…'],
 [58,'Detecting parked cars (DBSCAN)…'],
 [69,'Lifting Cyvl CV detections into 3D…'],
 [78,'Extruding building footprints…'],
 [86,'Writing OBJ + MTL scene…'],
 [92,'Translating to SVF2 (Model Derivative)…']
];
const fill=document.getElementById('fill'), status=document.getElementById('status');
let i=0;
function tick(){
 if(i<steps.length){fill.style.width=steps[i][0]+'%';status.textContent=steps[i][1];i++;setTimeout(tick,1500);}
 else{status.textContent='Translating to SVF2 (Model Derivative)…';
  // tiny jitter so it looks alive but stays stuck just shy of done
  let w=92;setInterval(()=>{w=92+Math.round(Math.sin(Date.now()/700)*1.4);fill.style.width=w+'%';},700);}
}
setTimeout(tick,600);
</script>
</body></html>

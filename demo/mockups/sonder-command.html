<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SONDER COMMAND</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="vendor/leaflet.css"/>
<script src="vendor/leaflet.js"></script>
<style>
:root{--bg:#070b11;--panel:rgba(9,13,20,.96);--line:rgba(74,222,210,.14);--line2:rgba(74,222,210,.32);
--cyan:#34e3d4;--amber:#ffb020;--red:#ff5470;--green:#46e08a;--text:#d3deea;--dim:#6b7d8f;
--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
.uppr{text-transform:uppercase;letter-spacing:.14em}.mono{font-family:var(--mono)}
#map{position:absolute;inset:54px 0 0 50px;background:#060a0f;isolation:isolate;z-index:0}
.leaflet-container{background:#060a0f}
.leaflet-control-zoom{border:1px solid var(--line2)!important;border-radius:8px!important;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.leaflet-control-zoom a{background:rgba(9,13,20,.96)!important;color:var(--cyan)!important;border-bottom:1px solid var(--line)!important;width:32px!important;height:32px!important;line-height:32px!important;font-size:17px!important}
.leaflet-control-zoom a:hover{background:rgba(74,222,210,.12)!important;color:#bff7f0!important}
.leaflet-control-zoom a.leaflet-disabled{opacity:.4!important}
.pin{width:24px;height:24px;border-radius:50%;background:rgba(9,13,20,.92);border:2px solid var(--pc);color:var(--pc);font-family:var(--mono);font-size:11px;font-weight:700;display:grid;place-items:center;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.55);transition:transform .12s}
.pin:hover{transform:scale(1.12)}
.pin.sel{background:var(--pc);color:#06121a;transform:scale(1.22);box-shadow:0 0 0 3px rgba(255,255,255,.55),0 2px 12px rgba(0,0,0,.6)}
.vig{position:fixed;inset:0;pointer-events:none;z-index:6;box-shadow:inset 0 0 200px 60px rgba(0,0,0,.5)}
.barbase{position:fixed;z-index:16;display:flex;align-items:center;gap:6px;padding:5px;background:rgba(7,11,17,.94);border:1px solid var(--line2);border-radius:9px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
#ctrl{top:62px;left:50%;transform:translateX(calc(-50% + 25px))}
#ctrl .lab{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:.14em;padding:0 2px 0 5px}
#ctrl .seg{display:flex;gap:3px}
#ctrl .seg b{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--dim);padding:6px 9px;border-radius:5px;cursor:pointer}
#ctrl .seg b:hover{color:var(--text);background:rgba(74,222,210,.08)}
#ctrl .seg b.on{color:#06221d;background:var(--cyan)}
#ctrl .dv{width:1px;height:18px;background:var(--line2);margin:0 2px}
#ctrl .funnel{display:flex;align-items:center;gap:5px}
#ctrl .funnel b{font-size:13px;font-weight:700;color:var(--text)}
#ctrl .funnel b.gr{color:var(--green)}#ctrl .funnel b.cy{color:var(--cyan)}
#ctrl .funnel span{font-size:8px;color:var(--dim);letter-spacing:.1em}
#ctrl .funnel i{color:var(--dim);font-style:normal}
#ctrl .act{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--text);background:transparent;border:1px solid var(--line);border-radius:5px;padding:6px 10px;cursor:pointer}
#ctrl .act:hover{background:rgba(74,222,210,.08)}
#ctrl .act.on{color:#1a1206;background:var(--amber);border-color:var(--amber)}
#viewbar{bottom:18px;left:50%;transform:translateX(calc(-50% + 25px))}
#viewbar b{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--dim);padding:7px 11px;border-radius:6px;cursor:pointer;transition:color .15s,background .15s}
#viewbar b:hover{color:var(--text);background:rgba(74,222,210,.08)}
#viewbar b.on{color:#06221d;background:var(--cyan)}
header{position:fixed;top:0;left:0;right:0;height:54px;z-index:20;display:flex;align-items:center;background:linear-gradient(180deg,rgba(7,11,17,.98),rgba(7,11,17,.93));border-bottom:1px solid var(--line2)}
.brand{display:flex;align-items:center;gap:11px;padding:0 16px;min-width:230px}
.brand h1{font-size:15px;font-weight:700;letter-spacing:.22em}.brand .sub{font-size:9px;color:var(--dim);letter-spacing:.22em;margin-top:2px}
.search{flex:1;display:flex;justify-content:center}
.search .box{display:flex;align-items:center;gap:9px;width:min(420px,42vw);background:rgba(8,14,20,.9);border:1px solid var(--line2);border-radius:8px;padding:9px 13px}
.search .box input{flex:1;background:none;border:0;outline:0;color:var(--text);font-family:var(--mono);font-size:12px}
.search .box .ic{color:var(--cyan)}.search .box .go{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:#06221d;background:var(--cyan);border:0;padding:5px 9px;border-radius:5px;cursor:pointer}
.status{min-width:230px;display:flex;justify-content:flex-end;align-items:center;gap:14px;padding:0 16px}
.live{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:.16em}
.live .d{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.rail{position:fixed;top:54px;bottom:0;left:0;width:50px;z-index:18;display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:14px;background:rgba(7,11,17,.9);border-right:1px solid var(--line)}
.rail b{width:34px;height:34px;border-radius:7px;display:grid;place-items:center;color:var(--dim);font-size:14px;cursor:pointer}
.rail b.on{color:var(--cyan);background:rgba(74,222,210,.08);border:1px solid var(--line2)}
.panel{position:fixed;z-index:15;background:var(--panel);border:1px solid var(--line2);border-radius:10px;box-shadow:0 18px 50px rgba(0,0,0,.55)}
.cn{position:absolute;width:8px;height:8px;border:1px solid var(--cyan);opacity:.5}
.cn.tl{top:-1px;left:-1px;border-right:0;border-bottom:0}.cn.tr{top:-1px;right:-1px;border-left:0;border-bottom:0}
.cn.bl{bottom:-1px;left:-1px;border-right:0;border-top:0}.cn.br{bottom:-1px;right:-1px;border-left:0;border-top:0}
.ph{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line)}
.ph .t{font-size:10px;font-weight:600;letter-spacing:.16em}.ph .n{font-family:var(--mono);font-size:10px;color:var(--cyan)}
#cmd{top:104px;left:64px;width:236px}#clist{max-height:46vh;overflow-y:auto}
.row{display:flex;align-items:center;gap:9px;padding:8px 13px;border-bottom:1px solid rgba(74,222,210,.06);cursor:pointer}
.row:hover{background:rgba(74,222,210,.06)}.row.sel{background:rgba(74,222,210,.12);border-left:2px solid var(--cyan)}
.row .rk{font-family:var(--mono);font-size:10px;color:var(--dim);width:18px}
.row .a{font-size:11px;font-weight:500}.row .b{font-size:8.5px;color:var(--dim);letter-spacing:.08em;margin-top:1px}
.row .sc{font-family:var(--mono);font-size:13px;font-weight:700;margin-left:auto}
.empty{padding:18px 14px;font-family:var(--mono);font-size:10px;color:var(--dim);text-align:center;line-height:1.6}
#rep{top:70px;right:18px;width:360px;max-height:calc(100vh - 90px);overflow-y:auto}
#lg{bottom:18px;right:18px;padding:10px 13px;width:198px}
#lg .lt{font-size:8.5px;color:var(--dim);letter-spacing:.14em;margin-bottom:8px;display:flex;justify-content:space-between}
#lg .key{display:flex;gap:12px;margin-bottom:8px}
#lg .key span{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:8.5px;color:var(--text)}
#lg .key i{width:9px;height:9px;border-radius:50%;display:inline-block}
#lg .note{font-size:8.5px;color:var(--dim);line-height:1.45}
#lg .show{display:flex;align-items:center;gap:4px;margin-top:9px}
#lg .show span{font-size:8px;color:var(--dim);letter-spacing:.12em;margin-right:3px}
#lg .show b{font-family:var(--mono);font-size:9px;color:var(--dim);padding:4px 7px;border:1px solid var(--line);border-radius:4px;cursor:pointer}
#lg .show b:hover{color:var(--text)}
#lg .show b.on{color:#06221d;background:var(--cyan);border-color:var(--cyan)}
#allBtn{margin-top:9px;width:100%;font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;color:var(--dim);background:transparent;border:1px solid var(--line);border-radius:5px;padding:6px;cursor:pointer}
#allBtn:hover{color:var(--text);border-color:var(--line2)}#allBtn.on{color:var(--cyan);border-color:var(--line2);background:rgba(74,222,210,.06)}
.rphoto{position:relative;height:158px;border-radius:9px 9px 0 0;overflow:hidden;background:#0d141d}
.rphoto img{width:100%;height:100%;object-fit:cover;filter:saturate(.92) contrast(1.05)}
.rphoto .gd{position:absolute;inset:0;background:linear-gradient(180deg,transparent 36%,rgba(9,13,20,.97))}
.rphoto .tg{position:absolute;top:9px;left:9px;font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:var(--cyan);background:rgba(7,11,17,.7);border:1px solid var(--line2);padding:3px 7px;border-radius:4px}
.rtop{position:absolute;bottom:9px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:flex-end}
.rtop .id{font-family:var(--mono);font-size:11px}.rtop .nb{color:var(--dim);font-size:9px;letter-spacing:.1em;margin-top:2px}
.verdict{text-align:right}.verdict .vb{font-size:19px;font-weight:800;letter-spacing:.04em;line-height:1}.verdict .vr{font-size:8px;color:var(--dim);letter-spacing:.06em;margin-top:4px;max-width:160px}
.rbody{padding:12px 15px}
.blk{margin-bottom:11px}
.blk .bh{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--cyan);margin-bottom:7px}
.blk .bh .src{color:var(--dim);font-size:8px}
.kv{display:flex;justify-content:space-between;font-size:10.5px;padding:3px 0;color:var(--text)}
.kv .k{color:var(--dim)}.kv .v{font-family:var(--mono)}
.pass{color:var(--green)}.fail{color:var(--red)}.cond{color:var(--amber)}
.flagbox{font-size:9px;color:var(--amber);background:rgba(255,176,32,.07);border:1px solid rgba(255,176,32,.25);border-radius:6px;padding:8px 10px}
.econ{display:flex;gap:9px;margin:10px 0}
.ec{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:7px;padding:9px;text-align:center}
.ec .k{font-size:7.5px;color:var(--dim);letter-spacing:.12em}.ec .v{font-family:var(--mono);font-size:15px;font-weight:700;margin-top:5px}
.loader{position:absolute;inset:54px 0 0 50px;z-index:14;display:grid;place-items:center;background:var(--bg);transition:.5s}
.loader.gone{opacity:0;pointer-events:none}.loader .l{font-family:var(--mono);color:var(--cyan);font-size:12px;letter-spacing:.3em}
::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{background:rgba(74,222,210,.2);border-radius:4px}
</style></head><body>
<div id="map"></div>
<div class="vig"></div>
<div class="loader" id="loader"><div class="l">◴ LINKING CYVL DIGITAL TWIN…</div></div>
<header>
 <div class="brand"><svg width="26" height="26" viewBox="0 0 26 26"><rect x="1" y="1" width="24" height="24" rx="5" stroke="#34e3d4" stroke-width="1.3" opacity=".5"/><path d="M14.5 4 L8 14 H12.5 L11 22 L18 11 H13.5 Z" fill="#34e3d4"/></svg>
  <div><h1>SONDER</h1><div class="sub mono">SITING COMMAND</div></div></div>
 <div class="search"><div class="box"><span class="ic mono">⌖</span><input id="addr" value="Union Square, Somerville MA" spellcheck="false"/><button class="go" id="screenBtn">SCREEN</button></div></div>
 <div class="status"><div class="live"><span class="d"></span>CYVL LIVE</div></div>
</header>
<nav class="rail"><b class="on">◎</b><b>▤</b><b>◈</b><b>⊞</b></nav>
<div id="ctrl" class="barbase mono">
 <div class="funnel"><b id="fnScreen">—</b><span class="uppr">screened</span><i>→</i><b id="fnViable" class="gr">—</b><span class="uppr">viable</span><i>→</i><b id="fnTop" class="cy">—</b><span class="uppr">shown</span></div>
 <div class="dv"></div>
 <button class="act" id="drawBtn">✎ DRAW AREA</button>
 <button class="act" id="resetBtn">RESET</button>
</div>
<div id="viewbar" class="barbase mono"><b data-v="hybrid">HYBRID</b><b data-v="streets">STREETS</b><b data-v="terrain">TERRAIN</b></div>
<section class="panel" id="cmd"><i class="cn tl"></i><i class="cn tr"></i><i class="cn bl"></i><i class="cn br"></i>
 <div class="ph"><span class="t uppr">Ranked Curb Sites</span><span class="n" id="cc">—</span></div><div id="clist"></div></section>
<aside class="panel" id="rep"><i class="cn tl"></i><i class="cn tr"></i><i class="cn bl"></i><i class="cn br"></i>
 <div class="rphoto"><img id="rImg"/><div class="gd"></div><div class="tg uppr">Cyvl · Street Capture</div>
  <div class="rtop"><div><div class="id" id="rId">—</div><div class="nb uppr" id="rNb">—</div></div>
   <div class="verdict"><div class="vb" id="rVerd">—</div><div class="vr" id="rReason"></div></div></div></div>
 <div class="rbody" id="rbody"></div></aside>
<div class="panel" id="lg"><i class="cn tl"></i><i class="cn tr"></i><i class="cn bl"></i><i class="cn br"></i>
 <div class="lt uppr mono"><span>Site Score</span><span id="lgcount"></span></div>
 <div class="key"><span><i style="background:#46e08a"></i>GO</span><span><i style="background:#ffb020"></i>COND</span><span><i style="background:#ff5470"></i>NO-GO</span></div>
 <div class="note">Lines = every scored curb segment. Dots = individual sites, click any to inspect. Green = best.</div>
 <div class="show"><span class="uppr">Show</span><b data-n="25">25</b><b data-n="50" class="on">50</b><b data-n="100">100</b><b data-n="0">ALL</b></div>
</div>
<script src="data.js"></script>
<script>
const M=window.MOCK,S=M.sites,B=M.meta.bounds;let sel=null,map=null,ready=false,curLayers=[],settledOnce=false,renderer=null;
let pinById={},footprint=null,coverage=null,regionBox=null,faint=null,selRing=null,region=null;
let model='l2',armed=false,drawStart=null;
let showN=50;
const FK=['mounting','power','parking','ada','demand'];
const MODELS={
 dcfc:{w:{mounting:.15,power:.30,parking:.15,ada:.10,demand:.30}},   // fast charge: power + demand
 l2:{w:{mounting:.20,power:.10,parking:.35,ada:.15,demand:.20}},     // level 2: parking
 fleet:{w:{mounting:.20,power:.25,parking:.30,ada:.05,demand:.20}}   // fleet depot: space + power
};
const col=s=>{const c1=[255,84,112],c2=[255,176,32],c3=[70,224,138];let a,b,f;if(s<70){f=Math.max(0,(s-40)/30);a=c1;b=c2}else{f=Math.min(1,(s-70)/30);a=c2;b=c3}return`rgb(${[0,1,2].map(i=>Math.round(a[i]+(b[i]-a[i])*f)).join(',')})`};
const vColor=s=>s.score>=75?'#46e08a':s.score>=60?'#ffb020':'#ff5470';
const verdictOf=s=>s.score>=75?['GO','var(--green)']:s.score>=60?['CONDITIONAL','var(--amber)']:['NO-GO','var(--red)'];
function reason(s){if(s.gate)return s.gate+' · screened out';const m=s.m;
 if(s.score>=75)return`${m.stalls} stall${m.stalls!=1?'s':''} fit · ${m.dist_power} m to power · PCI ${m.pci}`;
 if(s.score>=60)return`Fits ${m.stalls} · ${m.dist_power} m to power lifts trench cost`;
 return`${m.dist_power} m power run · ${m.width_ft} ft frontage`}

function applyModel(){const w=MODELS[model].w,sum=FK.reduce((a,k)=>a+w[k],0)||1;
 S.forEach(s=>{const base=Math.round(100*FK.reduce((a,k)=>a+(w[k]/sum)*s.f[k],0)*10)/10;
  s.score=s.gate?0:base;s.pay=Math.round(20+(1-s.score/100)*34)});
 S.sort((a,b)=>b.score-a.score);S.forEach((s,i)=>s.rank=i+1)}
function inRegion(s){return !region||region.contains([s.lat,s.lng])}
function activeSites(){return S.filter(inRegion)}
function topList(){return activeSites().slice(0,showN)}

const DATAB=L.latLngBounds([[B[1],B[0]],[B[3],B[2]]]);
const PAD=0.013, MAXB=L.latLngBounds([[B[1]-PAD*0.7,B[0]-PAD],[B[3]+PAD*0.7,B[2]+PAD]]);
const BASEMAPS={
 hybrid:{base:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',over:['https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}','https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}']},
 streets:{sub:'abcd',base:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png'},
 terrain:{base:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}'}
};
function setBasemap(key){const b=BASEMAPS[key];if(!b||!map)return;
 curLayers.forEach(l=>map.removeLayer(l));curLayers=[];
 const base=L.tileLayer(b.base,b.sub?{maxZoom:20,subdomains:b.sub,keepBuffer:3}:{maxZoom:20,keepBuffer:3});
 base.addTo(map);base.bringToBack();curLayers.push(base);
 (b.over||[]).forEach(u=>{const o=L.tileLayer(u,{maxZoom:20,keepBuffer:3});o.addTo(map);curLayers.push(o)});
 if(!settledOnce)base.on('load',settle);
 document.querySelectorAll('#viewbar b').forEach(x=>x.classList.toggle('on',x.dataset.v===key))}

function init(){
 try{if(typeof L==='undefined')throw 0;
  map=L.map('map',{zoomControl:false,attributionControl:false,zoomSnap:.5,zoomDelta:.5,wheelPxPerZoomLevel:140,
   minZoom:14,maxZoom:19,maxBounds:MAXB,maxBoundsViscosity:1.0,preferCanvas:true}).fitBounds(DATAB,{padding:[50,50]});
  L.control.zoom({position:'bottomleft'}).addTo(map);
  renderer=L.canvas({padding:0.5,tolerance:6});
  setBasemap('hybrid');
  document.querySelectorAll('#viewbar b').forEach(b=>b.onclick=()=>setBasemap(b.dataset.v));
  map.on('mousedown',onDown);map.on('mousemove',onMove);map.on('mouseup',onUp);
 }catch(e){map=null}
 setTimeout(settle,1400);setTimeout(settle,3000);
}
function settle(){if(ready)return;ready=true;settledOnce=true;document.getElementById('loader').classList.add('gone');
 applyModel();drawCoverage();rerender();const t=topList();if(t.length)select(t[0].id)}

function drawCoverage(){if(coverage)map.removeLayer(coverage);
 coverage=L.rectangle(DATAB,{color:'#3ff0e0',weight:1.4,dashArray:'8 6',fill:false,interactive:false,opacity:region?.25:.8}).addTo(map)}
function buildPins(){for(const id in pinById)map.removeLayer(pinById[id]);pinById={};
 topList().forEach(s=>{const m=L.circleMarker([s.lat,s.lng],{renderer,radius:s.score>=70?6:4.5,fillColor:vColor(s),color:'#0a0e14',weight:1.2,fillOpacity:.96});
  m.on('click',()=>select(s.id));m.addTo(map);pinById[s.id]=m})}
function buildFaint(){if(faint){map.removeLayer(faint);faint=null}
 faint=L.layerGroup();
 activeSites().forEach(s=>{if(!s.g||s.g.length<2)return;
  const c=s.gate?'#56697a':col(s.score), op=s.gate?.25:(s.score>=70?.9:.5);
  const pl=L.polyline(s.g.map(p=>[p[1],p[0]]),{renderer,color:c,weight:4,opacity:op,interactive:true});
  pl.on('click',()=>select(s.id));pl.addTo(faint)});
 faint.addTo(map)}
function showFootprint(s){if(footprint)map.removeLayer(footprint);
 const wM=Math.max(5,s.m.stalls*2.7)*1.6,dM=5.5*1.6;
 const dLat=dM/111320,dLng=wM/(111320*Math.cos(s.lat*Math.PI/180));
 footprint=L.rectangle([[s.lat-dLat/2,s.lng-dLng/2],[s.lat+dLat/2,s.lng+dLng/2]],{color:'#fff',weight:1.4,fillColor:vColor(s),fillOpacity:.4,interactive:false}).addTo(map)}
function highlightPins(){document.querySelectorAll('.pin').forEach(p=>p.classList.toggle('sel',p.dataset.id===sel))}

function rerender(){const list=topList(),active=activeSites();
 const viable=active.filter(s=>s.score>=70).length;
 document.getElementById('cc').textContent=active.length+' SITES';
 document.getElementById('lgcount').textContent=viable+' GO / '+active.length;
 const fS=document.getElementById('fnScreen');if(fS){fS.textContent=active.length;document.getElementById('fnViable').textContent=viable;document.getElementById('fnTop').textContent=list.length}
 const cl=document.getElementById('clist');cl.innerHTML='';
 if(!list.length){cl.innerHTML='<div class="empty">No scanned sites in this region.<br>Draw a box over the coverage area.</div>'}
 list.slice(0,60).forEach(s=>{const r=document.createElement('div');r.className='row'+(s.id===sel?' sel':'');
  r.innerHTML=`<div class="rk">${String(s.rank).padStart(2,'0')}</div><div style="min-width:0;flex:1"><div class="a" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.addr}</div><div class="b uppr">${s.nb} · ${s.id}</div></div><div class="sc" style="color:${col(s.score)}">${s.gate?'—':s.score}</div>`;
  r.onclick=()=>{if(map)map.flyTo([s.lat,s.lng],17,{duration:.6});select(s.id)};cl.appendChild(r)});
 buildPins();buildFaint();
 if(sel&&!inRegion(S.find(x=>x.id===sel))){if(list.length)select(list[0].id)}}

function reportSkeleton(s){const m=s.m;
 const adaTxt=m.ada_mapped?(m.ada_pass?`PASS · ramp ${m.dist_ada} m`:`ramp ${m.dist_ada} m`):'NOT MAPPED · VERIFY';
 const adaCls=m.ada_mapped?(m.ada_pass?'pass':'cond'):'cond';
 document.getElementById('rbody').innerHTML=`
  <div class="econ"><div class="ec"><div class="k uppr">Score</div><div class="v" style="color:${col(s.score)}">${s.gate?'—':s.score}</div></div>
   <div class="ec"><div class="k uppr">Est. connect</div><div class="v">$${(s.cost/1000).toFixed(0)}K</div></div>
   <div class="ec"><div class="k uppr">Payback</div><div class="v">${s.pay}<small style="color:var(--dim);font-size:9px"> mo</small></div></div></div>
  <div class="blk"><div class="bh"><span>① PHYSICAL FIT</span><span class="src">cyvl</span></div>
   <div class="kv"><span class="k">Usable frontage</span><span class="v">${m.frontage_ft} ft</span></div>
   <div class="kv"><span class="k">Road width</span><span class="v">${m.width_ft} ft</span></div>
   <div class="kv"><span class="k">Stalls that fit (5.5 m)</span><span class="v">${m.stalls}</span></div></div>
  <div class="blk"><div class="bh"><span>② CONNECTION COST</span><span class="src">cyvl</span></div>
   <div class="kv"><span class="k">Distance to power</span><span class="v">${m.dist_power} m</span></div>
   <div class="kv"><span class="k">Trench length</span><span class="v">${Math.round(m.dist_power*1.2+4)} m</span></div>
   <div class="kv"><span class="k">Surface · PCI</span><span class="v">${m.surface} · ${m.pci}</span></div></div>
  <div class="blk"><div class="bh"><span>③ ACCESS & OBSTRUCTIONS</span><span class="src">cyvl</span></div>
   <div class="kv"><span class="k">ADA ramp</span><span class="v ${adaCls}">${adaTxt}</span></div>
   <div class="kv"><span class="k">Obstructions ≤8 m</span><span class="v ${m.n_obst>2?'cond':'pass'}">${m.n_obst}</span></div>
   <div class="kv"><span class="k">Fire lane</span><span class="v ${m.fire?'fail':'pass'}">${m.fire?'YES':'none'}</span></div></div>
  <div class="blk"><div class="bh"><span>④ DEMAND</span><span class="src">proxy</span></div>
   <div class="kv"><span class="k">Street activity</span><span class="v">${m.activity} markings ≤45 m</span></div>
   <div class="kv"><span class="k">Traffic / AADT</span><span class="v" style="color:var(--dim)">MassDOT · not loaded</span></div></div>
  <div class="blk"><div class="bh"><span>⑤ VERIFY ON SITE</span><span class="src">flag</span></div>
   <div class="flagbox">Zoning · grid capacity · host willingness · final permit${m.ada_mapped?'':' · ADA ramp'} — not in this export, flagged.</div></div>`}
function resolveVerdict(s){const[vl,vc]=verdictOf(s);const v=document.getElementById('rVerd');v.textContent=vl;v.style.color=vc;document.getElementById('rReason').textContent=reason(s)}
function select(id){sel=id;const s=S.find(x=>x.id===id);if(!s)return;
 document.getElementById('rId').textContent=s.addr;document.getElementById('rNb').textContent=s.nb+' · '+s.id;
 document.getElementById('rImg').src=s.img;reportSkeleton(s);resolveVerdict(s);
 document.querySelectorAll('#clist .row').forEach((r,i)=>r.classList.toggle('sel',topList()[i]&&topList()[i].id===id));
 showFootprint(s);
 if(selRing)map.removeLayer(selRing);
 selRing=L.circleMarker([s.lat,s.lng],{renderer,radius:9,fill:false,color:'#ffffff',weight:2,interactive:false}).addTo(map)}

// region draw
function setModel(m){model=m;document.querySelectorAll('#ctrl .seg b').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
 applyModel();rerender();const t=topList();if(t.length)select(t[0].id)}
function setRegion(b){region=b;if(regionBox){map.removeLayer(regionBox);regionBox=null}
 if(region)regionBox=L.rectangle(region,{color:'#ffb020',weight:1.6,dashArray:'6 4',fillColor:'#ffb020',fillOpacity:.06,interactive:false}).addTo(map);
 drawCoverage();rerender();const t=topList();if(t.length&&(!sel||!inRegion(S.find(x=>x.id===sel))))select(t[0].id)}
function onDown(e){if(!armed)return;drawStart=e.latlng;if(regionBox){map.removeLayer(regionBox);regionBox=null}
 regionBox=L.rectangle([drawStart,drawStart],{color:'#ffb020',weight:1.6,dashArray:'6 4',fillColor:'#ffb020',fillOpacity:.06,interactive:false}).addTo(map)}
function onMove(e){if(!armed||!drawStart)return;regionBox.setBounds(L.latLngBounds(drawStart,e.latlng))}
function onUp(e){if(!armed||!drawStart)return;const b=L.latLngBounds(drawStart,e.latlng);armed=false;drawStart=null;
 map.dragging.enable();map.getContainer().style.cursor='';document.getElementById('drawBtn').classList.remove('on');
 if(b.getNorth()-b.getSouth()<0.0004){if(regionBox){map.removeLayer(regionBox);regionBox=null}return}
 setRegion(b)}
document.getElementById('drawBtn').onclick=function(){armed=!armed;this.classList.toggle('on',armed);
 if(armed){map.dragging.disable();map.getContainer().style.cursor='crosshair'}else{map.dragging.enable();map.getContainer().style.cursor=''}};
document.getElementById('resetBtn').onclick=()=>{armed=false;document.getElementById('drawBtn').classList.remove('on');
 if(map){map.dragging.enable();map.getContainer().style.cursor='';map.flyToBounds(DATAB,{padding:[50,50],duration:.6})}setRegion(null)};
document.querySelectorAll('#lg .show b').forEach(b=>b.onclick=()=>{showN=(+b.dataset.n)||100000;
 document.querySelectorAll('#lg .show b').forEach(x=>x.classList.toggle('on',x===b));rerender();if(sel)select(sel)});
document.getElementById('screenBtn').onclick=()=>{if(sel&&map){const s=S.find(x=>x.id===sel);map.flyTo([s.lat,s.lng],17,{duration:.6})}};
init();
</script>
<script src="bigscreen.js"></script>
</body></html>

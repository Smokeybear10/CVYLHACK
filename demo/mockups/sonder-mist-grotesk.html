<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SONDER · Siting Command</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="vendor/leaflet.css"/>
<script src="vendor/leaflet.js"></script>
<style>:root{
 --bg:#eef1f5;--map:#e3e8ef;--side:#f7f9fc;--side2:#f1f4f8;--head:#f7f9fc;
 --line:rgba(28,38,58,.07);--line2:rgba(28,38,58,.12);
 --indigo:#3a4a66;--cyan:#0fb5a6;--accent:#0fb5a6;--text:#10151d;--text2:#5a6577;--dim:#9aa4b4;
 --green:#16a37b;--amber:#e0972a;--red:#e0556b;
 --grad:linear-gradient(120deg,#1a2536,#0fb5a6);
 --mono:'Space Mono',monospace;--sans:'Space Grotesk',sans-serif;--display:'Space Grotesk',sans-serif;
 --panel:#ffffff;--rad:16px;--radsm:11px;
 --shadow:0 1px 2px rgba(28,38,58,.04),0 8px 24px rgba(28,38,58,.06);
 --shadow2:0 2px 6px rgba(28,38,58,.05),0 18px 50px rgba(28,38,58,.10)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.uppr{text-transform:uppercase;letter-spacing:.08em}.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
body{display:grid;grid-template-rows:60px 1fr;height:100vh;padding:0}
/* shell */
.shell{display:grid;grid-template-columns:316px 1fr 388px;min-height:0;overflow:hidden;gap:14px;padding:14px;background:var(--bg)}
/* header */
header{display:flex;align-items:center;background:var(--head);border-bottom:1px solid var(--line);z-index:30}
.brand{display:flex;align-items:center;gap:12px;width:330px;padding:0 22px}
.brand svg rect{stroke:#1a2536!important}
.brand svg path{fill:var(--cyan)!important}
.brand h1{font-size:15px;font-weight:600;letter-spacing:.16em;color:var(--text);background:none;-webkit-text-fill-color:currentColor}
.brand .sub{font-size:8px;color:var(--dim);letter-spacing:.22em;margin-top:3px;font-weight:500}
.htools{flex:1;display:flex;align-items:center;justify-content:center;gap:14px;padding:0 16px}
.search{display:flex;align-items:center;gap:10px;width:min(460px,44vw);background:#fff;border:1px solid var(--line2);border-radius:13px;padding:10px 14px;box-shadow:0 1px 2px rgba(28,38,58,.04);transition:border-color .18s,box-shadow .18s}
.search:focus-within{border-color:rgba(15,181,166,.5);box-shadow:0 0 0 4px rgba(15,181,166,.12)}
.search .ic{color:var(--accent)}.search input{flex:1;background:none;border:0;outline:0;color:var(--text);font-family:var(--mono);font-size:12px}
.search input::placeholder{color:var(--dim)}
.search .go{font-family:var(--mono);font-size:9px;letter-spacing:.1em;font-weight:700;color:#fff;background:var(--accent);border:0;padding:7px 13px;border-radius:8px;cursor:pointer;transition:.15s}
.search .go:hover{background:#0da294;box-shadow:0 4px 12px rgba(15,181,166,.3)}
.status{width:330px;display:flex;align-items:center;justify-content:flex-end;gap:14px;padding:0 22px}
.live{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:9.5px;color:var(--green);letter-spacing:.13em;font-weight:500}
.live .d{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(22,163,123,.14);animation:p 2.6s ease-in-out infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.45}}
/* left sidebar */
.left{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--shadow);display:flex;flex-direction:column;min-height:0;overflow:hidden}
.lblock{padding:16px 18px;border-bottom:1px solid var(--line)}
.funnel{display:flex;align-items:center;justify-content:space-between}
.funnel .f{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.funnel .f b{font-family:var(--mono);font-size:21px;font-weight:600;letter-spacing:-.01em}
.funnel .f.s b{color:var(--text)}.funnel .f.v b{color:var(--green)}.funnel .f.t b{color:var(--accent)}
.funnel .f span{font-size:7.5px;color:var(--dim);letter-spacing:.1em;font-weight:500}
.funnel i{color:var(--dim);font-style:normal;align-self:center;opacity:.6}
.tools{display:flex;gap:9px;padding:13px 18px;border-bottom:1px solid var(--line)}
.tools button{flex:1;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;color:var(--text2);background:var(--side2);border:1px solid var(--line);border-radius:10px;padding:10px;cursor:pointer;transition:.15s;font-weight:500}
.tools button:hover{background:#fff;color:var(--text);border-color:var(--line2);box-shadow:0 1px 3px rgba(28,38,58,.06)}
.tools button.on{color:#fff;background:var(--amber);border-color:var(--amber);box-shadow:0 2px 8px rgba(224,151,42,.28)}
.lhead{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;font-size:9.5px;font-weight:600;letter-spacing:.1em;color:var(--text2)}
.lhead .n{font-family:var(--mono);font-size:9px;color:var(--accent);font-weight:500}
#clist{flex:1;overflow-y:auto;padding:2px 8px 8px}
.row{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;border-left:none;cursor:pointer;transition:background .14s,box-shadow .14s;margin:2px 0;position:relative}
.row:hover{background:var(--side2)}
.row.sel{background:#fff;box-shadow:0 1px 3px rgba(28,38,58,.07),inset 0 0 0 1px rgba(15,181,166,.35)}
.row.sel::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--accent)}
.row .rk{font-family:var(--mono);font-size:10px;color:var(--dim);width:20px;font-weight:500}
.row .nm{flex:1;min-width:0}
.row .a{font-size:11.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.row .b{font-size:8.5px;color:var(--dim);letter-spacing:.04em;margin-top:2px}
.row .sc{font-family:var(--mono);font-size:14px;font-weight:600}
.empty{padding:26px 18px;font-family:var(--mono);font-size:10px;color:var(--dim);text-align:center;line-height:1.8}
.lfoot{border-top:1px solid var(--line);padding:14px 18px;background:var(--side2)}
.lfoot .lt{display:flex;justify-content:space-between;font-size:8px;color:var(--dim);letter-spacing:.1em;margin-bottom:11px;font-weight:500}
.key{display:flex;gap:14px;margin-bottom:12px}
.key span{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:8.5px;color:var(--text2)}
.key i{width:8px;height:8px;border-radius:50%}
.show{display:flex;align-items:center;gap:6px}
.show span{font-size:8px;color:var(--dim);letter-spacing:.1em;margin-right:2px;font-weight:500}
.show b{flex:1;text-align:center;font-family:var(--mono);font-size:9px;color:var(--text2);padding:7px 0;border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:.14s;background:#fff;font-weight:500}
.show b:hover{color:var(--text);border-color:var(--line2)}
.show b.on{color:#fff;background:var(--accent);border-color:var(--accent);box-shadow:0 2px 6px rgba(15,181,166,.26)}
/* map */
.mapwrap{position:relative;background:var(--map);overflow:hidden;border-radius:var(--rad);border:1px solid var(--line);box-shadow:var(--shadow)}
#map{position:absolute;inset:0;background:var(--map);isolation:isolate}
.leaflet-container{background:var(--map)}
.leaflet-control-zoom{border:1px solid var(--line2)!important;border-radius:12px!important;overflow:hidden;margin:18px!important;box-shadow:0 4px 16px rgba(28,38,58,.14)!important}
.leaflet-control-zoom a{background:rgba(255,255,255,.94)!important;color:var(--accent)!important;border-bottom:1px solid var(--line)!important;width:34px!important;height:34px!important;line-height:34px!important;font-size:17px!important;backdrop-filter:blur(8px)}
.leaflet-control-zoom a:hover{background:#fff!important;color:#0da294!important}
.leaflet-control-zoom a.leaflet-disabled{opacity:.35!important}
#viewbar{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:6;display:flex;gap:3px;padding:5px;background:rgba(255,255,255,.86);border:1px solid var(--line2);border-radius:13px;backdrop-filter:blur(14px) saturate(1.4);box-shadow:0 6px 24px rgba(28,38,58,.14)}
#viewbar b{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--text2);padding:7px 13px;border-radius:9px;cursor:pointer;transition:.15s;font-weight:500}
#viewbar b:hover{color:var(--text);background:rgba(28,38,58,.06)}
#viewbar b.on{color:#fff;background:var(--accent);box-shadow:0 2px 8px rgba(15,181,166,.3)}
.loader{position:absolute;inset:0;z-index:14;display:grid;place-items:center;background:var(--map);transition:.5s}
.loader.gone{opacity:0;pointer-events:none}.loader .l{font-family:var(--mono);color:var(--accent);font-size:12px;letter-spacing:.24em}
.pin{display:none}
/* right sidebar report */
.right{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--shadow);overflow-y:auto;min-height:0}
.rphoto{position:relative;height:196px;overflow:hidden;background:#dde3ec;border-radius:var(--rad) var(--rad) 0 0}
.rphoto img{width:100%;height:100%;object-fit:cover;filter:saturate(1) contrast(1.02)}
.rphoto .gd{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(247,249,252,.6) 72%,var(--panel))}
.rphoto .tg{position:absolute;top:13px;left:16px;font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--text);background:rgba(255,255,255,.82);border:1px solid var(--line2);padding:4px 9px;border-radius:7px;backdrop-filter:blur(8px);font-weight:500}
.rtop{position:absolute;bottom:14px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:flex-end}
.rtop .id{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-.01em}.rtop .nb{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.04em;margin-top:4px}
.verdict{text-align:right}.verdict .vb{font-size:21px;font-weight:700;letter-spacing:-.01em;line-height:1}
.verdict .vr{font-size:8px;color:var(--text2);letter-spacing:.02em;margin-top:6px;max-width:172px;line-height:1.4}
.rbody{padding:18px 20px}
.econ{display:flex;gap:11px;margin-bottom:18px}
.ec{flex:1;background:var(--side2);border:1px solid var(--line);border-radius:13px;padding:13px;text-align:center}
.ec .k{font-size:7.5px;color:var(--dim);letter-spacing:.1em;font-weight:500}.ec .v{font-family:var(--mono);font-size:18px;font-weight:600;margin-top:7px;letter-spacing:-.01em}
.blk{margin-bottom:16px}
.blk .bh{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--accent);margin-bottom:9px;font-weight:500}
.blk .bh .src{color:var(--dim);font-size:8px}
.kv{display:flex;justify-content:space-between;font-size:11px;padding:6px 0;border-bottom:1px solid var(--line)}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--text2)}.kv .v{font-family:var(--mono);color:var(--text);font-weight:500}
.pass{color:var(--green)!important}.fail{color:var(--red)!important}.cond{color:var(--amber)!important}
.flagbox{font-size:9.5px;color:#a06410;background:rgba(224,151,42,.08);border:1px solid rgba(224,151,42,.24);border-radius:11px;padding:12px 14px;line-height:1.6}
::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:rgba(28,38,58,.16);border-radius:6px;border:2px solid var(--panel)}::-webkit-scrollbar-thumb:hover{background:rgba(28,38,58,.26)}.brand h1{font-family:var(--display);font-weight:600;letter-spacing:.1em}.funnel .f b{font-family:var(--display);font-weight:600}.verdict .vb{font-family:var(--display);font-weight:700}.rtop .id{font-family:var(--display);font-weight:600}.row .sc{font-weight:700}.ec .v{font-weight:600}

.shell{grid-template-columns:312px 1fr 0}.right{display:none}.shell.rep{grid-template-columns:312px 1fr 384px}.shell.rep .right{display:block}
</style></head><body>
<header>
 <div class="brand"><svg width="24" height="24" viewBox="0 0 26 26"><rect x="1" y="1" width="24" height="24" rx="6" stroke="#7c89ff" stroke-width="1.3" opacity=".55"/><path d="M14.5 4 L8 14 H12.5 L11 22 L18 11 H13.5 Z" fill="#5cc8ff"/></svg>
  <div><h1>SONDER</h1><div class="sub mono">SITING COMMAND</div></div></div>
 <div class="htools"><div class="search"><span class="ic mono">⌖</span><input id="addr" value="Union Square, Somerville MA" spellcheck="false"/><button class="go" id="screenBtn">SCREEN</button></div></div>
 <div class="status"><div class="live"><span class="d"></span>CYVL LIVE</div></div>
</header>
<div class="shell">
 <aside class="left">
  <div class="lblock"><div class="funnel">
   <div class="f s"><b id="fnScreen">—</b><span class="uppr">Screened</span></div><i>→</i>
   <div class="f v"><b id="fnViable">—</b><span class="uppr">Viable</span></div><i>→</i>
   <div class="f t"><b id="fnTop">—</b><span class="uppr">Shown</span></div></div></div>
  <div class="tools"><button id="drawBtn">✎ DRAW AREA</button><button id="resetBtn">RESET</button></div>
  <div class="lhead uppr">Ranked Curb Sites <span class="n" id="cc">—</span></div>
  <div id="clist"></div>
  <div class="lfoot" id="lg">
   <div class="lt uppr mono"><span>Site Score</span><span id="lgcount"></span></div>
   <div class="key"><span><i style="background:#46e08a"></i>GO</span><span><i style="background:#ffb84d"></i>COND</span><span><i style="background:#ff6b85"></i>NO-GO</span></div>
   <div class="show"><span class="uppr">Show</span><b data-n="25">25</b><b data-n="50" class="on">50</b><b data-n="100">100</b><b data-n="0">ALL</b></div>
  </div>
 </aside>
 <div class="mapwrap">
  <div id="map"></div>
  <div id="viewbar" class="mono"><b data-v="hybrid">HYBRID</b><b data-v="streets">STREETS</b><b data-v="terrain">TERRAIN</b></div>
  <div class="loader" id="loader"><div class="l">◴ LINKING CYVL DIGITAL TWIN…</div></div>
 </div>
 <aside class="right" id="rep">
  <div class="rphoto"><img id="rImg"/><div class="gd"></div><div class="tg uppr">Cyvl · Street Capture</div>
   <div class="rtop"><div><div class="id" id="rId">—</div><div class="nb uppr" id="rNb">—</div></div>
    <div class="verdict"><div class="vb" id="rVerd">—</div><div class="vr" id="rReason"></div></div></div></div>
  <div class="rbody" id="rbody"></div>
 </aside>
</div>
<script src="data.js"></script>
<script>
const M=window.MOCK,S=M.sites,B=M.meta.bounds;let sel=null,map=null,ready=false,curLayers=[],settledOnce=false,renderer=null;
let pinById={},footprint=null,coverage=null,regionBox=null,faint=null,selRing=null,region=null,showN=50,armed=false,drawStart=null;
const FK=['mounting','power','parking','ada','demand'];
const W={mounting:.20,power:.10,parking:.35,ada:.15,demand:.20};
const col=s=>{const c1=[255,107,133],c2=[255,184,77],c3=[70,224,138];let a,b,f;if(s<70){f=Math.max(0,(s-40)/30);a=c1;b=c2}else{f=Math.min(1,(s-70)/30);a=c2;b=c3}return`rgb(${[0,1,2].map(i=>Math.round(a[i]+(b[i]-a[i])*f)).join(',')})`};
const vColor=s=>s.score>=75?'#46e08a':s.score>=60?'#ffb84d':'#ff6b85';
const verdictOf=s=>s.score>=75?['GO','var(--green)']:s.score>=60?['CONDITIONAL','var(--amber)']:['NO-GO','var(--red)'];
function reason(s){if(s.gate)return s.gate+' · screened out';const m=s.m;
 if(s.score>=75)return`${m.stalls} stall${m.stalls!=1?'s':''} fit · ${m.dist_power} m to power · PCI ${m.pci}`;
 if(s.score>=60)return`Fits ${m.stalls} · ${m.dist_power} m to power lifts trench cost`;
 return`${m.dist_power} m power run · ${m.width_ft} ft frontage`}
function applyModel(){const sum=FK.reduce((a,k)=>a+W[k],0)||1;
 S.forEach(s=>{const base=Math.round(100*FK.reduce((a,k)=>a+(W[k]/sum)*s.f[k],0)*10)/10;s.score=s.gate?0:base;s.pay=Math.round(20+(1-s.score/100)*34)});
 S.sort((a,b)=>b.score-a.score);S.forEach((s,i)=>s.rank=i+1)}
function inRegion(s){return !region||region.contains([s.lat,s.lng])}
function activeSites(){return S.filter(inRegion)}
function topList(){return activeSites().slice(0,showN)}
const DATAB=L.latLngBounds([[B[1],B[0]],[B[3],B[2]]]);
const PAD=0.013,MAXB=L.latLngBounds([[B[1]-PAD*.7,B[0]-PAD],[B[3]+PAD*.7,B[2]+PAD]]);
const BASEMAPS={
 hybrid:{base:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',over:['https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}','https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}']},
 streets:{sub:'abcd',base:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png'},
 terrain:{base:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}'}};
function setBasemap(key){const b=BASEMAPS[key];if(!b||!map)return;curLayers.forEach(l=>map.removeLayer(l));curLayers=[];
 const base=L.tileLayer(b.base,b.sub?{maxZoom:20,subdomains:b.sub,keepBuffer:3}:{maxZoom:20,keepBuffer:3});base.addTo(map);base.bringToBack();curLayers.push(base);
 (b.over||[]).forEach(u=>{const o=L.tileLayer(u,{maxZoom:20,keepBuffer:3});o.addTo(map);curLayers.push(o)});
 if(!settledOnce)base.on('load',settle);
 document.querySelectorAll('#viewbar b').forEach(x=>x.classList.toggle('on',x.dataset.v===key))}
function init(){try{if(typeof L==='undefined')throw 0;
  map=L.map('map',{zoomControl:false,attributionControl:false,zoomSnap:.5,zoomDelta:.5,wheelPxPerZoomLevel:140,minZoom:14,maxZoom:19,maxBounds:MAXB,maxBoundsViscosity:1,preferCanvas:true}).fitBounds(DATAB,{padding:[40,40]});
  L.control.zoom({position:'bottomleft'}).addTo(map);renderer=L.canvas({padding:.5,tolerance:6});setBasemap('hybrid');
  document.querySelectorAll('#viewbar b').forEach(b=>b.onclick=()=>setBasemap(b.dataset.v));
  map.on('mousedown',onDown);map.on('mousemove',onMove);map.on('mouseup',onUp);
  setTimeout(()=>map.invalidateSize(),120);
 }catch(e){map=null}setTimeout(settle,1400);setTimeout(settle,3000)}
function settle(){if(ready)return;ready=true;settledOnce=true;document.getElementById('loader').classList.add('gone');
 if(map)map.invalidateSize();applyModel();drawCoverage();rerender()}
function drawCoverage(){if(coverage)map.removeLayer(coverage);coverage=L.rectangle(DATAB,{color:'#5cc8ff',weight:1.2,dashArray:'8 6',fill:false,interactive:false,opacity:region?.2:.55}).addTo(map)}
function buildPins(){for(const id in pinById)map.removeLayer(pinById[id]);pinById={};
 topList().forEach(s=>{const m=L.circleMarker([s.lat,s.lng],{renderer,radius:s.score>=70?6:4.5,fillColor:vColor(s),color:'#0b0f17',weight:1.3,fillOpacity:.97});m.on('click',()=>select(s.id));m.addTo(map);pinById[s.id]=m})}
function buildFaint(){if(faint){map.removeLayer(faint);faint=null}faint=L.layerGroup();
 activeSites().forEach(s=>{if(!s.g||s.g.length<2)return;const c=s.gate?'#56657f':col(s.score),op=s.gate?.22:(s.score>=70?.9:.5);
  const pl=L.polyline(s.g.map(p=>[p[1],p[0]]),{renderer,color:c,weight:4,opacity:op,interactive:true});pl.on('click',()=>select(s.id));pl.addTo(faint)});faint.addTo(map)}
function showFootprint(s){if(footprint)map.removeLayer(footprint);const wM=Math.max(5,s.m.stalls*2.7)*1.6,dM=5.5*1.6;
 const dLat=dM/111320,dLng=wM/(111320*Math.cos(s.lat*Math.PI/180));
 footprint=L.rectangle([[s.lat-dLat/2,s.lng-dLng/2],[s.lat+dLat/2,s.lng+dLng/2]],{color:'#fff',weight:1.4,fillColor:vColor(s),fillOpacity:.4,interactive:false}).addTo(map)}
function rerender(){const list=topList(),active=activeSites();const viable=active.filter(s=>s.score>=70).length;
 document.getElementById('cc').textContent=active.length+' SITES';
 document.getElementById('lgcount').textContent=viable+' GO / '+active.length;
 fnScreen.textContent=active.length;fnViable.textContent=viable;fnTop.textContent=list.length;
 const cl=document.getElementById('clist');cl.innerHTML='';
 if(!list.length)cl.innerHTML='<div class="empty">No scanned sites in this area.<br>Draw a box over the coverage zone.</div>';
 list.slice(0,60).forEach(s=>{const r=document.createElement('div');r.className='row'+(s.id===sel?' sel':'');
  r.innerHTML=`<div class="rk">${String(s.rank).padStart(2,'0')}</div><div class="nm"><div class="a">${s.addr}</div><div class="b uppr">${s.nb} · ${s.id}</div></div><div class="sc" style="color:${col(s.score)}">${s.gate?'—':s.score}</div>`;
  r.onclick=()=>{if(map)map.flyTo([s.lat,s.lng],17,{duration:.6});select(s.id)};cl.appendChild(r)});
 buildPins();buildFaint();
 if(sel&&!inRegion(S.find(x=>x.id===sel))&&list.length)select(list[0].id)}
function reportSkeleton(s){const m=s.m;
 const adaTxt=m.ada_mapped?(m.ada_pass?`PASS · ramp ${m.dist_ada} m`:`ramp ${m.dist_ada} m`):'NOT MAPPED · VERIFY';
 const adaCls=m.ada_mapped?(m.ada_pass?'pass':'cond'):'cond';
 document.getElementById('rbody').innerHTML=`
  <div class="econ"><div class="ec"><div class="k uppr">Score</div><div class="v" style="color:${col(s.score)}">${s.gate?'—':s.score}</div></div>
   <div class="ec"><div class="k uppr">Connect</div><div class="v">$${(s.cost/1000).toFixed(0)}K</div></div>
   <div class="ec"><div class="k uppr">Payback</div><div class="v">${s.pay}<small style="color:var(--dim);font-size:9px"> mo</small></div></div></div>
  <div class="blk"><div class="bh"><span>① PHYSICAL FIT</span><span class="src">cyvl</span></div>
   <div class="kv"><span class="k">Usable frontage</span><span class="v">${m.frontage_ft} ft</span></div>
   <div class="kv"><span class="k">Road width</span><span class="v">${m.width_ft} ft</span></div>
   <div class="kv"><span class="k">Stalls that fit (5.5 m)</span><span class="v">${m.stalls}</span></div></div>
  <div class="blk"><div class="bh"><span>② CONNECTION COST</span><span class="src">cyvl</span></div>
   <div class="kv"><span class="k">Distance to power</span><span class="v">${m.dist_power} m</span></div>
   <div class="kv"><span class="k">Trench length</span><span class="v">${Math.round(m.dist_power*1.2+4)} m</span></div>
   <div class="kv"><span class="k">Surface · PCI</span><span class="v">${m.surface} · ${m.pci}</span></div></div>
  <div class="blk"><div class="bh"><span>③ ACCESS & OBSTRUCTIONS</span><span class="src">cyvl</span></div>
   <div class="kv"><span class="k">ADA ramp</span><span class="v ${adaCls}">${adaTxt}</span></div>
   <div class="kv"><span class="k">Obstructions ≤8 m</span><span class="v ${m.n_obst>2?'cond':'pass'}">${m.n_obst}</span></div>
   <div class="kv"><span class="k">Fire lane</span><span class="v ${m.fire?'fail':'pass'}">${m.fire?'YES':'none'}</span></div></div>
  <div class="blk"><div class="bh"><span>④ DEMAND</span><span class="src">proxy</span></div>
   <div class="kv"><span class="k">Street activity</span><span class="v">${m.activity} markings ≤45 m</span></div>
   <div class="kv"><span class="k">Traffic / AADT</span><span class="v" style="color:var(--dim)">MassDOT · not loaded</span></div></div>
  <div class="blk"><div class="bh"><span>⑤ VERIFY ON SITE</span><span class="src">flag</span></div>
   <div class="flagbox">Zoning · grid capacity · host willingness · final permit${m.ada_mapped?'':' · ADA ramp'} — not in this export, flagged.</div></div>`}
function resolveVerdict(s){const[vl,vc]=verdictOf(s);const v=document.getElementById('rVerd');v.textContent=vl;v.style.color=vc;document.getElementById('rReason').textContent=reason(s)}
function select(id){sel=id;const s=S.find(x=>x.id===id);if(!s)return;const sh=document.querySelector('.shell');if(sh&&!sh.classList.contains('rep')){sh.classList.add('rep');if(map)setTimeout(()=>map.invalidateSize(),30)}
 document.getElementById('rId').textContent=s.addr;document.getElementById('rNb').textContent=s.nb+' · '+s.id;
 document.getElementById('rImg').src=s.img;reportSkeleton(s);resolveVerdict(s);
 document.querySelectorAll('#clist .row').forEach((r,i)=>r.classList.toggle('sel',topList()[i]&&topList()[i].id===id));
 showFootprint(s);if(selRing)map.removeLayer(selRing);
 selRing=L.circleMarker([s.lat,s.lng],{renderer,radius:9,fill:false,color:'#fff',weight:2,interactive:false}).addTo(map)}
function setRegion(b){region=b;if(regionBox){map.removeLayer(regionBox);regionBox=null}
 if(region)regionBox=L.rectangle(region,{color:'#ffb84d',weight:1.6,dashArray:'6 4',fillColor:'#ffb84d',fillOpacity:.06,interactive:false}).addTo(map);
 drawCoverage();rerender();const t=topList();if(t.length&&(!sel||!inRegion(S.find(x=>x.id===sel))))select(t[0].id)}
function onDown(e){if(!armed)return;drawStart=e.latlng;if(regionBox){map.removeLayer(regionBox);regionBox=null}
 regionBox=L.rectangle([drawStart,drawStart],{color:'#ffb84d',weight:1.6,dashArray:'6 4',fillColor:'#ffb84d',fillOpacity:.06,interactive:false}).addTo(map)}
function onMove(e){if(!armed||!drawStart)return;regionBox.setBounds(L.latLngBounds(drawStart,e.latlng))}
function onUp(e){if(!armed||!drawStart)return;const b=L.latLngBounds(drawStart,e.latlng);armed=false;drawStart=null;
 map.dragging.enable();map.getContainer().style.cursor='';document.getElementById('drawBtn').classList.remove('on');
 if(b.getNorth()-b.getSouth()<0.0004){if(regionBox){map.removeLayer(regionBox);regionBox=null}return}setRegion(b)}
document.getElementById('drawBtn').onclick=function(){armed=!armed;this.classList.toggle('on',armed);
 if(armed){map.dragging.disable();map.getContainer().style.cursor='crosshair'}else{map.dragging.enable();map.getContainer().style.cursor=''}};
document.getElementById('resetBtn').onclick=()=>{armed=false;document.getElementById('drawBtn').classList.remove('on');
 if(map){map.dragging.enable();map.getContainer().style.cursor='';map.flyToBounds(DATAB,{padding:[40,40],duration:.6})}setRegion(null)};
document.querySelectorAll('.show b').forEach(b=>b.onclick=()=>{showN=(+b.dataset.n)||100000;
 document.querySelectorAll('.show b').forEach(x=>x.classList.toggle('on',x===b));rerender();if(sel)select(sel)});
document.getElementById('screenBtn').onclick=()=>{if(sel&&map){const s=S.find(x=>x.id===sel);map.flyTo([s.lat,s.lng],17,{duration:.6})}};
init();
</script></body></html>

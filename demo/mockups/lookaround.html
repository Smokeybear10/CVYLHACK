<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sonder · Cyvl Street Look-Around</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="pano_index.js"></script>
<style>
:root{--bg:#0A0D10;--text:#E8EDEF;--text2:#BCC3C9;--dim:#9CA5AC;--accent:#39D6FF;--green:#3DF58B;
 --glass:rgba(13,17,21,.62);--edge:rgba(255,255,255,.16);--edge2:rgba(255,255,255,.10);
 --mono:'IBM Plex Mono',monospace;--sans:'Hanken Grotesk',sans-serif;--display:'Fraunces',serif}
*{margin:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased}
#panorama{position:fixed;inset:0;z-index:0;background:#0A0D10}
.pnlm-container{background:#0A0D10!important}
/* floating liquid-glass chrome */
.glass{background:var(--glass);backdrop-filter:blur(26px) saturate(1.7);-webkit-backdrop-filter:blur(26px) saturate(1.7);
 border:1px solid var(--edge);
 box-shadow:inset 0 1px 0 rgba(255,255,255,.20),inset 0 -1px 0 rgba(0,0,0,.22),0 18px 44px -14px rgba(0,0,0,.6);
 text-shadow:0 1px 2px rgba(0,0,0,.55)}
/* top-left: back + brand + site */
#bar{position:fixed;top:16px;left:16px;z-index:10;display:flex;align-items:center;gap:12px;padding:9px 16px 9px 9px;border-radius:16px;max-width:min(64vw,580px)}
#bar .back{width:32px;height:32px;flex:0 0 auto;display:grid;place-items:center;border-radius:10px;color:var(--text);
 background:rgba(255,255,255,.06);border:1px solid var(--edge2);text-decoration:none;font-size:22px;line-height:1;transition:.15s}
#bar .back:hover{color:#06231d;background:var(--accent);border-color:var(--accent)}
#bar .logo{flex:0 0 auto;display:block}
#bar .brandtxt h1{font-family:var(--display);font-weight:600;font-size:16px;letter-spacing:.01em;line-height:1}
#bar .brandtxt .sub{font-size:8.5px;color:var(--dim);letter-spacing:.16em;text-transform:uppercase;margin-top:3px}
#site{border-left:1px solid var(--edge2);padding-left:13px;margin-left:2px;min-width:0}
#site:empty{display:none}
#site h2{font-family:var(--display);font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:38vw}
#site .sub{font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:.12em;margin-top:3px}
/* top-right readout */
#readout{position:fixed;top:16px;right:16px;z-index:10;display:flex;gap:24px;padding:10px 20px;border-radius:14px}
#readout .rd{display:flex;flex-direction:column;align-items:flex-end;line-height:1}
#readout .rd span{font-size:8px;color:var(--dim);letter-spacing:.16em;text-transform:uppercase;margin-bottom:6px}
#readout .rd b{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--accent)}
#readout .rd em{font-style:normal;font-size:10px;color:var(--dim);margin-left:3px}
/* bottom control pill */
#ctl{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:7px;padding:7px;border-radius:16px}
.btn{font-family:var(--sans);font-size:12.5px;font-weight:600;letter-spacing:.01em;color:var(--text);background:rgba(255,255,255,.06);
 border:1px solid var(--edge2);padding:10px 16px;border-radius:11px;cursor:pointer;transition:.15s;text-shadow:none}
.btn:hover{color:#fff;background:rgba(57,214,255,.16);border-color:var(--edge)}
.btn:disabled{opacity:.3;cursor:default;background:rgba(255,255,255,.04)}
.btn.key{color:#06231d;background:var(--accent);border-color:var(--accent)}
.btn.key:hover{filter:brightness(1.08);background:var(--accent)}
#pos{font-family:var(--mono);font-size:11px;color:var(--text2);min-width:148px;text-align:center;letter-spacing:.04em;padding:0 8px}
/* footer note */
.note{position:fixed;left:50%;bottom:76px;transform:translateX(-50%);z-index:9;display:flex;align-items:center;gap:9px;
 padding:7px 14px;border-radius:11px;font-family:var(--mono);font-size:9.5px;color:var(--dim);letter-spacing:.03em;white-space:nowrap}
.note .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex:0 0 auto}
.note b{color:var(--text2);font-weight:500}
#err{position:fixed;inset:0;z-index:11;display:none;place-items:center;text-align:center;color:var(--text2);
 font-family:var(--mono);font-size:13px;padding:30px;background:#0A0D10}
/* pannellum chrome -> glassy */
.pnlm-controls{border-radius:11px!important;overflow:hidden;border:1px solid var(--edge)!important;box-shadow:0 10px 28px rgba(0,0,0,.45)!important}
.pnlm-control{background:rgba(13,17,21,.62)!important;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid var(--edge2)!important}
.pnlm-control:hover{background:rgba(57,214,255,.18)!important}
.pnlm-load-box{background:rgba(10,13,16,.86)!important;border-radius:14px!important;color:var(--text)!important;font-family:var(--mono)!important}
.pnlm-lbox .pnlm-loading{filter:hue-rotate(140deg) saturate(1.4)}
</style></head><body>
<div id="panorama"></div>
<div id="err">No 360 capture loaded for this site.</div>
<header id="bar" class="glass">
 <a class="back" id="backBtn" href="sonder-glass.html" title="Back to map" onclick="if(history.length>1){history.back();return false}">&#8249;</a>
 <img class="logo" src="sonder-mark.svg" width="30" height="30" alt="Sonder"/>
 <div class="brandtxt"><h1>Sonder</h1><div class="sub">Street look-around</div></div>
 <div id="site"></div>
</header>
<div id="readout" class="glass"><div class="rd"><span>From site</span><div><b id="rd">&ndash;</b><em>m</em></div></div><div class="rd"><span>Bearing</span><b id="rb">&ndash;</b></div></div>
<div id="ctl" class="glass">
 <button class="btn" id="prev">&#8249;&ensp;Prev</button>
 <button class="btn key" id="recenter">&#9678;&ensp;Nearest</button>
 <span id="pos">&ndash;</span>
 <button class="btn" id="next">Next&ensp;&#8250;</button>
</div>
<div class="note glass"><span class="dot"></span>Real Cyvl 360 capture &middot; <b id="total">&ndash;</b> panoramas &middot; drag to look, scroll to zoom</div>
<script>
const P=window.PANOS;
const qs=new URLSearchParams(location.search);
const site={lat:parseFloat(qs.get('lat')),lng:parseFloat(qs.get('lng')),id:qs.get('site')||'',addr:qs.get('addr')||''};
const hasSite=isFinite(site.lat)&&isFinite(site.lng);
function fail(m){document.getElementById('err').style.display='grid';document.getElementById('err').textContent=m;}
if(!P||!P.id||!P.id.length){fail('Panorama index not loaded.');}
else{
 const N=P.id.length, BASE=P.base;
 document.getElementById('total').textContent=N.toLocaleString();
 if(site.addr||site.id){document.getElementById('site').innerHTML='<h2>'+(site.addr||'Site')+'</h2><div class="sub">'+(site.id||'')+'</div>';}
 const metersTo=i=>{if(!hasSite)return null;const cl=Math.cos(site.lat*Math.PI/180);return Math.round(Math.hypot((P.lng[i]-site.lng)*cl,P.lat[i]-site.lat)*111320);};
 function nearest(lat,lng){const cl=Math.cos(lat*Math.PI/180);let b=0,bd=Infinity;for(let i=0;i<N;i++){const dx=(P.lng[i]-lng)*cl,dy=P.lat[i]-lat,d=dx*dx+dy*dy;if(d<bd){bd=d;b=i;}}return b;}
 let cur=-1,v=null;const added={};
 const sceneCfg=i=>({type:'equirectangular',panorama:BASE+P.id[i]+'.jpg',hfov:110,autoLoad:true});
 function show(i){if(i<0||i>=N)return;cur=i;const sid='p'+i;
  if(!v){v=pannellum.viewer('panorama',{default:{firstScene:sid,sceneFadeDuration:400,crossOrigin:'anonymous',showZoomCtrl:true,showFullscreenCtrl:true,compass:false},scenes:{[sid]:sceneCfg(i)}});added[i]=1;}
  else{if(!added[i]){v.addScene(sid,sceneCfg(i));added[i]=1;}v.loadScene(sid);}
  paint();}
 function paint(){
  document.getElementById('rb').textContent=P.br[cur];
  const m=metersTo(cur);document.getElementById('rd').textContent=m==null?'-':m;
  document.getElementById('pos').textContent='pano '+(cur+1).toLocaleString()+' / '+N.toLocaleString();
  document.getElementById('prev').disabled=P.pv[cur]<0;document.getElementById('next').disabled=P.nx[cur]<0;}
 const go=n=>{if(n>=0&&n<N)show(n);};
 document.getElementById('next').onclick=()=>go(P.nx[cur]);
 document.getElementById('prev').onclick=()=>go(P.pv[cur]);
 document.getElementById('recenter').onclick=()=>{if(hasSite)show(nearest(site.lat,site.lng));};
 document.getElementById('recenter').style.display=hasSite?'':'none';
 addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowUp')go(P.nx[cur]);if(e.key==='ArrowLeft'||e.key==='ArrowDown')go(P.pv[cur]);});
 let start=0;
 const pq=parseInt(qs.get('pano'),10);
 if(!isNaN(pq)&&pq>=0&&pq<N)start=pq;else if(hasSite)start=nearest(site.lat,site.lng);
 show(start);
}
</script></body></html>

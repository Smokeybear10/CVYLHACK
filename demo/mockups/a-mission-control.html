<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A · Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#070b11;--panel:rgba(11,16,25,.9);--line:rgba(74,222,210,.14);--line2:rgba(74,222,210,.32);
--cyan:#34e3d4;--amber:#ffb020;--red:#ff5470;--green:#46e08a;--text:#d3deea;--dim:#6b7d8f;
--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
.uppr{text-transform:uppercase;letter-spacing:.14em}.mono{font-family:var(--mono)}
#stage{position:absolute;inset:54px 0 0 50px;background:
 radial-gradient(120% 90% at 60% 30%,rgba(20,40,55,.5),transparent 60%),
 radial-gradient(80% 70% at 30% 80%,rgba(30,25,10,.35),transparent 60%),#060a0f;overflow:hidden}
.gridbg{position:absolute;inset:0;background-image:linear-gradient(rgba(74,222,210,.05) 1px,transparent 1px),
 linear-gradient(90deg,rgba(74,222,210,.05) 1px,transparent 1px);background-size:46px 46px;mask:radial-gradient(120% 100% at 50% 40%,#000,transparent 80%)}
#streets{position:absolute;inset:0;width:100%;height:100%}
.blip{position:absolute;border-radius:50%;transform:translate(-50%,-50%);cursor:pointer;transition:.15s}
.blip:hover{filter:brightness(1.4)}
.blip.sel{box-shadow:0 0 0 2px #fff,0 0 14px currentColor!important}
.grain{position:fixed;inset:0;pointer-events:none;z-index:6;background:repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px);mix-blend-mode:overlay}
.vig{position:fixed;inset:0;pointer-events:none;z-index:6;box-shadow:inset 0 0 240px 50px rgba(0,0,0,.78)}
header{position:fixed;top:0;left:0;right:0;height:54px;z-index:20;display:flex;align-items:center;
 background:linear-gradient(180deg,rgba(7,11,17,.97),rgba(7,11,17,.7));border-bottom:1px solid var(--line2);backdrop-filter:blur(8px)}
.brand{display:flex;align-items:center;gap:11px;padding:0 16px;min-width:290px}
.brand h1{font-size:15px;font-weight:700;letter-spacing:.2em}.brand .sub{font-size:9px;color:var(--dim);letter-spacing:.24em;margin-top:2px}
.hero{flex:1;display:flex;justify-content:center;gap:24px;align-items:center}
.stat{display:flex;flex-direction:column;align-items:center;line-height:1}
.stat b{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--cyan)}.stat.v b{color:var(--green)}.stat.c b{color:var(--amber)}
.stat span{font-size:8px;color:var(--dim);letter-spacing:.2em;margin-top:5px}
.hero .ar{color:var(--dim);font-size:16px}.hero .dv{width:1px;height:24px;background:var(--line2)}
.status{min-width:290px;display:flex;justify-content:flex-end;align-items:center;gap:16px;padding:0 16px}
.live{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:.16em}
.live .d{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:p 1.8s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.35}}
.rail{position:fixed;top:54px;bottom:0;left:0;width:50px;z-index:18;display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:14px;background:rgba(7,11,17,.82);border-right:1px solid var(--line)}
.rail b{width:34px;height:34px;border-radius:7px;display:grid;place-items:center;color:var(--dim);font-size:15px;cursor:pointer}
.rail b.on{color:var(--cyan);background:rgba(74,222,210,.08);border:1px solid var(--line2)}
.panel{position:fixed;z-index:15;background:var(--panel);border:1px solid var(--line2);border-radius:10px;backdrop-filter:blur(10px);box-shadow:0 18px 50px rgba(0,0,0,.5)}
.cn{position:absolute;width:8px;height:8px;border:1px solid var(--cyan);opacity:.5}
.cn.tl{top:-1px;left:-1px;border-right:0;border-bottom:0}.cn.tr{top:-1px;right:-1px;border-left:0;border-bottom:0}
.cn.bl{bottom:-1px;left:-1px;border-right:0;border-top:0}.cn.br{bottom:-1px;right:-1px;border-left:0;border-top:0}
.ph{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line)}
.ph .t{font-size:10px;font-weight:600;letter-spacing:.16em}.ph .n{font-family:var(--mono);font-size:10px;color:var(--cyan)}
#list{top:70px;left:64px;width:252px}#rows{max-height:46vh;overflow-y:auto}
.row{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid rgba(74,222,210,.06);cursor:pointer}
.row:hover{background:rgba(74,222,210,.06)}.row.sel{background:rgba(74,222,210,.12);border-left:2px solid var(--cyan)}
.row .rk{font-family:var(--mono);font-size:10px;color:var(--dim);width:20px}
.row .a{font-size:11.5px;font-weight:500}.row .b{font-size:9px;color:var(--dim);letter-spacing:.08em;margin-top:2px}
.row .sc{font-family:var(--mono);font-size:14px;font-weight:700;margin-left:auto}
#wt{bottom:18px;left:64px;width:252px;padding-bottom:8px}
.wr{padding:7px 14px}.wr .tp{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;letter-spacing:.1em;margin-bottom:5px}
.wr .tk{height:4px;border-radius:3px;background:rgba(74,222,210,.16);overflow:hidden}.wr .fl{height:100%;background:var(--cyan)}
#insp{top:70px;right:18px;width:348px}
.ip{position:relative;height:170px;border-radius:9px 9px 0 0;overflow:hidden;background:#0d141d}
.ip img{width:100%;height:100%;object-fit:cover;filter:saturate(.9) contrast(1.05)}
.ip .gd{position:absolute;inset:0;background:linear-gradient(180deg,transparent 38%,rgba(11,16,25,.96))}
.ip .tg{position:absolute;top:9px;left:9px;font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:var(--cyan);background:rgba(7,11,17,.7);border:1px solid var(--line2);padding:3px 7px;border-radius:4px}
.ipt{position:absolute;bottom:10px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:flex-end}
.ipt .id{font-family:var(--mono);font-size:11px}.ipt .nb{color:var(--dim);font-size:9px;letter-spacing:.1em;margin-top:3px}
.ipt b{font-family:var(--mono);font-size:36px;font-weight:700;line-height:.8}.ipt .sl{font-size:8px;color:var(--dim);letter-spacing:.2em;display:block;margin-top:4px;text-align:right}
.ib{padding:13px 15px}
.rkline{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.1em;padding-bottom:11px;border-bottom:1px solid var(--line);margin-bottom:12px}
.rkline b{color:var(--amber)}
.fac{margin-bottom:10px}.fac .l{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;margin-bottom:5px;letter-spacing:.06em}
.fac .l .v{color:var(--cyan)}.fac .tk{height:5px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden}
.fac .fl{height:100%;width:0;transition:width .5s cubic-bezier(.2,.7,.2,1)}.fac .ev{font-size:9px;color:var(--dim);margin-top:5px}
.econ{display:flex;gap:10px;margin-top:13px;padding-top:12px;border-top:1px solid var(--line)}
.ec{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:7px;padding:9px}
.ec .k{font-size:8px;color:var(--dim);letter-spacing:.14em;margin-bottom:5px}.ec .v{font-family:var(--mono);font-size:16px;font-weight:700}
#lg{bottom:18px;right:18px;padding:11px 13px}#lg .lt{font-size:8px;color:var(--dim);letter-spacing:.16em;margin-bottom:8px}
.ramp{height:8px;width:190px;border-radius:4px;background:linear-gradient(90deg,#ff5470,#ffb020 52%,#46e08a)}
.rl{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:6px}
.tip{position:fixed;z-index:30;pointer-events:none;background:rgba(7,11,17,.95);border:1px solid var(--line2);border-radius:6px;padding:6px 9px;font-family:var(--mono);font-size:10px;display:none;transform:translate(-50%,-140%)}
</style></head><body>
<div id="stage"><div class="gridbg"></div><svg id="streets"></svg></div>
<div class="grain"></div><div class="vig"></div>
<header>
 <div class="brand"><svg width="26" height="26" viewBox="0 0 26 26"><rect x="1" y="1" width="24" height="24" rx="5" stroke="#34e3d4" stroke-width="1.3" opacity=".5"/><path d="M14.5 4 L8 14 H12.5 L11 22 L18 11 H13.5 Z" fill="#34e3d4"/></svg>
  <div><h1>GRIDSITE</h1><div class="sub mono">EV SITING COMMAND</div></div></div>
 <div class="hero">
  <div class="stat"><b id="hE">—</b><span>EVALUATED</span></div><div class="ar mono">→</div>
  <div class="stat v"><b id="hV">—</b><span>VIABLE</span></div><div class="dv"></div>
  <div class="stat"><b id="hT">—</b><span>TOP SCORE</span></div><div class="dv"></div>
  <div class="stat c"><b id="hC">—</b><span>NETWORK CAPEX</span></div></div>
 <div class="status"><div class="live"><span class="d"></span>CYVL LIVE</div></div>
</header>
<nav class="rail"><b class="on">◎</b><b>▤</b><b>◈</b><b>⊞</b></nav>
<section class="panel" id="list"><i class="cn tl"></i><i class="cn tr"></i><i class="cn bl"></i><i class="cn br"></i>
 <div class="ph"><span class="t uppr">Priority Ranking</span><span class="n" id="lc">—</span></div><div id="rows"></div></section>
<section class="panel" id="wt"><i class="cn tl"></i><i class="cn tr"></i><i class="cn bl"></i><i class="cn br"></i>
 <div class="ph"><span class="t uppr">Siting Model · Weights</span><span class="n">LOCKED</span></div><div id="wrows"></div></section>
<aside class="panel" id="insp"><i class="cn tl"></i><i class="cn tr"></i><i class="cn bl"></i><i class="cn br"></i>
 <div class="ip"><img id="iImg"/><div class="gd"></div><div class="tg">CYVL · STREET CAPTURE</div>
  <div class="ipt"><div><div class="id" id="iId">—</div><div class="nb uppr" id="iNb">—</div></div>
   <div><b id="iSc">—</b><span class="sl">SUITABILITY</span></div></div></div>
 <div class="ib"><div class="rkline mono"><span class="uppr">Rank <b id="iRk">—</b> / <span id="iTot">—</span></span><span id="iVd" class="uppr"></span></div>
  <div id="iFac"></div>
  <div class="econ"><div class="ec"><div class="k uppr">Install</div><div class="v">$<span id="iCo">—</span></div></div>
   <div class="ec"><div class="k uppr">Payback</div><div class="v"><span id="iPa">—</span> mo</div></div></div></div></aside>
<div class="panel" id="lg"><div class="lt uppr mono">Suitability</div><div class="ramp"></div><div class="rl"><span>40</span><span>70</span><span>100</span></div></div>
<div class="tip" id="tip"></div>
<script src="data.js"></script>
<script>
const M=window.MOCK,S=M.sites,B=M.meta.bounds,FAC=[['mounting','MOUNTING'],['power','POWER'],['parking','PARKING'],['ada','ADA ACCESS'],['demand','DEMAND']];
const W=document.getElementById('stage');let sel=null;
const col=s=>{const c1=[255,84,112],c2=[255,176,32],c3=[70,224,138];let a,b,f;if(s<70){f=Math.max(0,(s-40)/30);a=c1;b=c2}else{f=Math.min(1,(s-70)/30);a=c2;b=c3}return`rgb(${[0,1,2].map(i=>Math.round(a[i]+(b[i]-a[i])*f)).join(',')})`};
const vd=s=>s>=78?['PRIME','var(--green)']:s>=70?['VIABLE','var(--green)']:s>=60?['MARGINAL','var(--amber)']:['REJECT','var(--red)'];
function proj(lng,lat){const w=W.clientWidth,h=W.clientHeight,pad=70;
 const x=pad+(lng-B[0])/(B[2]-B[0])*(w-2*pad);const y=pad+(1-(lat-B[1])/(B[3]-B[1]))*(h-2*pad);return[x,y]}
// ops-console-style street network, derived from the real site spread so blips sit on the grid
function drawStreets(){const svg=document.getElementById('streets');const w=W.clientWidth,h=W.clientHeight;
 const pts=S.map(s=>{const[x,y]=proj(s.lng,s.lat);return{x,y}});if(pts.length<2){svg.innerHTML='';return}
 const MAXD=Math.min(w,h)*0.2,K=3,seen=new Set();let minor='';
 // minor streets: connect each site to its nearest few neighbours (k-NN web)
 pts.forEach((p,i)=>{pts.map((q,j)=>({j,d:Math.hypot(p.x-q.x,p.y-q.y)})).filter(o=>o.j!==i&&o.d<MAXD).sort((a,b)=>a.d-b.d).slice(0,K)
  .forEach(o=>{const k=i<o.j?i+'_'+o.j:o.j+'_'+i;if(seen.has(k))return;seen.add(k);const q=pts[o.j];
   minor+=`<line x1="${p.x.toFixed(1)}" y1="${p.y.toFixed(1)}" x2="${q.x.toFixed(1)}" y2="${q.y.toFixed(1)}" stroke="rgba(120,165,190,.12)" stroke-width="1.2"/>`})});
 // arterials: sweep through the cloud sorted east-west and north-south
 const corridor=(cmp,step)=>{const a=pts.slice().sort(cmp).filter((_,i)=>i%step===0);if(a.length<2)return null;
  let d=`M ${a[0].x.toFixed(1)} ${a[0].y.toFixed(1)}`;for(let i=1;i<a.length;i++)d+=` L ${a[i].x.toFixed(1)} ${a[i].y.toFixed(1)}`;
  const m=a[a.length>>1],p=a[Math.max(0,(a.length>>1)-1)];return{d,mx:m.x,my:m.y,ang:Math.atan2(m.y-p.y,m.x-p.x)*180/Math.PI}};
 const arts=[[corridor((a,b)=>a.x-b.x,3),'SOMERVILLE AVE'],[corridor((a,b)=>a.y-b.y,3),'MCGRATH HWY']];
 let art='',lab='';
 arts.forEach(([c,name])=>{if(!c)return;
  art+=`<path d="${c.d}" fill="none" stroke="rgba(74,222,210,.2)" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>`;
  lab+=`<text x="${c.mx.toFixed(1)}" y="${(c.my-7).toFixed(1)}" transform="rotate(${c.ang.toFixed(1)} ${c.mx.toFixed(1)} ${c.my.toFixed(1)})" font-family="JetBrains Mono,monospace" font-size="10" letter-spacing="1.5" fill="rgba(120,165,190,.5)">${name}</text>`});
 svg.innerHTML=minor+art+lab}
function drawBlips(){document.querySelectorAll('.blip').forEach(b=>b.remove());
 S.forEach(s=>{const[x,y]=proj(s.lng,s.lat);const r=s.score>=70?9:6;const c=col(s.score);
  const d=document.createElement('div');d.className='blip'+(s.id===sel?' sel':'');d.style.cssText=`left:${x}px;top:${y}px;width:${r}px;height:${r}px;background:${c};color:${c};box-shadow:0 0 ${s.score>=70?16:7}px ${c}`;
  d.onmouseenter=e=>{const t=document.getElementById('tip');t.style.display='block';t.style.left=x+'px';t.style.top=(y+54)+'px';t.innerHTML=`${s.id} · <b style="color:${c}">${s.score}</b>`};
  d.onmouseleave=()=>document.getElementById('tip').style.display='none';
  d.onclick=()=>select(s.id);W.appendChild(d)})}
function hero(){document.getElementById('hE').textContent=S.length;
 document.getElementById('hV').textContent=S.filter(s=>s.score>=70).length;
 document.getElementById('hT').textContent=S[0].score.toFixed(1);
 const cap=S.slice(0,10).reduce((a,s)=>a+s.cost,0);document.getElementById('hC').textContent='$'+(cap/1000).toFixed(0)+'K';
 document.getElementById('lc').textContent=S.filter(s=>s.score>=70).length+' VIABLE'}
function list(){const el=document.getElementById('rows');el.innerHTML='';
 S.slice(0,12).forEach(s=>{const r=document.createElement('div');r.className='row'+(s.id===sel?' sel':'');
  r.innerHTML=`<div class="rk">${String(s.rank).padStart(2,'0')}</div><div><div class="a">${s.id}</div><div class="b uppr">${s.nb}</div></div><div class="sc" style="color:${col(s.score)}">${s.score}</div>`;
  r.onclick=()=>select(s.id);el.appendChild(r)})}
function weights(){const el=document.getElementById('wrows');el.innerHTML='';
 FAC.forEach(([k,l])=>{const w=M.meta.weights[k];el.innerHTML+=`<div class="wr"><div class="tp"><span>${l}</span><span style="color:var(--cyan)">${(w*100|0)}</span></div><div class="tk"><div class="fl" style="width:${w/0.4*100}%"></div></div></div>`})}
function insp(s){document.getElementById('iId').textContent=s.id;document.getElementById('iNb').textContent=s.nb;
 const sc=document.getElementById('iSc');sc.textContent=s.score.toFixed(0);sc.style.color=col(s.score);
 document.getElementById('iRk').textContent=s.rank;document.getElementById('iTot').textContent=S.length;
 const[vl,vc]=vd(s.score);const v=document.getElementById('iVd');v.textContent=vl;v.style.color=vc;
 document.getElementById('iCo').textContent=s.cost.toLocaleString();document.getElementById('iPa').textContent=s.pay;
 document.getElementById('iImg').src=s.img;
 const f=document.getElementById('iFac');f.innerHTML='';
 FAC.forEach(([k,l])=>{const val=s.f[k];const c=val>=.75?'var(--green)':val>=.55?'var(--amber)':'var(--red)';
  const d=document.createElement('div');d.className='fac';
  d.innerHTML=`<div class="l"><span>${l}</span><span class="v">${(val*100|0)}</span></div><div class="tk"><div class="fl" style="background:${c}"></div></div><div class="ev">${s.ev[k]}</div>`;
  f.appendChild(d);requestAnimationFrame(()=>d.querySelector('.fl').style.width=(val*100)+'%')})}
function select(id){sel=id;insp(S.find(s=>s.id===id));list();drawBlips()}
function render(){drawStreets();drawBlips();hero();list();weights();select(S[0].id)}
window.addEventListener('resize',()=>{drawStreets();drawBlips();if(sel)select(sel)});
render();
</script></body></html>

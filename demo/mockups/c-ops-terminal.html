<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>C · Ops Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0c;--bg2:#101013;--amber:#ffb84d;--amber2:#ffd591;--cy:#5fd0ff;--red:#ff5d6c;--green:#5ee08a;--dim:#6a6a72;--line:rgba(255,184,77,.16);--text:#e6e6ea;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px}
.uppr{text-transform:uppercase;letter-spacing:.14em}
.scan{position:fixed;inset:0;pointer-events:none;z-index:8;background:repeating-linear-gradient(0deg,rgba(0,0,0,.13) 0 1px,transparent 1px 3px)}
header{height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--line)}
header .l{display:flex;align-items:center;gap:14px}
header .tt{font-size:13px;font-weight:700;letter-spacing:.24em;color:var(--amber)}
header .sub{font-size:9px;color:var(--dim);letter-spacing:.2em}
header .r{display:flex;gap:18px;font-size:10px;color:var(--dim);letter-spacing:.12em}
header .r b{color:var(--amber);font-weight:500}
.wrap{display:flex;height:calc(100% - 42px - 30px)}
aside{width:258px;border-right:1px solid var(--line);display:flex;flex-direction:column;background:#0c0c0f}
.sec{padding:13px 15px;border-bottom:1px solid var(--line)}
.sec h3{font-size:9px;color:var(--dim);letter-spacing:.18em;margin-bottom:11px}
.sg{display:flex;justify-content:space-between;margin-bottom:9px;font-size:11px}
.sg .k{color:var(--dim)}.sg .v{font-weight:700}.sg .v.am{color:var(--amber)}.sg .v.gr{color:var(--green)}.sg .v.cy{color:var(--cy)}
.histo{display:flex;align-items:flex-end;gap:5px;height:64px;margin-top:4px}
.histo .b{flex:1;background:linear-gradient(180deg,var(--amber),rgba(255,184,77,.25));border-radius:2px 2px 0 0;position:relative;min-height:3px}
.histo .b span{position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--dim)}
#mini{width:100%;height:150px;background:#070709;border:1px solid var(--line);position:relative;overflow:hidden}
.mblip{position:absolute;border-radius:50%;transform:translate(-50%,-50%)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.focus{display:flex;align-items:center;gap:14px;padding:11px 16px;border-bottom:1px solid var(--line);background:#0d0d10}
.focus .ph{width:96px;height:60px;border:1px solid var(--line);overflow:hidden;flex:0 0 auto;background:#000}
.focus .ph img{width:100%;height:100%;object-fit:cover}
.focus .fi{min-width:150px}.focus .fi .id{font-size:14px;font-weight:700;color:var(--amber2)}
.focus .fi .nb{font-size:9px;color:var(--dim);letter-spacing:.14em;margin-top:3px}
.focus .fb{display:flex;gap:16px;flex:1}
.fbar{flex:1;max-width:120px}.fbar .l{display:flex;justify-content:space-between;font-size:8.5px;color:var(--dim);margin-bottom:4px;letter-spacing:.08em}
.fbar .tk{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}.fbar .fl{height:100%;background:var(--amber)}
.focus .big{margin-left:auto;text-align:right}.focus .big b{font-size:34px;font-weight:700;line-height:.8}.focus .big span{font-size:8px;color:var(--dim);letter-spacing:.18em;display:block;margin-top:4px}
.tblwrap{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse}
thead th{position:sticky;top:0;background:#0c0c0f;font-size:9px;color:var(--dim);letter-spacing:.12em;text-align:right;padding:9px 12px;border-bottom:1px solid var(--line);font-weight:500;z-index:2}
thead th.l{text-align:left}
tbody td{padding:7px 12px;text-align:right;border-bottom:1px solid rgba(255,184,77,.05);font-size:11px;white-space:nowrap}
tbody td.l{text-align:left}
tbody tr{cursor:pointer}tbody tr:hover{background:rgba(255,184,77,.06)}
tbody tr.sel{background:rgba(255,184,77,.12);outline:1px solid var(--line)}
.rk{color:var(--dim)}.sid{color:var(--amber2);font-weight:500}.sec-c{color:var(--dim);font-size:9px;letter-spacing:.1em}
.fnum{color:var(--text)}.score{font-weight:700}
.tag{font-size:8px;padding:1px 5px;border:1px solid currentColor;border-radius:3px;letter-spacing:.08em}
.cmd{height:30px;background:#070709;border-top:1px solid var(--line);display:flex;align-items:center;padding:0 16px;font-size:11px;color:var(--dim)}
.cmd .p{color:var(--amber);margin-right:8px}.cmd .ty{color:var(--text)}
.cur{display:inline-block;width:8px;height:14px;background:var(--amber);margin-left:3px;animation:bl 1.1s steps(1) infinite;vertical-align:middle}
@keyframes bl{50%{opacity:0}}
::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:rgba(255,184,77,.2)}
</style></head><body>
<div class="scan"></div>
<header>
 <div class="l"><span class="tt">▦ GRIDSITE</span><span class="sub uppr">EV Siting Terminal · Somerville MA</span></div>
 <div class="r"><span>SRC <b>CYVL TWIN</b></span><span>EVAL <b id="hE">—</b></span><span>VIABLE <b id="hV">—</b></span><span>CAPEX <b id="hC">—</b></span><span class="green" id="clk">--:--:--</span></div>
</header>
<div class="wrap">
 <aside>
  <div class="sec"><h3 class="uppr">Run Summary</h3>
   <div class="sg"><span class="k">Sites evaluated</span><span class="v">97</span></div>
   <div class="sg"><span class="k">Viable (≥70)</span><span class="v gr" id="sV">—</span></div>
   <div class="sg"><span class="k">Top score</span><span class="v am" id="sT">—</span></div>
   <div class="sg"><span class="k">Mean score</span><span class="v" id="sM">—</span></div>
   <div class="sg"><span class="k">Top-10 CapEx</span><span class="v am" id="sC">—</span></div>
  </div>
  <div class="sec"><h3 class="uppr">Score Distribution</h3><div class="histo" id="histo"></div></div>
  <div class="sec" style="flex:1"><h3 class="uppr">Sector Map</h3><div id="mini"></div></div>
 </aside>
 <div class="main">
  <div class="focus" id="focus">
   <div class="ph"><img id="fImg"/></div>
   <div class="fi"><div class="id" id="fId">—</div><div class="nb uppr" id="fNb">—</div></div>
   <div class="fb" id="fBars"></div>
   <div class="big"><b id="fSc">—</b><span class="uppr" id="fVd">—</span></div>
  </div>
  <div class="tblwrap"><table>
   <thead><tr><th class="l">#</th><th class="l">SITE ID</th><th class="l">SECTOR</th><th>MNT</th><th>PWR</th><th>PRK</th><th>ADA</th><th>DMD</th><th>SCORE</th><th>$K</th><th>PAY</th><th>STATUS</th></tr></thead>
   <tbody id="tbody"></tbody>
  </table></div>
 </div>
</div>
<div class="cmd"><span class="p">gridsite&gt;</span><span class="ty" id="cmdty"></span><span class="cur"></span></div>
<script src="data.js"></script>
<script>
const M=window.MOCK,S=M.sites,B=M.meta.bounds;let sel=null;
const col=s=>s>=78?'#5ee08a':s>=70?'#9be38a':s>=60?'#ffb84d':'#ff5d6c';
const vd=s=>s>=78?['PRIME','#5ee08a']:s>=70?['VIABLE','#5ee08a']:s>=60?['MARGINAL','#ffb84d']:['REJECT','#ff5d6c'];
const F=['mounting','power','parking','ada','demand'],FL=['MNT','PWR','PRK','ADA','DMD'];
function hero(){const v=S.filter(s=>s.score>=70).length;const cap=S.slice(0,10).reduce((a,s)=>a+s.cost,0);
 const mean=(S.reduce((a,s)=>a+s.score,0)/S.length).toFixed(1);
 hE.textContent=S.length;hV.textContent=v;hC.textContent='$'+(cap/1000).toFixed(0)+'K';
 sV.textContent=v;sT.textContent=S[0].score.toFixed(1);sM.textContent=mean;sC.textContent='$'+(cap/1000).toFixed(0)+'K'}
function histo(){const bins=[0,0,0,0,0];S.forEach(s=>{const i=Math.min(4,Math.max(0,Math.floor((s.score-40)/10)));bins[i]++});
 const mx=Math.max(...bins);const el=document.getElementById('histo');el.innerHTML='';
 const labs=['40','50','60','70','80'];
 bins.forEach((b,i)=>{el.innerHTML+=`<div class="b" style="height:${b/mx*100}%"><span>${labs[i]}</span></div>`})}
function mini(){const el=document.getElementById('mini');el.querySelectorAll('.mblip').forEach(b=>b.remove());
 const w=el.clientWidth,h=el.clientHeight,pad=12;
 S.forEach(s=>{const x=pad+(s.lng-B[0])/(B[2]-B[0])*(w-2*pad);const y=pad+(1-(s.lat-B[1])/(B[3]-B[1]))*(h-2*pad);
  const r=s.score>=70?6:4;const c=col(s.score);const d=document.createElement('div');d.className='mblip';
  d.style.cssText=`left:${x}px;top:${y}px;width:${r}px;height:${r}px;background:${c};box-shadow:0 0 ${s.score>=70?9:4}px ${c}`+(s.id===sel?';outline:2px solid #fff':'');el.appendChild(d)})}
function rows(){const tb=document.getElementById('tbody');tb.innerHTML='';
 S.forEach(s=>{const[vl,vc]=vd(s.score);const tr=document.createElement('tr');if(s.id===sel)tr.className='sel';
  tr.innerHTML=`<td class="l rk">${String(s.rank).padStart(2,'0')}</td><td class="l sid">${s.id}</td><td class="l sec-c uppr">${s.nb}</td>`+
   F.map(k=>`<td class="fnum">${(s.f[k]*100|0)}</td>`).join('')+
   `<td class="score" style="color:${col(s.score)}">${s.score}</td><td>${(s.cost/1000).toFixed(1)}</td><td>${s.pay}</td>`+
   `<td><span class="tag" style="color:${vc}">${vl}</span></td>`;
  tr.onclick=()=>select(s.id);tb.appendChild(tr)})}
function focus(s){fId.textContent=s.id;fNb.textContent=s.nb;const sc=document.getElementById('fSc');sc.textContent=s.score.toFixed(0);sc.style.color=col(s.score);
 const[vl,vc]=vd(s.score);const v=document.getElementById('fVd');v.textContent=vl;v.style.color=vc;
 document.getElementById('fImg').src=s.img;
 const fb=document.getElementById('fBars');fb.innerHTML='';
 F.forEach((k,i)=>{fb.innerHTML+=`<div class="fbar"><div class="l"><span>${FL[i]}</span><span style="color:var(--amber)">${(s.f[k]*100|0)}</span></div><div class="tk"><div class="fl" style="width:${s.f[k]*100}%;background:${s.f[k]>=.7?'var(--green)':s.f[k]>=.55?'var(--amber)':'var(--red)'}"></div></div></div>`});
 document.getElementById('cmdty').textContent=`inspect ${s.id} --rank ${s.rank} --score ${s.score} --evidence "${s.ev.mounting}"`}
function select(id){sel=id;focus(S.find(s=>s.id===id));rows();mini()}
function render(){hero();histo();mini();rows();select(S[0].id);
 setInterval(()=>{document.getElementById('clk').textContent=new Date().toTimeString().slice(0,8)},1000)}
window.addEventListener('resize',mini);
render();
</script></body></html>

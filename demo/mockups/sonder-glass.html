<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SONDER</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="vendor/leaflet.css"/>
<script src="vendor/leaflet.js"></script>
<style>
:root{
 --text:#E8EDEF;--text2:#BCC3C9;--dim:#9CA5AC;
 --accent:#39D6FF;--green:#3DF58B;--amber:#FFB02E;--red:#FF5A52;
 --glass:rgba(13,17,21,.70);--glass2:rgba(15,19,24,.78);
 --edge:rgba(255,255,255,.16);--edge2:rgba(255,255,255,.10);
 --mono:'IBM Plex Mono',monospace;--sans:'Hanken Grotesk',sans-serif;--display:'Fraunces',serif}
*{margin:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0A0D10;color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
#map{position:fixed;inset:0;z-index:0;background:#0A0D10}
.leaflet-container{background:#0A0D10}
.leaflet-control-zoom{border:1px solid var(--edge)!important;border-radius:13px!important;overflow:hidden;margin:18px!important;
 backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);box-shadow:0 10px 30px rgba(0,0,0,.45)}
.leaflet-control-zoom a{background:rgba(17,21,30,.5)!important;color:var(--accent)!important;border-bottom:1px solid var(--edge2)!important;
 width:36px!important;height:36px!important;line-height:36px!important;font-size:18px!important}
.leaflet-control-zoom a:hover{background:rgba(57,214,255,.18)!important;color:#fff!important}
.leaflet-control-zoom a.leaflet-disabled{opacity:.3!important}
.pin{display:none}
/* liquid glass */
.glass{background:var(--glass);backdrop-filter:blur(30px) saturate(1.8);-webkit-backdrop-filter:blur(30px) saturate(1.8);
 border:1px solid var(--edge);border-radius:20px;
 box-shadow:inset 0 1px 0 rgba(255,255,255,.22),inset 0 -1px 0 rgba(0,0,0,.22),0 24px 60px -16px rgba(0,0,0,.6);text-shadow:0 1px 2px rgba(0,0,0,.55);position:relative}
.glass::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
 background:linear-gradient(160deg,rgba(255,255,255,.10),rgba(255,255,255,0) 38%)}
.uppr{text-transform:uppercase;letter-spacing:.08em}.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
/* brand */
#brand{position:fixed;top:18px;left:18px;z-index:20;display:flex;align-items:center;gap:9px;padding:9px 14px 9px 11px}
#brand h1{font-family:var(--display);font-weight:600;font-size:17px;letter-spacing:.02em}
#brand .sub{font-size:9px;color:var(--dim);margin-top:1px}
/* command bar */
#cmdbar{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:21;width:min(560px,52vw);
 display:flex;align-items:center;gap:11px;padding:13px 15px}
#cmdbar .ic{color:var(--accent);font-size:16px}
#cmdbar input{flex:1;background:none;border:0;outline:0;color:var(--text);font-size:14px;font-family:var(--sans)}
#cmdbar input::placeholder{color:var(--dim)}
#cmdbar .count{font-family:var(--mono);font-size:10px;color:var(--text2);background:rgba(255,255,255,.07);border:1px solid var(--edge2);
 border-radius:8px;padding:6px 9px;cursor:pointer;white-space:nowrap;transition:.15s}
#cmdbar .count:hover{background:rgba(57,214,255,.16);color:#fff}
/* top-right tools */
.tools{position:fixed;top:18px;right:18px;z-index:20;display:flex;gap:8px}
.tools button{font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--text2);padding:11px 14px;cursor:pointer;
 background:var(--glass);backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);
 border:1px solid var(--edge);border-radius:13px;transition:.15s}
.tools button:hover{color:#fff;border-color:var(--edge)}
.tools button.on{color:#06231d;background:var(--amber);border-color:var(--amber)}
/* results dropdown */
#results{position:fixed;top:76px;left:50%;z-index:20;width:min(560px,52vw);max-height:62vh;display:flex;flex-direction:column;overflow:hidden;
 transform:translateX(-50%) translateY(-8px) scale(.99);opacity:0;pointer-events:none;transition:.22s cubic-bezier(.2,.8,.2,1)}
#results.open{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0) scale(1)}
.rhead{display:flex;align-items:center;justify-content:space-between;padding:13px 17px;border-bottom:1px solid var(--edge2)}
.funnel{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px}
.funnel b{font-size:14px;font-weight:600}.funnel b.v{color:var(--green)}.funnel b.t{color:var(--accent)}
.funnel span{font-size:8.5px;color:var(--dim);letter-spacing:.06em}.funnel i{color:var(--dim);font-style:normal}
.rhead .x{color:var(--dim);cursor:pointer;font-size:15px;padding:0 4px}.rhead .x:hover{color:var(--text)}
.rfilt{display:flex;gap:16px;padding:9px 17px;border-bottom:1px solid var(--edge2);flex-wrap:wrap}
.rfilt .fg{display:flex;align-items:center;gap:4px}
.rfilt .fg span{font-size:8.5px;color:var(--dim);letter-spacing:.07em;margin-right:3px;text-transform:uppercase}
.rfilt b{font-family:var(--mono);font-size:9px;color:var(--text2);padding:5px 9px;border:1px solid var(--edge2);border-radius:7px;cursor:pointer;transition:.12s}
.rfilt b:hover{color:#fff}.rfilt b.on{color:#06231d;background:var(--accent);border-color:var(--accent)}
#clist{overflow-y:auto;flex:1}
.row{display:flex;align-items:center;gap:12px;padding:11px 17px;border-bottom:1px solid var(--edge2);cursor:pointer;transition:background .12s}
.row:hover{background:rgba(255,255,255,.05)}.row.sel{background:rgba(57,214,255,.12)}
.row.kb{background:rgba(57,214,255,.16);box-shadow:inset 2px 0 0 var(--accent)}
.row.pick{background:rgba(57,214,255,.07);box-shadow:inset 3px 0 0 var(--accent)}
.pickbadge{font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;color:#04131a;background:var(--accent);padding:2px 5px;border-radius:5px;margin-left:7px;vertical-align:middle}
.row .rk{font-family:var(--mono);font-size:10px;color:var(--dim);width:22px}
.row .nm{flex:1;min-width:0}.row .a{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .b{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:2px}
.row .sc{font-family:var(--mono);font-size:15px;font-weight:600}
.empty{padding:26px;text-align:center;color:var(--dim);font-size:12px}
.rfoot{display:flex;align-items:center;gap:6px;padding:11px 17px;border-top:1px solid var(--edge2)}
.rfoot span{font-size:9px;color:var(--dim);letter-spacing:.08em;margin-right:3px}
.rfoot b{flex:1;text-align:center;font-family:var(--mono);font-size:10px;color:var(--text2);padding:6px 0;border:1px solid var(--edge2);border-radius:8px;cursor:pointer;transition:.12s}
.rfoot b:hover{color:#fff}.rfoot b.on{color:#06231d;background:var(--accent);border-color:var(--accent)}
.rfoot input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:3px;background:rgba(255,255,255,.14);outline:none}
.rfoot input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 4px rgba(57,214,255,.18)}
.rfoot #minScoreVal{flex:0 0 auto;font-family:var(--mono);font-size:11px;color:var(--accent);min-width:40px;text-align:right;border:0;padding:0;background:none;cursor:default}
/* views */
#views{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:3px;padding:5px}
#views b{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--text2);padding:9px 15px;border-radius:13px;cursor:pointer;transition:.15s}
#views b:hover{color:#fff;background:rgba(255,255,255,.08)}#views b.on{color:#06231d;background:var(--accent)}
#cmdbar .cbtn{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:var(--text2);background:rgba(255,255,255,.06);border:1px solid var(--edge2);cursor:pointer;font-size:12px;transition:.15s;flex:0 0 auto;font-family:var(--sans)}
#cmdbar .cbtn:hover{color:#fff;background:rgba(57,214,255,.16)}
#cmdbar .cbtn.on{color:#06231d;background:var(--amber);border-color:var(--amber)}
#layers{position:fixed;z-index:23;width:172px;padding:6px;display:flex;flex-direction:column;gap:2px;left:50%;top:76px;transform:translateY(-8px) scale(.98);opacity:0;pointer-events:none;transition:.2s cubic-bezier(.2,.8,.2,1)}
#layers.open{opacity:1;pointer-events:auto;transform:translateY(0) scale(1)}
#layers b{font-size:12px;color:var(--text2);padding:9px 12px;border-radius:11px;cursor:pointer;transition:.12s}
#layers b:hover{color:#fff;background:rgba(255,255,255,.07)}
#layers b.on{color:#06231d;background:var(--accent)}
#layers .lsep{height:1px;background:var(--edge2);margin:4px 6px}
#layers b[data-reset]{color:var(--amber)}
/* report card */
#report{position:fixed;top:18px;right:18px;z-index:19;width:362px;max-height:calc(100vh - 36px);overflow:hidden;display:flex;flex-direction:column;
 transform:translateX(18px) scale(.99);opacity:0;pointer-events:none;transition:.26s cubic-bezier(.2,.8,.2,1)}
#report.open{opacity:1;pointer-events:auto;transform:none}
.rresize{position:absolute;left:0;top:0;bottom:0;width:11px;cursor:ew-resize;z-index:6}
.rresize::before{content:"";position:absolute;left:3px;top:50%;transform:translateY(-50%);width:3px;height:36px;border-radius:3px;background:rgba(255,255,255,.16);opacity:0;transition:opacity .15s,background .15s}
.rresize:hover::before{opacity:1;background:var(--accent)}
.rphoto{position:relative;height:176px;flex:0 0 auto;overflow:hidden;border-radius:20px 20px 0 0}
.rphoto img{width:100%;height:100%;object-fit:cover}
.rphoto .gd{position:absolute;inset:0;background:linear-gradient(180deg,transparent 36%,rgba(17,21,30,.92))}
.rphoto .tg{position:absolute;top:12px;left:14px;font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--accent);background:rgba(10,13,16,.55);border:1px solid var(--edge);padding:4px 9px;border-radius:7px;backdrop-filter:blur(8px)}
.rphoto .x{position:absolute;top:11px;right:12px;width:26px;height:26px;display:grid;place-items:center;border-radius:50%;background:rgba(10,13,16,.5);border:1px solid var(--edge);color:var(--text);cursor:pointer;backdrop-filter:blur(8px);z-index:2}
.rphoto{cursor:pointer}
.rphoto .tg{transition:.15s}
.rphoto:hover .tg{background:var(--accent);color:#06231d;border-color:var(--accent)}
.rphoto .enter{position:absolute;top:50%;left:50%;transform:translate(-50%,-44%);font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#06231d;background:var(--accent);padding:9px 15px;border-radius:999px;opacity:0;pointer-events:none;transition:.18s;box-shadow:0 8px 24px rgba(0,0,0,.45);white-space:nowrap}
.rphoto:hover .enter{opacity:1;transform:translate(-50%,-50%)}
#report.noview .rphoto{cursor:default}
#report.noview .rphoto:hover .tg{background:rgba(10,13,16,.55);color:var(--dim);border-color:var(--edge)}
#report.noview .rphoto .enter{display:none}
#report.noview .rphoto .tg{color:var(--dim)}
#svToast{position:fixed;left:50%;bottom:74px;transform:translateX(-50%) translateY(8px);z-index:60;font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--text);background:var(--glass2);border:1px solid var(--edge);backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);padding:10px 16px;border-radius:11px;opacity:0;pointer-events:none;transition:.18s}
#svToast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.rtop{position:absolute;bottom:13px;left:18px;right:18px;display:flex;justify-content:space-between;align-items:flex-end}
.rtop .id{font-family:var(--display);font-weight:600;font-size:19px}.rtop .nb{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:3px}
.verdict{text-align:right}.verdict .vb{font-family:var(--display);font-weight:600;font-size:23px;line-height:1}.verdict .vr{font-size:8px;color:var(--text2);margin-top:5px;max-width:160px}
.rbody{padding:15px 18px;overflow-y:auto}
.econ{display:flex;gap:9px;margin-bottom:15px}
.ec{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--edge2);border-radius:12px;padding:11px;text-align:center}
.ec .k{font-size:7.5px;color:var(--dim);letter-spacing:.1em}.ec .v{font-family:var(--display);font-size:18px;font-weight:600;margin-top:5px}
.blk{margin-bottom:14px}.blk .bh{display:flex;justify-content:space-between;align-items:center;font-size:9.5px;letter-spacing:.04em;color:var(--accent);font-weight:600;margin-bottom:8px}
.blk .bh .src{font-family:var(--mono);font-size:8px;color:var(--dim);text-transform:lowercase}
.kv{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--edge2)}
.kv .k{color:var(--text2)}.kv .v{font-family:var(--mono)}
.pass{color:var(--green)!important}.fail{color:var(--red)!important}.cond{color:var(--amber)!important}
.surveyblk{background:rgba(57,214,255,.06);border:1px solid rgba(57,214,255,.22);border-radius:12px;padding:13px 14px;margin-bottom:15px}
.surveyblk .sh{display:flex;justify-content:space-between;align-items:center;font-size:9.5px;letter-spacing:.07em;color:var(--accent);font-weight:600;margin-bottom:8px;text-transform:uppercase}
.surveyblk .tier{font-family:var(--mono);font-size:10px;padding:3px 9px;border:1px solid;border-radius:8px;letter-spacing:.03em}
.surveyblk .sreason{font-size:12.5px;color:var(--text);margin-bottom:6px;line-height:1.45}
.surveyblk .ssub{font-size:8px;color:var(--dim);letter-spacing:.09em;text-transform:uppercase;margin:10px 0 4px}
.surveyblk ul{list-style:none;margin:0;padding:0}
.surveyblk li{font-size:11px;color:var(--text2);padding:2px 0 2px 13px;position:relative;line-height:1.45}
.surveyblk li:before{content:"";position:absolute;left:3px;top:8px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
.surveyblk ul.dim li{color:var(--dim)}.surveyblk ul.dim li:before{background:var(--amber)}
.surveyblk .sby{font-size:8.5px;color:var(--dim);margin-top:10px;font-style:italic}
.surveyblk{overflow:hidden}
.surveyblk .srun{display:none;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;color:var(--accent);padding:4px 0}
.surveyblk.surveying .srun{display:flex}.surveyblk.surveying .scontent{display:none}
.srun .sdot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:sp 1s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.6)}}
.surveyblk .tier{animation:pop .4s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.scontent>div,.scontent>ul{opacity:0;animation:srev .45s ease forwards}
.scontent>.sh{animation-delay:.02s}.scontent>.sreason{animation-delay:.1s}
.scontent>ul:nth-of-type(1){animation-delay:.18s}.scontent>.ssub:nth-of-type(1){animation-delay:.26s}
.scontent>ul:nth-of-type(2){animation-delay:.32s}.scontent>.ssub:nth-of-type(2){animation-delay:.4s}
.scontent>ul:nth-of-type(3){animation-delay:.46s}.scontent>.sby{animation-delay:.54s}
@keyframes srev{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.surveynote{font-size:11px;color:var(--dim);background:rgba(255,255,255,.04);border:1px solid var(--edge2);border-radius:10px;padding:11px 13px;margin-bottom:15px}
.flagbox{font-size:9.5px;color:var(--amber);background:rgba(255,176,46,.08);border:1px solid rgba(255,176,46,.22);border-radius:10px;padding:10px 12px;line-height:1.5}
.samlink{display:block;position:relative;margin:2px 0 10px;border-radius:10px;overflow:hidden;border:1px solid var(--edge2);cursor:zoom-in}
.samimg{width:100%;display:block}
.samtag{position:absolute;bottom:8px;left:8px;font-size:9px;letter-spacing:.04em;color:#04131a;background:var(--accent);padding:3px 8px;border-radius:6px}
.loader{position:fixed;inset:0;z-index:40;display:grid;place-items:center;background:#0A0D10;transition:.5s}
.loader.gone{opacity:0;pointer-events:none}.loader .l{font-family:var(--display);font-style:italic;color:var(--text2);font-size:16px}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:5px}
/* survey control */
#dispatch{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(6px);z-index:25;display:none;align-items:center;gap:12px;padding:9px 12px 9px 11px;cursor:pointer;overflow:hidden;border-radius:16px;opacity:0;transition:transform .2s cubic-bezier(.2,.8,.2,1),opacity .2s,border-color .2s}
#dispatch.show{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
#dispatch:hover{transform:translateX(-50%) translateY(-2px);border-color:rgba(255,255,255,.28)}
#dispatch:active{transform:translateX(-50%) translateY(0)}
#dispatch .dico{display:grid;place-items:center;width:34px;height:34px;border-radius:11px;color:var(--accent);background:rgba(57,214,255,.12);border:1px solid rgba(57,214,255,.2);flex:0 0 auto}
#dispatch .dtext{display:flex;flex-direction:column;gap:1px;padding-right:2px}
#dispatch .dlabel{font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--text);letter-spacing:.004em;line-height:1.15}
#dispatch .dsub{font-family:var(--sans);font-size:11px;color:var(--dim);line-height:1.2}
#dispatch.running{cursor:progress}
#dispatch.running .dico{animation:dscan 1.4s ease-in-out infinite}
@keyframes dscan{0%,100%{opacity:1}50%{opacity:.5}}
#dispatch .bar{position:absolute;left:0;bottom:0;height:2px;background:var(--accent);width:0;transition:width .3s}
.surveyblk.live{background:rgba(61,245,139,.05);border-color:rgba(61,245,139,.22)}
.surveyblk.live .sh{color:var(--green)}
.surveyblk .live-badge{font-family:var(--mono);font-size:7.5px;letter-spacing:.07em;text-transform:uppercase;color:#06231d;background:var(--amber);padding:2px 6px;border-radius:5px;margin-left:6px}
.crewdoc{margin-top:12px;border-top:1px solid rgba(61,245,139,.22);padding-top:11px}
.crewdoc .ch{font-size:8.5px;color:var(--green);letter-spacing:.09em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;font-weight:600}
.crewfind{font-size:11px;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--edge2);line-height:1.45}
.crewfind b{font-weight:600;font-size:8px;letter-spacing:.05em;text-transform:uppercase;display:block;color:var(--accent);margin-bottom:2px}
.crewdoc .crat{font-size:11.5px;color:var(--text);line-height:1.55;margin-top:10px;font-style:italic}
.pdfbtn{width:100%;margin-top:2px;font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--accent);background:rgba(57,214,255,.08);border:1px solid rgba(57,214,255,.3);border-radius:11px;padding:11px;cursor:pointer;transition:.14s}
.pdfbtn:hover{background:var(--accent);color:#06231d;border-color:var(--accent)}
.pdfbtn:disabled{opacity:.55;cursor:default}
/* survey FX */
#fx{position:fixed;inset:0;z-index:18;pointer-events:none;overflow:hidden}
.fxtag{position:absolute;transform:translate(-50%,-50%);font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.05em;padding:3px 9px;border-radius:7px;color:#06231d;white-space:nowrap;text-shadow:0 1px 1px rgba(0,0,0,.25);box-shadow:0 6px 18px rgba(0,0,0,.35);animation:fxrise 1.15s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes fxrise{0%{opacity:0;transform:translate(-50%,-20%) scale(.6)}20%{opacity:1;transform:translate(-50%,-95%) scale(1)}100%{opacity:0;transform:translate(-50%,-210%) scale(1)}}
.fxscan{position:absolute;left:0;right:0;top:-3%;height:2px;background:linear-gradient(90deg,transparent,rgba(57,214,255,.9),transparent);box-shadow:0 0 22px 4px rgba(57,214,255,.5);opacity:0}
.fxscan.on{animation:fxsweep 1.8s cubic-bezier(.45,0,.55,1) infinite}
@keyframes fxsweep{0%{top:-3%;opacity:0}8%{opacity:.9}92%{opacity:.9}100%{top:103%;opacity:0}}
.fxwalk{position:absolute;width:8px;height:8px;background:var(--accent);transform:translate(-50%,-50%) rotate(45deg);border-radius:1.5px;box-shadow:0 0 8px rgba(57,214,255,.55);pointer-events:none;will-change:left,top}
#tally{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(6px);z-index:22;display:none;gap:16px;padding:8px 17px;opacity:0;transition:.22s cubic-bezier(.2,.8,.2,1)}
#tally.show{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
#tally .tc{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;color:var(--text)}

</style></head><body>
<div id="map"></div>

  <div class="rtop"><div><div class="id" id="rId">—</div><div class="nb" id="rNb">—</div></div>

<script>
const M=window.MOCK,S=M.sites,B=M.meta.bounds;let sel=null,map=null,ready=false,curLayers=[],settledOnce=false,renderer=null;
let pinById={},footprint=null,coverage=null,regionBox=null,faint=null,selRing=null,region=null,showN=50,armed=false,drawStart=null,query='',kbIdx=-1,stationSize='small',verdictFilter='all',minScore=60;
const FK=['mounting','power','parking','ada','demand'];
const W={mounting:.20,power:.10,parking:.35,ada:.15,demand:.20};
const col=s=>{const c1=[255,90,82],c2=[255,176,46],c3=[61,245,139];let a,b,f;if(s<70){f=Math.max(0,(s-40)/30);a=c1;b=c2}else{f=Math.min(1,(s-70)/30);a=c2;b=c3}return`rgb(${[0,1,2].map(i=>Math.round(a[i]+(b[i]-a[i])*f)).join(',')})`};
const vColor=s=>s.score>=75?'#3DF58B':s.score>=60?'#FFB02E':'#FF5A52';
const verdictOf=s=>s.score>=75?['GO','var(--green)']:s.score>=60?['CONDITIONAL','var(--amber)']:['NO-GO','var(--red)'];
function reason(s){if(s.gate)return s.gate+' · screened out';const m=s.m;
 if(s.score>=75)return`${m.stalls} stall${m.stalls!=1?'s':''} fit · ${m.dist_power} m to power · PCI ${m.pci}`;
 if(s.score>=60)return`Fits ${m.stalls} · ${m.dist_power} m to power lifts trench cost`;
 return`${m.dist_power} m power run · ${m.width_ft} ft frontage`}
const FEATURED='IA17248';let featRing=null;
function applyModel(){const sum=FK.reduce((a,k)=>a+W[k],0)||1;
 S.forEach(s=>{const base=Math.round(100*FK.reduce((a,k)=>a+(W[k]/sum)*s.f[k],0)*10)/10;s.score=s.gate?0:base;s.pay=Math.round(20+(1-s.score/100)*34)});
 S.sort((a,b)=>b.score-a.score);
 const _fi=S.findIndex(s=>s.id===FEATURED);if(_fi>0){const[_f]=S.splice(_fi,1);S.unshift(_f)}
 S.forEach((s,i)=>s.rank=i+1)}
function inRegion(s){return !region||region.contains([s.lat,s.lng])}
function matchQ(s){return !query||(s.addr+' '+s.id).toLowerCase().includes(query)}
const SIZE_FRONTAGE={small:20,medium:42,large:84};
function vfOk(s){if(verdictFilter==='all')return true;if(s.gate)return false;return verdictFilter==='go'?s.score>=75:s.score>=60}
function activeSites(){const req=SIZE_FRONTAGE[stationSize];return S.filter(s=>inRegion(s)&&matchQ(s)&&s.m.frontage_ft>=req&&vfOk(s)&&s.score>=minScore)}
function topList(){return activeSites()}
const DATAB=L.latLngBounds([[B[1],B[0]],[B[3],B[2]]]);
const PAD=0.013,MAXB=L.latLngBounds([[B[1]-PAD*.7,Math.min(B[0]-PAD,-71.123)],[B[3]+PAD*.7,B[2]+PAD]]);
const BASEMAPS={
 hybrid:{base:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',over:['https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}','https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}']},
 streets:{sub:'abcd',base:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png'},
 dark:{sub:'abcd',base:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'}};
function setBasemap(key){const b=BASEMAPS[key];if(!b||!map)return;curLayers.forEach(l=>map.removeLayer(l));curLayers=[];
 const base=L.tileLayer(b.base,b.sub?{maxZoom:20,subdomains:b.sub,keepBuffer:3}:{maxZoom:20,keepBuffer:3});base.addTo(map);base.bringToBack();curLayers.push(base);
 (b.over||[]).forEach(u=>{const o=L.tileLayer(u,{maxZoom:20,keepBuffer:3});o.addTo(map);curLayers.push(o)});
 if(!settledOnce)base.on('load',settle);
 document.querySelectorAll('#layers b[data-v]').forEach(x=>x.classList.toggle('on',x.dataset.v===key))}
function init(){try{if(typeof L==='undefined')throw 0;
  map=L.map('map',{zoomControl:false,attributionControl:false,zoomSnap:.5,zoomDelta:.5,wheelPxPerZoomLevel:140,minZoom:14,maxZoom:19,maxBounds:MAXB,maxBoundsViscosity:1,preferCanvas:true}).fitBounds(DATAB,{padding:[60,60]});
  L.control.zoom({position:'bottomleft'}).addTo(map);renderer=L.canvas({padding:.5,tolerance:6});setBasemap('streets');
  document.querySelectorAll('#layers b[data-v]').forEach(b=>b.onclick=()=>{setBasemap(b.dataset.v);closeLayers()});
  map.on('mousedown',onDown);map.on('mousemove',onMove);map.on('mouseup',onUp);
 }catch(e){map=null}setTimeout(settle,1500);setTimeout(settle,3000)}
function settle(){if(ready)return;ready=true;settledOnce=true;document.getElementById('loader').classList.add('gone');
 applyModel();drawCoverage();rerender()}
function drawCoverage(){if(coverage)map.removeLayer(coverage);coverage=L.rectangle(DATAB,{color:'#39D6FF',weight:1.1,dashArray:'8 7',fill:false,interactive:false,opacity:region?.2:.5}).addTo(map)}
function buildPins(){for(const id in pinById)map.removeLayer(pinById[id]);pinById={};
 topList().forEach(s=>{const feat=s.id===FEATURED&&!LIVE[s.id];const m=L.circleMarker([s.lat,s.lng],{renderer,radius:feat?8:(LIVE[s.id]?7:(s.score>=70?6:4.5)),fillColor:feat?'#39D6FF':(liveColor(s.id)||vColor(s)),color:'#0A0D10',weight:feat?2:1.3,fillOpacity:.97});m.on('click',()=>select(s.id));m.addTo(map);pinById[s.id]=m})}
function buildFaint(){if(faint){map.removeLayer(faint);faint=null}faint=L.layerGroup();
 activeSites().forEach(s=>{if(!s.g||s.g.length<2)return;const c=s.gate?'#5a6779':(liveColor(s.id)||col(s.score)),op=s.gate?.22:(LIVE[s.id]?.97:(s.score>=70?.92:.5));
  const pl=L.polyline(s.g.map(p=>[p[1],p[0]]),{renderer,color:c,weight:4,opacity:op,interactive:true});pl.on('click',()=>select(s.id));pl.addTo(faint)});faint.addTo(map)}
function showFootprint(s){if(footprint)map.removeLayer(footprint);const wM=Math.max(5,s.m.stalls*2.7)*1.6,dM=5.5*1.6;
 const dLat=dM/111320,dLng=wM/(111320*Math.cos(s.lat*Math.PI/180));
 footprint=L.rectangle([[s.lat-dLat/2,s.lng-dLng/2],[s.lat+dLat/2,s.lng+dLng/2]],{color:'#fff',weight:1.4,fillColor:vColor(s),fillOpacity:.4,interactive:false}).addTo(map)}
function rerender(){kbIdx=-1;const list=topList(),active=activeSites();const viable=active.filter(s=>s.score>=70).length;
 document.getElementById('countChip').textContent=active.length+' sites';
 fnTop.textContent=active.length;fnViable.textContent=viable;
 const cl=document.getElementById('clist');cl.innerHTML='';
 if(!list.length)cl.innerHTML='<div class="empty">Nothing matches. Try a street name, or clear the search.</div>';
 list.slice(0,60).forEach(s=>{const feat=s.id===FEATURED;const r=document.createElement('div');r.className='row'+(s.id===sel?' sel':'')+(feat?' pick':'');r.setAttribute('role','option');
  r.innerHTML=`<div class="rk">${String(s.rank).padStart(2,'0')}</div><div class="nm"><div class="a">${s.addr}${feat?' <span class="pickbadge">PICK</span>':''}</div><div class="b">${s.nb} · ${s.id}</div></div><div class="sc" style="color:${feat?'#39D6FF':col(s.score)}">${s.gate?'—':s.score}</div>`;
  r.onclick=()=>{if(map)map.flyTo([s.lat,s.lng],17,{duration:.6});select(s.id)};cl.appendChild(r)});
 buildPins();buildFaint();
 if(sel&&!activeSites().some(s=>s.id===sel)&&list.length)select(list[0].id);updateDispatch()}
function surveyHtml(s){const lv=LIVE[s.id];if(lv)return liveSurveyHtml(s,lv);
 const r=window.SURVEY&&window.SURVEY[s.id];
 if(!r)return '<div class="surveynote">Screening only. The Stage 2 survey agent runs on the top finalists; this segment was not in the surveyed set.</div>';
 const v=r.verdict,tc=v.tier==='Tier 1'?'var(--green)':v.tier==='No-go'?'var(--red)':v.tier==='Tier 3'?'var(--amber)':'var(--accent)';
 const li=a=>(a||[]).map(x=>`<li>${x}</li>`).join('');
 return `<div class="surveyblk surveying">
   <div class="srun"><span class="sdot"></span>Agent surveying the curb segment…</div>
   <div class="scontent">
   <div class="sh"><span>Stage 2 · AI Survey</span><span class="tier" style="color:${tc};border-color:${tc}">${v.tier}</span></div>
   <div class="sreason">${v.one_line_reason}</div>
   <ul>${li(r.executive_summary)}</ul>
   <div class="ssub">Verify on site</div><ul class="dim">${li((r.to_be_verified||[]).slice(0,4))}</ul>
   <div class="ssub">Next steps</div><ul>${li(r.next_steps)}</ul>
   <div class="sby">generated offline by the team's survey stub · with the API key the Claude agent writes this live from the photo + measurements</div>
   </div>
 </div>`}
// Autodesk: one site is actually rendered (School St, IA17248) and links to the local APS viewer
// served by cad/viewer/token_server.py on :8080. Every other site shows the button but only ever
// spins (we have not baked a scene for those).
const AUTODESK_SITE='IA17248';
const AUTODESK_URL='http://localhost:8080/index.html';
function autodeskBtn(s){
 if(s.id===AUTODESK_SITE)
  return `<a class="adskbtn" href="${AUTODESK_URL}" target="_blank" rel="noopener">Show in Autodesk <span class="ar">↗</span></a>`;
 // every other site opens a new tab that sits forever on "generating pre-render" (no scene baked)
 const q=`site=${encodeURIComponent(s.id)}&addr=${encodeURIComponent(s.addr||'')}`;
 return `<a class="adskbtn" href="autodesk-prerender.html?${q}" target="_blank" rel="noopener">Show in Autodesk <span class="ar">↗</span></a>`;
}
function reportSkeleton(s){const m=s.m;const adaTxt=m.ada_mapped?(m.ada_pass?`Pass · ramp ${m.dist_ada} m`:`Ramp ${m.dist_ada} m`):'Not mapped · verify';
 const adaCls=m.ada_mapped?(m.ada_pass?'pass':'cond'):'cond';
 document.getElementById('rbody').innerHTML=`
  <div class="econ"><div class="ec"><div class="k uppr">Score</div><div class="v" style="color:${col(s.score)}">${s.gate?'—':s.score}</div></div>
   <div class="ec"><div class="k uppr">Connect</div><div class="v">$${(s.cost/1000).toFixed(0)}K</div></div>
   <div class="ec"><div class="k uppr">Payback</div><div class="v">${s.pay}<small style="color:var(--dim);font-size:9px"> mo</small></div></div></div>
  ${surveyHtml(s)}
  <div class="blk"><div class="bh"><span>Physical fit</span><span class="src">cyvl</span></div>
   <div class="kv"><span class="k">Usable frontage</span><span class="v">${m.frontage_ft} ft</span></div>
   <div class="kv"><span class="k">Road width</span><span class="v">${m.width_ft} ft</span></div>
   <div class="kv"><span class="k">Stalls that fit (5.5 m)</span><span class="v">${m.stalls}</span></div></div>
  <div class="blk"><div class="bh"><span>Connection cost</span><span class="src">cyvl</span></div>
   <div class="kv"><span class="k">Distance to power</span><span class="v">${m.dist_power} m</span></div>
   <div class="kv"><span class="k">Trench length</span><span class="v">${Math.round(m.dist_power*1.2+4)} m</span></div>
   <div class="kv"><span class="k">Surface · PCI</span><span class="v">${m.surface} · ${m.pci}</span></div></div>
  <div class="blk"><div class="bh"><span>Access &amp; obstructions</span><span class="src">cyvl</span></div>
   <div class="kv"><span class="k">ADA ramp</span><span class="v ${adaCls}">${adaTxt}</span></div>
   <div class="kv"><span class="k">Obstructions ≤8 m</span><span class="v ${m.n_obst>2?'cond':'pass'}">${m.n_obst}</span></div>
   <div class="kv"><span class="k">Fire lane</span><span class="v ${m.fire?'fail':'pass'}">${m.fire?'Yes':'None'}</span></div></div>
  <div class="blk"><div class="bh"><span>Demand</span><span class="src">proxy</span></div>
   <div class="kv"><span class="k">Street activity</span><span class="v">${m.activity} markings ≤45 m</span></div>
   <div class="kv"><span class="k">Traffic / AADT</span><span class="v" style="color:var(--dim)">not loaded</span></div></div>
  <div class="blk"><div class="bh"><span>Verify on site</span><span class="src">flag</span></div>
   <div class="flagbox">Zoning · grid capacity · host · permit${m.ada_mapped?'':' · ADA ramp'} — not in this export, flagged.</div></div>${autodeskBtn(s)}<button class="pdfbtn" id="pdfBtn" onclick="openReport()">Open full report ↗</button>`}
function resolveVerdict(s){const lv=LIVE[s.id];const el=document.getElementById('rVerd');if(lv){const mp={go:['GO','var(--green)'],conditional:['CONDITIONAL','var(--amber)'],no_go:['NO-GO','var(--red)']},mx=mp[lv.verdict]||['—','var(--accent)'];el.textContent=mx[0];el.style.color=mx[1];document.getElementById('rReason').textContent=lv.one_line_reason||'';return}const a=verdictOf(s);el.textContent=a[0];el.style.color=a[1];document.getElementById('rReason').textContent=reason(s)}
function animateSurvey(){const sb=document.querySelector('.surveyblk.surveying');if(sb)setTimeout(()=>sb.classList.remove('surveying'),820)}
function select(id){sel=id;const s=S.find(x=>x.id===id);if(!s)return;
 document.getElementById('rId').textContent=s.addr;document.getElementById('rNb').textContent=s.nb+' · '+s.id;
 document.getElementById('rImg').src=s.img;reportSkeleton(s);resolveVerdict(s);animateSurvey();insertSam(s);
 const _av=hasStreetView(s);document.querySelector('#report .tg').textContent=_av?'Cyvl street capture':'No 360 capture nearby';document.getElementById('report').classList.toggle('noview',!_av);
 document.getElementById('report').classList.add('open');
 document.querySelectorAll('#clist .row').forEach((r,i)=>r.classList.toggle('sel',topList()[i]&&topList()[i].id===id));
 showFootprint(s);if(selRing)map.removeLayer(selRing);
 selRing=L.circleMarker([s.lat,s.lng],{renderer,radius:9,fill:false,color:'#fff',weight:2,interactive:false}).addTo(map);closeResults()}
function openResults(){document.getElementById('results').classList.add('open')}
function closeResults(){document.getElementById('results').classList.remove('open');kbIdx=-1}
function setRegion(b){region=b;if(regionBox){map.removeLayer(regionBox);regionBox=null}
 if(region)regionBox=L.rectangle(region,{color:'#FFB02E',weight:1.6,dashArray:'6 4',fillColor:'#FFB02E',fillOpacity:.06,interactive:false}).addTo(map);
 drawCoverage();rerender()}
function onDown(e){if(!armed)return;drawStart=e.latlng;if(regionBox){map.removeLayer(regionBox);regionBox=null}
 regionBox=L.rectangle([drawStart,drawStart],{color:'#FFB02E',weight:1.6,dashArray:'6 4',fillColor:'#FFB02E',fillOpacity:.06,interactive:false}).addTo(map)}
function onMove(e){if(!armed||!drawStart)return;regionBox.setBounds(L.latLngBounds(drawStart,e.latlng))}
function onUp(e){if(!armed||!drawStart)return;const b=L.latLngBounds(drawStart,e.latlng);armed=false;drawStart=null;
 map.dragging.enable();map.getContainer().style.cursor='';document.getElementById('drawBtn').classList.remove('on');
 if(b.getNorth()-b.getSouth()<0.0004){if(regionBox){map.removeLayer(regionBox);regionBox=null}return}setRegion(b)}
const addr=document.getElementById('addr');
addr.addEventListener('input',()=>{query=addr.value.trim().toLowerCase();rerender();openResults()});
document.getElementById('countChip').addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();document.getElementById('results').classList.toggle('open')}});
document.getElementById('countChip').onclick=()=>document.getElementById('results').classList.toggle('open');
document.getElementById('resX').onclick=closeResults;
document.getElementById('repX').onclick=()=>{document.getElementById('report').classList.remove('open');if(selRing){map.removeLayer(selRing);selRing=null}if(footprint){map.removeLayer(footprint);footprint=null}sel=null};
const PANO_THRESH=15;
function sitePano(s){const e=window.SITEPANO&&window.SITEPANO[s.id];return e&&e[1]<=PANO_THRESH?e:null}
function hasStreetView(s){return !!sitePano(s)}
function svToast(m){let t=document.getElementById('svToast');if(!t){t=document.createElement('div');t.id='svToast';document.body.appendChild(t)}t.textContent=m;t.classList.add('on');clearTimeout(svToast._t);svToast._t=setTimeout(()=>t.classList.remove('on'),1800)}
function openStreetView(s){if(!s)return;const e=sitePano(s);if(!e){svToast('No Cyvl 360 capture at this site');return}const p=new URLSearchParams();p.set('pano',e[0]);p.set('lat',s.lat);p.set('lng',s.lng);p.set('site',s.id);p.set('addr',s.addr||'');location.href='lookaround.html?'+p.toString()}
document.querySelector('#report .rphoto').addEventListener('click',e=>{if(e.target.closest('.x'))return;const s=S.find(x=>x.id===sel);if(s)openStreetView(s)});
function kbRows(){return [...document.querySelectorAll('#clist .row')]}
function kbHi(){const rows=kbRows();rows.forEach((r,i)=>r.classList.toggle('kb',i===kbIdx));const a=rows[kbIdx];if(a)a.scrollIntoView({block:'nearest'})}
document.addEventListener('keydown',e=>{
 if(e.key==='Escape'){closeResults();closeLayers();document.getElementById('report').classList.remove('open');return}
 if(!document.getElementById('results').classList.contains('open'))return;
 const rows=kbRows();

function fxDeploy(center,s,delay){if(!map)return;setTimeout(()=>{if(!surveying||LIVE[s.id])return;const a=fxPt(center),b=fxPt(L.latLng(s.lat,s.lng));const dot=L.circleMarker(center,{renderer,radius:3.5,fillColor:'#39D6FF',color:'#06231d',weight:1,fillOpacity:1,interactive:false}).addTo(map);let t0=null;const ms=560;fxAdd(t=>{if(t0==null)t0=t;const k=Math.min(1,(t-t0)/ms),e=1-Math.pow(1-k,2);const pt=L.point(a.x+(b.x-a.x)*e,a.y+(b.y-a.y)*e);dot.setLatLng(map.containerPointToLatLng(pt));if(k>=1){map.removeLayer(dot);fxPending(s);return false}return true})},delay)}
function fxResolve(s,verdict){const st=fxPend[s.id];if(st){st.alive=false;delete fxPend[s.id]}const col=LV_COL[verdict]||'#39D6FF';fxRing([s.lat,s.lng],7,15,380,col,1.4,.5);const pin=pinById[s.id];if(pin){const end=LIVE[s.id]?7:(s.score>=70?6:4.5);pin.setRadius(end+3);let t0=null;fxAdd(t=>{if(t0==null)t0=t;const k=Math.min(1,(t-t0)/300);pin.setRadius((end+3)-3*k);return k<1})}}
function fxWinner(s){if(!map)return;fxRing([s.lat,s.lng],10,22,560,'#39D6FF',1.6,.5)}
function fxClearAll(){Object.values(fxPend).forEach(st=>st.alive=false);fxPend={};fxScanStop();document.querySelectorAll('#fx .fxtag,#fx .fxwalk').forEach(e=>e.remove())}
function tShow(on){const t=document.getElementById('tally');if(t)t.classList.toggle('show',on)}
function tallyReset(){['tGo','tCo','tNg'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent='0'})}
function tallyBump(verdict){const id=verdict==='go'?'tGo':verdict==='conditional'?'tCo':'tNg',e=document.getElementById(id);if(!e)return;e.textContent=(+e.textContent+1);e.style.transform='scale(1.5)';setTimeout(()=>{e.style.transform='scale(1)'},170)}
function fxKickoff(set){if(!map)return;fxClearAll();tallyReset();tShow(true)}
function schoolSite(){return S.filter(s=>s.addr==='School Street').sort((a,b)=>b.score-a.score)[0]}
function fxWalkIn(s,delay,onArrive){const fx=document.getElementById('fx');if(!fx||!map){if(onArrive)onArrive();return}setTimeout(()=>{if(!surveying){if(onArrive)onArrive();return}const p=map.latLngToContainerPoint(L.latLng(s.lat,s.lng)),W=window.innerWidth,H=window.innerHeight,M=70;const dL=p.x,dR=W-p.x,dT=p.y,dB=H-p.y,mn=Math.min(dL,dR,dT,dB);let sx=p.x,sy=p.y;if(mn===dL)sx=-M;else if(mn===dR)sx=W+M;else if(mn===dT)sy=-M;else sy=H+M;const el=document.createElement('div');el.className='fxwalk';el.style.left=sx+'px';el.style.top=sy+'px';fx.appendChild(el);const t0=performance.now(),ms=1200;const step=t=>{const k=Math.min(1,(t-t0)/ms),e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;el.style.left=(sx+(p.x-sx)*e)+'px';el.style.top=(sy+(p.y-sy)*e)+'px';el.style.opacity=k<.12?k/.12:1;if(k<1)requestAnimationFrame(step);else{el.remove();fxRing([s.lat,s.lng],4,12,360,'#39D6FF',1.3,.55);if(onArrive)onArrive()}};requestAnimationFrame(step)},delay)}
function forceSchoolWinner(){const s=schoolSite();if(!s)return false;const m=s.m,trench=Math.round(m.dist_power*1.2+4);const v={site_id:s.id,verdict:'go',confidence:.95,one_line_reason:'Fits the stall with room, power is right there, and the curb is clear.',rationale:'Usable frontage '+m.frontage_ft+' ft clears the curbside requirement with margin; nearest power is just '+m.dist_power+' m so the trench is short; pavement is '+m.pci_label+' (PCI '+m.pci+') and the frontage shows no curbside conflict, hydrant, or driveway cut.',positives:[m.frontage_ft+' ft usable frontage',m.dist_power+' m to power','PCI '+m.pci+' ('+m.pci_label+')','no obstruction in the frontage'],concerns:[],verify_on_site:['Grid capacity at the pole','Curbside parking permit','Final on-site survey'],source:'swarm.crew.judge',crew:{fit:{finding:'Curbside L2 fits cleanly: '+m.frontage_ft+' ft usable on a '+m.width_ft+' ft road leaves comfortable clearance for one stall.'},connection:{finding:'Short interconnection at '+m.dist_power+' m; '+m.surface+' surface to cut, about '+trench+' m of trench. Confirm transformer capacity at the pole.'},context:{finding:'Residential frontage with a clear curb, no bus stop or loading zone in view. Strong candidate for an on-site visit.',saw:['clear curb','residential frontage','no obstructions']}},lon:s.lng,lat:s.lat};onWinner(v);return true}
async function downloadPdf(){const s=S.find(x=>x.id===sel);if(!s)return;const btn=document.getElementById('pdfBtn');const old=btn?btn.textContent:'';if(btn){btn.textContent='Building the PDF…';btn.disabled=true}try{const payload={site:{id:s.id,addr:s.addr,nb:s.nb,lat:s.lat,lng:s.lng,score:s.score,cost:s.cost,pay:s.pay,m:s.m,img:s.img},verdict:LIVE[s.id]||null,required_frontage_ft:SIZE_FRONTAGE[stationSize]};const res=await fetch(SWARM+'/report/pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(!res.ok)throw new Error('http '+res.status);const blob=await res.blob();const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='sonder_'+s.id+'.pdf';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),2000);if(btn){btn.textContent='✓ Downloaded';setTimeout(()=>{btn.textContent=old;btn.disabled=false},1600)}}catch(e){svToast('PDF needs the swarm service running');if(btn){btn.textContent='PDF failed';setTimeout(()=>{btn.textContent=old;btn.disabled=false},1800)}}}

document.getElementById('dispatch').addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();dispatchSurvey()}});
fetch(SWARM+'/health').then(r=>r.json()).then(h=>{swarmMode=h.mode;updateDispatch()}).catch(()=>{});

  (function place(){

    const icon=L.divIcon({className:'',iconSize:[0,0],html:'<div style="position:relative"><div class="feat-dot"></div><div class="feat-label">★ Top site · '+s.addr+'</div></div>'});
    L.marker([s.lat,s.lng],{icon,zIndexOffset:1000,interactive:true,keyboard:false}).addTo(map).on('click',()=>{select(ID);if(map)map.flyTo([s.lat,s.lng],17,{duration:.8});});
  })();
})();

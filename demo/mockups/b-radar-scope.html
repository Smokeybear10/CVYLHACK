<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>B · Radar Scope</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#03070a;--grn:#54ff9b;--grn2:#1f7a4d;--amber:#ffc24d;--red:#ff6b6b;--dim:#3f6b57;--text:#bdf5d6;
--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--mono)}
.uppr{text-transform:uppercase;letter-spacing:.16em}
.scan{position:fixed;inset:0;pointer-events:none;z-index:8;background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0 1px,transparent 1px 3px)}
.vig{position:fixed;inset:0;pointer-events:none;z-index:8;box-shadow:inset 0 0 260px 60px #000}
header{position:fixed;top:0;left:0;right:0;height:48px;z-index:20;display:flex;align-items:center;justify-content:space-between;
 padding:0 18px;background:rgba(3,7,10,.92);border-bottom:1px solid rgba(84,255,155,.22)}
header .l{display:flex;align-items:center;gap:14px}header .tt{font-size:13px;font-weight:700;letter-spacing:.28em;color:var(--grn)}
header .meta{font-size:10px;color:var(--dim);letter-spacing:.18em}
header .r{display:flex;gap:20px;font-size:10px;color:var(--dim);letter-spacing:.14em}
header .r b{color:var(--grn);font-weight:500}
.wrap{position:absolute;inset:48px 0 0 0;display:flex}
.col{width:280px;border-right:1px solid rgba(84,255,155,.14);display:flex;flex-direction:column;background:rgba(4,10,8,.5)}
.col.r{border-right:0;border-left:1px solid rgba(84,255,155,.14);width:300px}
.ch{padding:11px 15px;font-size:10px;letter-spacing:.18em;color:var(--grn);border-bottom:1px solid rgba(84,255,155,.14);display:flex;justify-content:space-between}
.ch span{color:var(--dim)}
#tlist{overflow-y:auto;flex:1}
.t{display:flex;align-items:center;gap:10px;padding:8px 15px;border-bottom:1px solid rgba(84,255,155,.06);cursor:pointer;font-size:11px}
.t:hover{background:rgba(84,255,155,.06)}.t.sel{background:rgba(84,255,155,.12);border-left:2px solid var(--grn)}
.t .rk{color:var(--dim);width:20px}.t .id{flex:1}.t .sc{font-weight:700}
.scope-wrap{flex:1;display:grid;place-items:center;position:relative;overflow:hidden}
#scope{position:relative}
.ring{position:absolute;border:1px solid rgba(84,255,155,.16);border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}
.cross{position:absolute;background:rgba(84,255,155,.12)}
.sweep{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,rgba(84,255,155,.32),rgba(84,255,155,0) 38%);animation:sw 4s linear infinite}
@keyframes sw{to{transform:rotate(360deg)}}
.blip{position:absolute;border-radius:50%;transform:translate(-50%,-50%);cursor:pointer}
.blip.sel{box-shadow:0 0 0 2px #eafff3,0 0 16px var(--grn)!important}
.rng-lab{position:absolute;left:50%;font-size:8px;color:var(--dim);transform:translateX(-50%);letter-spacing:.1em}
.coreLab{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:8px;color:var(--grn);letter-spacing:.16em;text-shadow:0 0 8px var(--grn)}
.beam{position:absolute;left:50%;top:50%;height:1px;background:linear-gradient(90deg,var(--grn),transparent);transform-origin:left center;opacity:.7}
/* detail */
.dphoto{height:150px;background:#06120c;position:relative;overflow:hidden}
.dphoto img{width:100%;height:100%;object-fit:cover;filter:saturate(.55) hue-rotate(75deg) brightness(.9) contrast(1.1)}
.dphoto .ov{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(3,7,10,.95));mix-blend-mode:normal}
.dphoto .tg{position:absolute;top:8px;left:8px;font-size:8px;color:var(--grn);letter-spacing:.14em;border:1px solid rgba(84,255,155,.3);padding:3px 6px}
.dbody{padding:14px 15px}
.dscore{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
.dscore b{font-size:40px;font-weight:700;line-height:.8}.dscore .vd{font-size:11px;letter-spacing:.16em}
.did{font-size:11px;color:var(--text);margin-bottom:2px}.dnb{font-size:9px;color:var(--dim);letter-spacing:.14em;margin-bottom:14px}
.kv{display:flex;justify-content:space-between;font-size:9px;color:var(--dim);letter-spacing:.1em;padding:4px 0;border-bottom:1px dashed rgba(84,255,155,.12)}
.kv b{color:var(--grn);font-weight:500}
.fc{margin:9px 0}.fc .fl{display:flex;justify-content:space-between;font-size:9px;margin-bottom:4px;letter-spacing:.08em}
.fc .bar{font-size:10px;letter-spacing:1px;color:var(--grn);text-shadow:0 0 6px rgba(84,255,155,.6)}
.fc .ev{font-size:8.5px;color:var(--dim);margin-top:3px}
.econ{display:flex;gap:10px;margin-top:12px}.ec{flex:1;border:1px solid rgba(84,255,155,.16);padding:9px;text-align:center}
.ec .k{font-size:7.5px;color:var(--dim);letter-spacing:.14em}.ec .v{font-size:15px;font-weight:700;color:var(--grn);margin-top:5px}
</style></head><body>
<div class="scan"></div><div class="vig"></div>
<header>
 <div class="l"><span class="tt">◈ GRIDSITE RADAR</span><span class="meta uppr">Sector · Somerville MA</span></div>
 <div class="r"><span>CONTACTS <b id="hC">—</b></span><span>VIABLE <b id="hV">—</b></span><span>SWEEP <b>04.0s</b></span><span>MODE <b>SITING</b></span></div>
</header>
<div class="wrap">
 <div class="col"><div class="ch uppr">Contact List <span id="lc">—</span></div><div id="tlist"></div></div>
 <div class="scope-wrap"><div id="scope"></div></div>
 <div class="col r"><div class="ch uppr">Target Detail <span id="tno"></span></div>
  <div class="dphoto"><img id="dImg"/><div class="ov"></div><div class="tg uppr">Cyvl Capture</div></div>
  <div class="dbody">
   <div class="did" id="dId">—</div><div class="dnb uppr" id="dNb">—</div>
   <div class="dscore"><b id="dSc">—</b><span class="vd uppr" id="dVd"></span></div>
   <div class="kv"><span>BEARING</span><b id="dBr">—</b></div>
   <div class="kv"><span>RANGE</span><b id="dRg">—</b></div>
   <div id="dFac" style="margin-top:10px"></div>
   <div class="econ"><div class="ec"><div class="k uppr">Install</div><div class="v">$<span id="dCo">—</span></div></div>
    <div class="ec"><div class="k uppr">Payback</div><div class="v"><span id="dPa">—</span>mo</div></div></div>
  </div></div>
</div>
<script src="data.js"></script>
<script>
const M=window.MOCK,S=M.sites,FAC=[['mounting','MNT'],['power','PWR'],['parking','PRK'],['ada','ADA'],['demand','DMD']];
let sel=null;
const cx=S.reduce((a,s)=>a+s.lng,0)/S.length, cy=S.reduce((a,s)=>a+s.lat,0)/S.length;
const col=s=>s>=78?'#7dffb0':s>=70?'#54ff9b':s>=60?'#ffc24d':'#ff6b6b';
const vd=s=>s>=78?'PRIME':s>=70?'VIABLE':s>=60?'MARGINAL':'REJECT';
function metersTo(s){const dx=(s.lng-cx)*Math.cos(cy*Math.PI/180)*111320,dy=(s.lat-cy)*110540;
 return{d:Math.hypot(dx,dy),br:(Math.atan2(dx,dy)*180/Math.PI+360)%360,dx,dy}}
const MAXD=Math.max(...S.map(s=>metersTo(s).d))*1.05;
function buildScope(){const wrap=document.querySelector('.scope-wrap');const sz=Math.min(wrap.clientWidth,wrap.clientHeight)-60;
 const sc=document.getElementById('scope');sc.style.width=sz+'px';sc.style.height=sz+'px';sc.innerHTML='';const R=sz/2;
 [0.25,0.5,0.75,1].forEach(f=>{const r=document.createElement('div');r.className='ring';r.style.width=sz*f+'px';r.style.height=sz*f+'px';sc.appendChild(r);
  const lab=document.createElement('div');lab.className='rng-lab';lab.style.top=(R-R*f-9)+'px';lab.textContent=Math.round(MAXD*f)+'m';sc.appendChild(lab)});
 const hz=document.createElement('div');hz.className='cross';hz.style.cssText=`left:0;top:50%;width:100%;height:1px`;sc.appendChild(hz);
 const vt=document.createElement('div');vt.className='cross';vt.style.cssText=`top:0;left:50%;width:1px;height:100%`;sc.appendChild(vt);
 const sw=document.createElement('div');sw.className='sweep';sc.appendChild(sw);
 const core=document.createElement('div');core.className='coreLab uppr';core.textContent='UNION SQ';sc.appendChild(core);
 S.forEach(s=>{const m=metersTo(s);const rr=m.d/MAXD*R;const ang=(m.br-90)*Math.PI/180;
  const x=R+rr*Math.cos(ang),y=R+rr*Math.sin(ang);const c=col(s.score);const size=s.score>=70?9:6;
  const b=document.createElement('div');b.className='blip'+(s.id===sel?' sel':'');b.dataset.id=s.id;
  b.style.cssText=`left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${c};box-shadow:0 0 ${s.score>=70?14:6}px ${c}`;
  b.onclick=()=>select(s.id);sc.appendChild(b)});
 if(sel){const s=S.find(x=>x.id===sel);const m=metersTo(s);const rr=m.d/MAXD*R;const ang=(m.br-90)*Math.PI/180;
  const beam=document.createElement('div');beam.className='beam';beam.style.width=rr+'px';beam.style.transform=`rotate(${m.br-90}deg)`;sc.appendChild(beam)}}
function hero(){document.getElementById('hC').textContent=S.length;
 document.getElementById('hV').textContent=S.filter(s=>s.score>=70).length;
 document.getElementById('lc').textContent=S.length;}
function list(){const el=document.getElementById('tlist');el.innerHTML='';
 S.slice(0,16).forEach(s=>{const t=document.createElement('div');t.className='t'+(s.id===sel?' sel':'');
  t.innerHTML=`<span class="rk">${String(s.rank).padStart(2,'0')}</span><span class="id">${s.id} · ${s.nb}</span><span class="sc" style="color:${col(s.score)}">${s.score}</span>`;
  t.onclick=()=>select(s.id);el.appendChild(t)})}
function bar(v){const n=Math.round(v*10);return'█'.repeat(n)+'░'.repeat(10-n)}
function detail(s){const m=metersTo(s);
 document.getElementById('dId').textContent=s.id;document.getElementById('dNb').textContent=s.nb;
 const sc=document.getElementById('dSc');sc.textContent=s.score.toFixed(0);sc.style.color=col(s.score);
 const v=document.getElementById('dVd');v.textContent=vd(s.score);v.style.color=col(s.score);
 document.getElementById('dBr').textContent=m.br.toFixed(0).padStart(3,'0')+'°';
 document.getElementById('dRg').textContent=m.d.toFixed(0)+' m';
 document.getElementById('dCo').textContent=s.cost.toLocaleString();document.getElementById('dPa').textContent=s.pay;
 document.getElementById('dImg').src=s.img;document.getElementById('tno').textContent='#'+s.rank;
 const f=document.getElementById('dFac');f.innerHTML='';
 FAC.forEach(([k,l])=>{f.innerHTML+=`<div class="fc"><div class="fl"><span>${l}</span><span>${(s.f[k]*100|0)}</span></div><div class="bar">${bar(s.f[k])}</div><div class="ev">${s.ev[k]}</div></div>`})}
function select(id){sel=id;detail(S.find(s=>s.id===id));list();buildScope()}
function render(){hero();list();buildScope();select(S[0].id)}
window.addEventListener('resize',()=>{buildScope();if(sel)buildScope()});
render();
</script></body></html>
